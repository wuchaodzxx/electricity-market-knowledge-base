  <script>
    const appData = {"generatedAt":"2026-07-14","lastUpdatedAt":"2026-07-14","sheets":[{"name":"基础概念","columns":["概念","通俗解释","详细解读","关联机制","适用范围","来源文件","发文编号","链接","查看文件","核验日期"],"rows":[{"title":"新能源上网电价市场化","values":["新能源上网电价市场化","新能源上网电量逐步通过电力市场交易形成价格。","新能源上网电价市场化的核心是让风电、光伏等新能源电量原则上进入电力市场，通过中长期、现货等交易形成上网价格。对初学者来说，最重要的是把“市场交易价格”和“配套结算机制”分开看：市场交易价格来自买卖双方或现货市场出清，反映供需、时段、出力和系统运行状况；配套结算机制则用于平稳衔接改革前后项目收益预期，特别是对纳入机制的新能源电量按机制电价和市场交易均价进行差价结算。文件还要求完善现货和中长期市场规则，允许新能源报量报价或接受市场形成价格，并要求各地在2025年底前出台实施方案。项目业主需要关注本省具体方案、市场注册、交易申报、合同签订、结算口径、绿证收益衔接以及退出规则。","机制电价；电力现货市场；中长期交易","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).html","2026-07-14"]},{"title":"电力市场注册","values":["电力市场注册","市场经营主体参与交易前按规则完成注册的基础手续。","电力市场注册是发电企业、售电公司、电力用户、新型经营主体等进入电力市场前的基础管理环节。它不是一张简单的“报名表”，而是把主体身份、经营资质、基本信息、信用和变更注销等事项纳入统一管理。注册完成后，主体才具备按规则参与市场的基础身份，但不等于自动获得所有交易品种资格；各省仍会根据中长期、现货、绿电、辅助服务、需求响应等不同品种设置准入条件、履约要求、申报流程和考核方式。主体应保证注册信息真实、完整、及时更新，名称、法定代表人、用电户号、资产关系、代理关系等重要信息变化时按规则办理变更。对小白来说，可以把注册理解为进入市场的“账户体系”和“身份核验”，后续交易、结算、信息披露和监管都会以注册信息为基础。","市场准入；交易主体管理","国家","国家能源局关于印发《电力市场注册基本规则》的通知","国能发监管规〔2024〕76号","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).html","2026-07-14"]},{"title":"容量电价（容量电费）","values":["容量电价（容量电费）","不是按发了多少电付钱，而是为电源可在关键时段顶得上、支撑系统安全供应而付的钱。","容量电价关注的是“有没有可靠能力”，电量电价关注的是“实际发了多少电”。传统单一制电价主要按上网电量结算，容易让煤电、气电、抽水蓄能、储能等承担保供和调节任务的电源只在发电时获得收入，难以体现其可用容量、顶峰能力和系统支撑价值。2023年煤电容量电价机制先把合规在运公用煤电机组从单一制电价调整为两部制：电量电价由市场化方式形成，容量电价按回收一定比例固定成本确定。煤电机组可获得的容量电费，通常根据当地容量电价和机组申报最大出力确定，由电网企业按月结算；相关费用纳入系统运行费用，原则上由工商业用户按用电量比例分摊并滚动清算。2026年文件进一步把视角从“煤电容量电价”扩展到“发电侧容量电价机制”，分类完善煤电、天然气发电、抽水蓄能、新型储能容量电价，并提出现货市场连续运行后有序建立可靠容量补偿机制。需要注意，容量电价不是无条件补贴，机组若不能按调度指令或规则要求提供申报能力，会被扣减容量电费，严重时可能取消获取资格。理解它的关键，是把它看成电力系统为可靠容量、顶峰能力和调节价值付出的成本安排。","两部制电价；系统运行费用；可靠容量补偿","国家","国家发展改革委 国家能源局关于建立煤电容量电价机制的通知；国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","发改价格〔2023〕1501号；发改价格〔2026〕114号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html；https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).html；source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).html","2026-07-14"]},{"title":"可靠容量补偿机制","values":["可靠容量补偿机制","在现货市场连续运行后，对机组在系统高峰时真正能稳定供电的能力给予补偿。","可靠容量补偿机制比传统容量电价更强调“顶峰时能不能可靠顶上”。2026年发电侧容量电价文件提出，电力现货市场连续运行后，省级价格主管部门会同相关部门适时建立可靠容量补偿机制，对机组可靠容量按统一原则补偿。这里的可靠容量，是机组在全年系统顶峰时段能够持续稳定供电的容量，而不是装机容量的简单数字。补偿标准以弥补市场边际机组在电能量和辅助服务市场不能回收的固定成本为基础，同时考虑电力供需、用户承受能力和市场建设进展。补偿范围可包括自主参与当地市场的煤电、气电、符合条件的电网侧独立新型储能等，并可随着市场和电价改革逐步扩展到抽水蓄能等其他具备可靠容量的机组，但已经获得其他保障的容量不重复补偿，政府定价机组也不予补偿。它与容量电价的关系是衔接替代：可靠容量补偿机制建立后，相关煤电、气电、独立储能等机组不再执行原有容量电价。对市场参与者来说，这意味着未来容量收益更可能与顶峰贡献、考核表现和市场化运行条件绑定。","容量电价；现货市场；顶峰能力","国家","国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","发改价格〔2026〕114号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).html","2026-07-14"]},{"title":"机制电价","values":["机制电价","新能源价格结算机制里用于差价结算的基准价，不是新能源所有电量的固定上网电价。","机制电价来自新能源可持续发展价格结算机制，是改革后平衡市场化交易和项目收益稳定的一项结算参数。发改价格〔2025〕136号要求新能源上网电量原则上全部进入电力市场，价格通过市场交易形成；同时对纳入机制的电量，电网企业每月按照机制电价开展差价结算。也就是说，新能源企业平时仍参与市场，市场交易均价由中长期或现货等市场形成；机制电价只对“纳入机制的电量”起作用，用来与市场交易均价比较并结算差额。机制电价并不等同于过去意义上的固定上网标杆电价，也不意味着所有新能源电量都按这个价格卖出。存量项目和增量项目的机制安排不同：存量项目重在政策衔接，增量项目一般通过竞争性方式确定纳入机制的电量规模、机制电价和执行期限。各地还要结合电力市场建设、新能源成本变化、绿色电力消费和用户承受能力制定具体方案。小白理解时可记住一句话：市场决定成交价，机制电价用于特定电量的差价结算和收益预期衔接。","机制电量；差价结算；新能源上网电价市场化","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).html","2026-07-14"]},{"title":"机制电量","values":["机制电量","被纳入新能源可持续发展价格结算机制、可以按机制电价做差价结算的电量范围。","机制电量解决的是“哪些电量可以享受机制电价差价结算”的问题。新能源项目上网电量原则上进入市场后，并不是全部电量都自动按机制电价结算；只有纳入新能源可持续发展价格结算机制的电量，才会按机制电价与市场交易均价进行差价结算。文件要求各地每年将纳入机制的电量分解到月度，如果某月实际上网电量低于当月分解电量，就按实际上网电量结算，并在年内按月滚动清算。增量项目的机制电量通常要通过竞争性方式确定，机制电量规模、机制电价、执行期限等共同影响项目收益预期。机制电量到期或项目自愿退出机制后，不再纳入机制执行范围。这个概念容易和“实际发电量”“市场成交电量”混淆：实际发电量是物理产出，市场成交电量是市场合同或现货出清结果，机制电量则是政策结算机制认可的电量额度。做项目测算时，应分别看市场收入、机制差价结算、绿证及其他收益，并关注本省具体分月分解和清算口径。","机制电价；差价结算；新能源可持续发展价格结算机制","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).html","2026-07-14"]},{"title":"差价结算","values":["差价结算","把市场交易均价和政策机制价之间的差额算出来，多退少补式地进入结算。","差价结算是理解机制电价时最关键的结算动作。按照新能源上网电价市场化改革文件，对纳入机制的电量，电网企业每月按机制电价开展差价结算，将市场交易均价与机制电价的差额纳入当地系统运行费用。现货市场连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；现货市场未连续运行地区，原则上按交易活跃周期的发电侧中长期交易同类项目加权平均价格确定。它的含义不是“项目不参加市场”，而是项目先在市场中形成价格，再对纳入机制的电量按规则计算差额。若市场交易均价低于机制电价，机制可以起到一定收益托底作用；若市场交易均价高于机制电价，也可能形成反向结算或冲抵安排，具体取决于地方实施方案和结算细则。文件还提出初期不再开展其他形式的差价结算，并要求电网企业对机制执行结果单独归集。实际看项目收益时，需要同时掌握机制电量、机制电价、市场均价、结算周期、月度滚动清算和是否退出机制等条件。","机制电价；机制电量；系统运行费用","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).html","2026-07-14"]}]},{"name":"国家政策","columns":["文件标题","详细解读","发文编号","发布单位","发布日期","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","values":["国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","文件提出建立煤电容量电价机制，将现行煤电单一制电价调整为两部制电价：电量电价通过市场化方式形成，反映市场供需和燃料成本变化；容量电价按回收煤电机组一定比例固定成本确定，体现煤电支撑调节价值。实施范围为合规在运的公用煤电机组，不包括燃煤自备电厂、不符合规划或不满足能耗环保和灵活调节要求的机组。容量电费根据当地容量电价和机组申报最大出力确定，由电网企业按月结算，并纳入系统运行费用，由工商业用户按当月用电量比例分摊、滚动清算。文件还规定跨省跨区外送煤电机组容量电费分摊、最大出力申报和考核要求，机组未能按调度指令提供申报出力时将扣减容量电费，严重情况下取消获取资格。该机制自2024年1月1日起实施，是我国从单一电量价值向电量价值和容量价值并重转型的重要政策。","发改价格〔2023〕1501号","国家发展改革委、国家能源局","2023-11-10","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).html","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","values":["国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","文件提出深化新能源上网电价市场化改革，要求推动风电、太阳能发电等新能源上网电量原则上全部进入电力市场，并通过市场交易形成价格。文件同时建立新能源可持续发展价格结算机制，区分存量项目和增量项目，保持存量项目政策衔接，稳定增量项目收益预期。对纳入机制的电量，电网企业按机制电价与市场交易均价开展差价结算，相关差额纳入当地系统运行费用。文件还要求完善现货市场和中长期市场交易价格机制，推动新能源公平参与实时市场、加快自愿参与日前市场，并允许供需双方结合新能源出力特点安排中长期合同量价、曲线和偏差责任。各地需制定具体方案，做好测算、宣传、监管和结算归集，并与绿证、消纳责任权重、市场监管等政策协同。","发改价格〔2025〕136号","国家发展改革委、国家能源局","2025-02-09","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).html","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","values":["国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","文件在煤电容量电价机制基础上，提出分类完善发电侧容量电价机制，更好统筹保供、转型和市场效率。它要求各地按发改价格〔2023〕1501号将煤电通过容量电价回收固定成本比例提升至不低于50%，并可结合市场建设和煤电利用小时数进一步提高；省级价格主管部门可对天然气发电建立容量电价机制。文件还完善抽水蓄能容量电价机制，对不同开工时间的抽水蓄能电站设置不同核价与市场收益分享安排；提出建立电网侧独立新型储能容量电价机制，对服务系统安全、未参与配储的项目可按顶峰能力给予容量电价。现货市场连续运行后，文件要求有序建立发电侧可靠容量补偿机制，对机组在顶峰时段能够持续稳定供电的可靠容量按统一原则补偿，并与原容量电价政策衔接，避免重复补偿。文件同时要求完善市场交易、结算、区域共用抽水蓄能容量电费分摊、用户承受能力评估和容量电费考核等配套政策。","发改价格〔2026〕114号","国家发展改革委、国家能源局","2026-01-30","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).html","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力市场注册基本规则》的通知","values":["国家能源局关于印发《电力市场注册基本规则》的通知","文件建立全国统一的电力市场注册基础规则，规范经营主体注册、信息维护、变更和注销。它为各省交易规则提供共同底座：主体须提交真实信息，交易机构依规办理并维护注册信息，相关主体需配合信息共享和监管。参与者应先完成注册，再依据本省规则确认可参与的交易品种、履约要求与申报流程。","国能发监管规〔2024〕76号","国家能源局","2024-09-13","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).html","有效","2026-07-14"]}]},{"name":"江苏","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"江苏｜中长期交易","values":["中长期交易","江苏2026版中长期实施细则用于规范年度、月度、月内等中长期交易，重点是衔接现货市场和国家基础规则，明确经营主体注册后参与交易、合同执行、结算与风险管理的基本框架。","已完成电力市场注册、符合江苏市场准入要求的发电企业、售电公司、电力用户等经营主体；新型经营主体按江苏后续配套要求执行。","经营主体应按交易公告和市场规则申报、成交、签订或确认合同，履行结算、信息披露和合规义务；市场运营机构按规则组织交易并做好信息披露和风险防控。","以完成电力市场注册为基础，并满足江苏细则及交易公告对交易品种、信用、履约、计量和结算账户等要求。","注册入市后，关注交易公告，按年度、月度、月内等周期申报电量、电价或曲线，成交后形成合同或交易确认，进入执行、结算和偏差处理。","按合同执行、偏差处理、信息披露、履约保障和市场监管要求考核；违规或不履约按细则、市场监管办法和交易公告处理。","关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","未见正式文号","https://jsb.nea.gov.cn/dtyw/tz/202603/t20260306_297521.html","source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).html","有效","2026-07-14"]}]},{"name":"浙江","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"浙江｜现货电能量、调频辅助服务","values":["现货电能量、调频辅助服务","浙江现货市场已转入正式运行，形成1+7现货规则体系，并推进调频与电能量联合出清。2025年底三项细则修订又补充新能源、储能、市场力监测、风险处置和计量单位统一等要求。","符合浙江现货市场规则的发电企业、新能源项目、储能电站、售电公司、电力用户及其他可参与主体；调频辅助服务参与者需满足调节性能和技术参数要求。","主体需按现货规则报量报价或接受市场形成价格，遵守市场力监测、风险处置、信息保密、从业回避和数字化监管要求；新能源、储能入市门槛和交易参数按细则执行。","完成注册并满足现货或辅助服务市场准入、计量、通信、技术支持系统和调度运行要求；储能和新能源按修订细则的入市门槛执行。","按日前、实时及辅助服务交易组织要求申报，市场出清后执行调度与结算；调频和电能量可联合出清。","通过市场运营监管、市场力监测、风险处置和专项监管约束；违规报价、串通报价、操纵市场等行为依法处理。","浙江能源监管办推动浙江电力现货市场转入正式运行；浙江能源监管办完成电力市场三项实施细则修订","浙监能市场〔2024〕4号；未见正式文号","https://zjb.nea.gov.cn/dtyw/jgdt/202509/t20250923_287902.html；https://zjb.nea.gov.cn/dtyw/jgdt/202512/t20251202_291553.html","source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).html；source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).html","有效","2026-07-14"]},{"title":"浙江｜中长期、零售、市场管理、结算","values":["中长期、零售、市场管理、结算","浙江2026年修订并发布四项细则，形成中长期交易、零售套餐、市场管理和结算口径的组合规则。它不仅管批发侧交易，也覆盖售电公司与用户的零售关系、结算和市场秩序。","浙江已注册经营主体，包括发电企业、售电公司、电力用户，以及符合条件的新型主体；零售市场重点涉及售电公司和零售用户。","同一投资主体市场份额、代理购电偏差电量结算、分时电价机制等被纳入规则衔接重点；经营主体需遵守市场管理、交易组织和结算实施细则。","完成注册并满足中长期或零售交易资格；售电公司需符合履约、信用和零售套餐公示等管理要求；用户侧按直接交易或零售代理关系参与。","主体按细则和交易公告参与中长期交易或签订零售套餐；成交或签约后按结算细则进行电量、电价、电费确认。","市场运营机构依据市场管理实施细则监管异常交易、市场秩序和结算执行；违规行为按浙江市场管理规则和监管要求纠偏。","浙江组织开展电力中长期市场等4项实施细则修订工作","未见正式文号","https://zjb.nea.gov.cn/dtyw/jgdt/202603/t20260304_297397.html","source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).html","有效","2026-07-14"]}]},{"name":"山西","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"山西｜中长期交易、绿色电力交易","values":["中长期交易、绿色电力交易","山西2026年中长期细则把中长期、现货衔接和绿电交易合在一个更完整框架下，新增小时级绿电交易，完善月内旬交易、合同转让、结算、信息披露和风险防控。","已注册经营主体，包括发电企业、售电公司、电力用户、新能源主体及符合条件的新型经营主体；绿电交易主体按绿电专章要求参与。","交易品种覆盖数年、年、多月、季、月、月内等周期；售电公司可申报电量与履约保函挂钩，设置新能源交易电量约束、用户侧缺额与超额回收、发用两侧金融套利约束。","完成市场注册，满足交易品种、信用履约、技术支持系统和绿电交易专章要求；小时级绿电交易需按小时计量、申报、出清和结算。","通过双边协商、集中竞价、挂牌、合同转让、日滚动交易等方式申报成交；年度合同需明确年分月、月分日、日分时曲线。","市场信息按年、季、月、周、日等周期披露，信息保存和封存有明确要求；监管机构可对串谋、操纵市场、异常行为采取整改、处罚、账号冻结和中止交易等措施。","山西电力中长期市场实施细则","晋监能市场规〔2026〕1号","https://sxb.nea.gov.cn/xxgk/zcjd/202605/t20260527_301835.html","source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).html","有效","2026-07-14"]}]},{"name":"湖北","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"湖北｜中长期交易","values":["中长期交易","湖北2026年中长期细则依据国家基础规则修订，经征求意见和市场管理委员会审议后印发，用于规范经营主体参与中长期交易、合同执行、结算、信息披露和风险防控。","国网华中分部、国网湖北省电力有限公司、湖北电力交易中心以及各发电企业、售电公司、电力用户和相关经营主体。","电力交易机构需做好宣贯培训、信息披露、风险防控；经营主体应按细则和交易公告参与交易并履行合同与结算义务。","完成市场注册并符合湖北交易规则、交易品种和信用履约要求。","按中长期交易公告开展申报、成交、合同确认、执行和结算；执行中重大问题应及时报告。","通过信息披露、风险防控和监管要求约束；违规行为按电力市场监管规则处理。","关于印发《湖北省电力中长期市场实施细则》的通知","华中监能市场规﹝2026﹞39号","https://hzj.nea.gov.cn/dtyw/tzgg/202604/t20260414_299623.html","source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).html","有效","2026-07-14"]}]},{"name":"四川","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","状态","最后核验日期"],"rows":[{"title":"四川｜中长期、零售、绿电、代理购电相关交易","values":["中长期、零售、绿电、代理购电相关交易","四川细则共14章122条，覆盖市场成员、批发和零售交易、交易校核、合同、计量结算、信息披露、技术系统、风险防控和法律责任。它把虚拟电厂等新型主体纳入市场，并强调中长期与现货衔接。","发电企业、售电公司、电力用户、虚拟电厂等资源聚合类新型经营主体，电网企业代理购电和保障性用电相关主体按细则参与。","主体需履行权责：售电公司公示零售套餐并管理签约用户，发电企业提供有效容量和运行信息，用户履行可再生能源消纳责任，运营机构加强市场监测分析。","按国家注册基本规则完成注册、变更或注销；工商业用户直接参与市场选择周期缩短至一个月；新型主体需与分散资源签订聚合服务合同。","可参与水电、新能源、燃煤火电等多类型电源同台竞争的中长期交易；代理购电、保障性用电、省间中长期外购挂牌交易可采用挂牌方式；中长期交易逐步按日连续开市。","交易校核由交易出清校核和电网安全校核分工承担；结算统一衔接国家计量结算规则，四川中长期暂采用差价结算；风险防控、争议处置和法律责任按细则执行。","四川电力中长期市场实施细则","未见正式文号","https://scb.nea.gov.cn/xxgk/zcjd/202606/t20260603_302382.html","source-files/2026-04-10-四川电力中长期市场实施细则(未见正     let activeSheetIndex = 0;
    let visibleRows = [];

    const longLabels = new Set(["详细解读", "政策/规则总结", "通俗解释", "适用对象", "管理要求", "准入条件", "参与流程", "考核方式", "说明"]);
    const tabs = document.getElementById("tabs");
    const tableWrap = document.getElementById("tableWrap");
    const searchInput = document.getElementById("searchInput");
    const sheetMeta = document.getElementById("sheetMeta");
    const modal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalDetails = document.getElementById("modalDetails");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderLinks(value, linkText) {
      return String(value ?? "")
        .split("；")
        .filter(Boolean)
        .map((url, index) => '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">' + linkText + (index + 1) + '</a>')
        .join("<br>");
    }

    function renderCell(label, value) {
      if (label === "链接") return renderLinks(value, "官方链接");
      if (label === "查看文件") return renderLinks(value, "查看文件");
      const safe = escapeHtml(value);
      if (longLabels.has(label) || safe.length > 90) return '<div class="clamped-text">' + safe + '</div>';
      if (label === "状态" && value === "待核验") return '<span class="badge">待核验</span>';
      return safe || '<span class="hint">未收录</span>';
    }

    function rowSearchText(sheet, row) {
      return sheet.columns.concat(row.values).join(" ").toLowerCase();
    }

    function renderTabs() {
      tabs.innerHTML = appData.sheets.map((sheet, index) => {
        const active = index === activeSheetIndex ? " active" : "";
        return '<button class="tab' + active + '" type="button" onclick="switchSheet(' + index + ')">' + escapeHtml(sheet.name) + '</button>';
      }).join("");
    }

    function renderTable() {
      const sheet = appData.sheets[activeSheetIndex];
      const query = searchInput.value.trim().toLowerCase();
      visibleRows = sheet.rows.filter((row) => !query || rowSearchText(sheet, row).includes(query));
      sheetMeta.innerHTML = '<span>当前页：<strong>' + escapeHtml(sheet.name) + '</strong></span><span>显示 ' + visibleRows.length + ' / ' + sheet.rows.length + ' 条</span>';

      if (visibleRows.length === 0) {
        tableWrap.innerHTML = '<div class="empty">没有匹配记录</div>';
        return;
      }

      const header = sheet.columns.map((column) => '<th>' + escapeHtml(column) + '</th>').join("") + '<th>详情</th>';
      const rows = visibleRows.map((row, rowIndex) => {
        const cells = sheet.columns
          .map((column, columnIndex) => '<td>' + renderCell(column, row.values[columnIndex]) + '</td>')
          .join("");
        return '<tr>' + cells + '<td><button class="detail-button" type="button" data-detail-index="' + rowIndex + '" onclick="openDetail(' + rowIndex + ')">查看详情</button></td></tr>';
      }).join("");
      tableWrap.innerHTML = '<table><thead><tr>' + header + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function switchSheet(index) {
      activeSheetIndex = index;
      searchInput.value = "";
      renderTabs();
      renderTable();
    }

    function openDetail(rowIndex) {
      const sheet = appData.sheets[activeSheetIndex];
      const row = visibleRows[rowIndex];
      modalTitle.textContent = row.title || sheet.name;
      modalDetails.innerHTML = sheet.columns.map((column, columnIndex) => {
        const value = column === "链接" ? renderLinks(row.values[columnIndex], "官方链接") : column === "查看文件" ? renderLinks(row.values[columnIndex], "查看文件") : escapeHtml(row.values[columnIndex] || "未收录");
        return '<dt>' + escapeHtml(column) + '</dt><dd>' + value + '</dd>';
      }).join("");
      modal.classList.add("open");
    }

    function closeModal() {
      modal.classList.remove("open");
    }

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });
    searchInput.addEventListener("input", renderTable);

    renderTabs();
    renderTable();
  </script>
</body>
</html>
