算试运行第6版）","detail":"### 文件定位\n- 文本用于规范参与安徽现货市场的市场主体准入和退出，涉及发电企业、售电公司、电力用户和新型市场主体的定义、注册及资料管理。\n- 参与主体需满足现货市场所需的电力、电量、计量、通信和技术支持等条件，并按要求提交身份、企业和基础参数信息。\n\n### 准入与退出\n- 新型市场主体参与现货交易时，需完成相应注册并满足技术和业务要求；市场运营机构可对影响交易组织的机组商业运行、容量调整等关键信息进行管理。\n- 退出包括申请退出和强制注销。已选择市场化交易的经营主体原则上不得自行退出；符合正当理由退出的，应履行申请、公示、合同处理和结算等程序。\n- 省交易中心受理自愿退出申请后通过交易平台等渠道公示，无异议后方可办理；售电公司退出还需遵循售电公司管理办法。\n\n### 状态说明\n- 本条为用户提供的结算试运行第6版原文，尚未找到对应官方公告或附件直链，准入门槛和退出条件需以主管部门或交易中心最终公开版本为准。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货市场准入退出实施细则（结算试运行第6版）","markdownFilePath":"knowledge-markdown/doc-ah-2025-spot-entry-exit-6/政策正文.md","sourceFilePath":"source-files/2025-12-30-安徽电力现货市场准入退出实施细则（结算试运行第6版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"b9b6d01d401194d258f3bf2ab13bfb563d780d09bb22bd2ba020856c1d6de5e8"}}],"values":["安徽电力现货市场准入退出实施细则（结算试运行第6版）","第6版准入退出细则规定参与安徽现货市场的主体需满足资质、技术和注册信息要求；退出分为申请退出和强制注销，并要求处理未履约合同和结算事项。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2025-12-30","安徽","https://pmos.ah.sgcc.com.cn/","source-files/2025-12-30-安徽电力现货市场准入退出实施细则（结算试运行第6版）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力现货市场信息披露实施细则（结算试运行第6版）","detail":"### 文件定位\n- 文本规范安徽现货市场信息披露，适用于市场经营主体和市场运营机构；主要披露平台为安徽电力市场交易系统。\n- 信息披露应遵循安全、真实、准确、完整、及时、易于使用原则，并按公开范围区分公众信息、公开后信息、特定信息和保密信息。\n\n### 披露内容与时限\n- 发电企业、售电公司、电力用户和新型主体需披露基本信息、关联关系、经营和履约相关信息；市场运营机构需披露交易公告、交易申报与结果、出清算法和运行参数、价格限值、结算总体情况、市场主体注册及信用评价等信息。\n- 基本信息原则上在市场准入完成后10个工作日内披露；现货市场边界、预测等信息及日清分结算依据按细则规定的时间节点发布，其中日清分依据原则上在运行日后6个工作日内披露。\n- 细则另设信息变更、监督管理、保密责任和违规处理要求。\n\n### 状态说明\n- 本地原文已完整归档，但未定位到对应官方发布页或官方附件直链，披露清单与时限应以最终公开有效版本为准。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货市场信息披露实施细则（结算试运行第6版）","markdownFilePath":"knowledge-markdown/doc-ah-2025-spot-information-disclosure-6/政策正文.md","sourceFilePath":"source-files/2025-12-30-安徽电力现货市场信息披露实施细则（结算试运行第6版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"427f78a1d5d680045ab800b931bee38600243e9e35461157b0cf28f772ec8259"}}],"values":["安徽电力现货市场信息披露实施细则（结算试运行第6版）","第6版信息披露细则要求市场主体和运营机构通过安徽电力市场交易系统披露真实、准确、完整、及时的信息，并规定公开、公开后、特定和保密信息的范围及时限。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2025-12-30","安徽","https://pmos.ah.sgcc.com.cn/","source-files/2025-12-30-安徽电力现货市场信息披露实施细则（结算试运行第6版）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"浙江能源监管办完成电力市场三项实施细则修订","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频**辅助服务**市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。\n- 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。\n- 此次修订的背景包括发改价格〔2025〕136号新能源上网电价市场化改革、《电力市场计量结算基本规则》以及浙江2026年电力市场交易方案，说明浙江正在把新能源、储能、计量结算和市场管理纳入现货正式运行后的统一规则框架。\n\n### 三项细则覆盖范围\n- 官方页面列出六方面变化：一是明确储能入市机制，规定储能电站参与现货电能量市场和调频**辅助服务**市场的入市门槛、交易机制和参数，解决储能以何种身份、何种技术参数参与市场的问题。\n- 二是明确新能源入市机制，规定新能源参与现货电能量市场的门槛、交易机制和参数，并增加新能源优先消纳原则，即火电与新能源报价相同时新能源优先出清。\n\n### 零售与结算重点\n- 三是补充风险处置定义和措施，将市场风险细分为不同等级并匹配相应处置手段，为市场异常、系统风险或主体风险提供操作依据。\n- 四是完善市场力监测规则，补充市场力指标、计算公式、参数设置和缓解措施，强化对可能操纵价格或影响出清结果行为的监管。\n- 五是合并历次市场管理委员会公告，提升市场管理规则的一致性和可查询性。\n\n### 市场管理要求\n- 六是按照国家计量结算规则统一电量、电价、电费计量单位，减少结算口径不一致带来的争议。\n- 对经营主体来说，这次修订直接影响新能源和储能能否参与、如何报价、如何出清、如何结算以及发生风险时如何处置；\n\n### 主体影响\n- 对售电公司和用户来说，新能源优先出清、储能参与调频和现货、市场力缓解措施都会影响价格曲线和偏差风险；\n- 对监管机构来说，修订强化了浙江现货正式运行后的市场秩序管理。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办完成电力市场三项实施细则修订","markdownFilePath":"knowledge-markdown/doc-zj-2025-three-rules/政策正文.md","sourceFilePath":"source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"592c7a414e9badddd73b55d0ab46dd12acddab512d650858144f90091c6dcdef"}}],"values":["浙江能源监管办完成电力市场三项实施细则修订","浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频辅助服务市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。","未见正式文号","国家能源局浙江监管办公室","2025-12-02","浙江","https://zjb.nea.gov.cn/dtyw/jgdt/202512/t20251202_291553.html","source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江能源监管办推动浙江电力现货市场转入正式运行","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，浙江电力**现货市场**于2025年8月7日转入正式运行，成为长三角地区首个正式运行的**现货市场**。\n- 页面说明浙江已印发《浙江电力**现货市场**规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”**现货市场**规则体系；\n\n### 现货市场运行基础\n- 本条来源为监管动态页面，未见可读取的7个细则附件全文，因此解读限于官方页面明确披露内容。\n- 浙江现货规则体系的重点在于从**中长期**合同为主的交易框架，进一步进入日前、实时等更能反映时段供需和电网约束的价格形成机制。\n\n### 中长期与现货衔接\n- 官方页面特别强调浙江在国内率先推进调频**辅助服务**与电能量市场联合出清，这意味着调频资源不再只是事后补偿，而是在市场出清中同时考虑调频机会成本和调节成本，从而让电能量价格和**辅助服务**价格更协调地反映系统平衡需求。\n- 页面还提到浙江建立市场运营监管规则、市场力监测和缓解机制、风险防控机制以及数字化监管体系，形成100余项监管指标，并开展市场秩序专项监管，查处发电企业串通报价等典型案件。\n\n### 主体影响\n- 对发电企业来说，现货正式运行后报价行为、机组可用容量、调频性能、日前和实时出清结果都会直接影响收入和合规风险；\n- 对售电公司和电力用户来说，**中长期**合约只是风险管理工具，实际用电偏差和现货价格波动会传导到结算，需要关注合同曲线、偏差风险和零售套餐设计；\n\n### 后续规则关注\n- 对监管机构和市场运营机构来说，重点是持续监测市场力、异常报价、串通行为和系统运行风险。\n- 该文件的意义不是单个交易公告，而是确认浙江**现货市场**已经进入正式运行阶段，并形成电能量、调频**辅助服务**、风险防控、市场力监管和数字化监管共同支撑的市场体系。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办推动浙江电力现货市场转入正式运行","markdownFilePath":"knowledge-markdown/doc-zj-2025-spot-formal/政策正文.md","sourceFilePath":"source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"31b14993f6595ea30fb54409a341a891263dbe2561ad542cf388f640c67701d7"}}],"values":["浙江能源监管办推动浙江电力现货市场转入正式运行","浙江能源监管办公开信息显示，浙江电力现货市场于2025年8月7日转入正式运行，成为长三角地区首个正式运行的现货市场。 页面说明浙江已印发《浙江电力现货市场规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”现货市场规则体系； 现货市场运行基础 本条来源为监管动态页面，未见可读取的7个细则附件全文，因此解读限于官方页面明确披露内容。","浙监能市场〔2024〕4号","国家能源局浙江监管办公室、浙江省能源局","2025-09-15","浙江","https://zjb.nea.gov.cn/dtyw/jgdt/202509/t20250923_287902.html","source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","detail":"### 文件定位与直接要求\n- 这是国家层面对**电力辅助服务市场**的基础性规则，正文《电力辅助服务市场基本规则》共12章67条，覆盖市场设立、注册、运行、结算、信息披露、风险防控和监管等全过程。\n- 通知正文要求国家能源局派出机构会同省级价格、能源主管部门，依据本规则和发改价格〔2024〕196号等文件，及时组织市场运营机构制修订本地区辅助服务市场实施细则，维护统一、公平的竞争制度。\n- 对已经连续运行电力现货市场的地区，文件特别要求完善现货市场规则、适当放宽市场限价，引导现货市场实现调峰功能；调峰、顶峰、调峰容量等具有类似功能的市场不再运行，避免同一系统调节价值被重复补偿。\n- 派出机构还需会同省级价格主管部门等单位，对辅助服务市场运行、资金使用、执行效果开展年度评估，重大问题及时报告国家发展改革委、国家能源局。\n\n### 市场是什么、为谁服务\n- 规则把电力辅助服务定义为：为维持电力系统安全稳定运行、保证电能质量，除正常电能生产、输送、使用之外，由可调节资源提供的**调峰、调频、备用、爬坡**等服务。\n- 对初学者可以理解为：电能量市场主要解决“发多少电、用多少电、什么价格成交”，辅助服务市场解决“系统怎么稳、频率怎么稳、尖峰低谷怎么调、突发波动谁来兜底”。\n- 文件的总原则是安全经济、统一开放、公平公正、竞争有序，并按照“谁提供、谁获利，谁受益、谁承担”优化价格形成和费用传导，鼓励更多可调节资源主动参与系统调节。\n\n### 市场成员与准入注册\n- 市场成员包括经营主体、电网企业和市场运营机构。经营主体范围不仅包括发电企业、售电企业、电力用户，也明确纳入**新型经营主体**，例如储能企业、**虚拟电厂**、智能微电网、车网互动运营企业等。\n- 能提供辅助服务的主体应满足电力市场要求，具备可观、可测、可调、可控能力，主要包括火电、水电、新型经营主体等可调节资源；获得容量电费的经营主体原则上也应参与辅助服务市场申报。\n- 经营主体原则上应具有法人资格或取得法人授权，依法取得电力业务许可证但符合豁免政策的除外，并具备独立财务核算、良好信用，以及接收和执行市场出清结果或调度指令的技术能力。\n- 经营主体必须先在电力交易机构完成市场注册，才能参与辅助服务交易；注册信息变化要办理变更，因退役、破产、政策调整、系统约束等原因退出时，要结清费用并处理未履约合同。\n\n### 市场如何设立和开新品种\n- 电力调度机构根据系统安全稳定运行需要、电能量市场建设情况等提出辅助服务市场建设需求，形成需求分析报告，说明本地区系统运行特点、建设必要性、影响因素和工作建议。\n- 国家能源局派出机构会同省级价格、能源主管部门组织论证需求合理性，并制定交易品种、交易机制、价格机制、限价标准、费用传导方式等实施方案；方案需报国家能源局，并经国家发展改革委同意后实施。\n- 在实施细则层面，派出机构会同省级主管部门组织市场运营机构起草规则，结合系统安全需要、服务成本、历史数据、模拟测试结果、激励效果和电价影响等确定参数，广泛征求意见并经市场管理委员会审议后发布。\n- 新设辅助服务品种不能直接“上线即结算”，需要依次开展模拟试运行、结算试运行和正式运行；首次结算试运行和正式运行开始时间间隔不少于1年，以便验证技术系统、出清结果、调度执行和费用影响。\n\n### 主要交易品种\n| 品种 | 规则中的核心含义 | 适合小白的理解 |\n| --- | --- | --- |\n| 调峰服务 | 跟踪负荷峰谷变化和新能源出力变化，按调度指令或出清结果调整发用电功率，包括设备启停。 | 系统低谷时少发或多用，高峰时多发或少用，帮助削峰填谷。 |\n| 调频服务 | 通过调速系统、AGC、APC等减少系统频率偏差或联络线控制偏差，主要是二次调频。 | 当系统频率轻微偏离时，快速细调出力或负荷，让电网频率稳住。 |\n| 备用服务 | 为系统安全预留调节能力，并在需要时于规定时间内调整有功出力。 | 平时先留一部分能力不全用，突发缺口时能顶上。 |\n| 爬坡服务 | 应对新能源波动等引起的净负荷短时大幅变化，由具备较强调节速率的主体按指令调整出力。 | 当净负荷突然上升或下降时，资源能快速“爬上去”或“降下来”。 |\n\n### 交易组织、执行和考核\n- 电力调度机构负责提出各类辅助服务需求，经营主体按公告和规则提交容量、价格、成本等交易申报；调度机构根据申报和市场规则出清，并组织调用、计费和执行记录。\n- 辅助服务市场供给不足、暂停或中止交易期间，调度机构可以为保障系统安全对应急调节资源进行调用，但事后应及时披露相关情况。\n- 经营主体如果因自身原因未按交易结果提供有效辅助服务，需要依照市场规则承担违约责任；这意味着辅助服务收益不是无条件获得，必须与实际响应能力、响应质量和履约表现绑定。\n\n### 费用形成与传导\n- 具备市场条件的辅助服务品种，通过市场交易形成价格；尚不具备市场条件的品种，价格机制另行规定。\n- 不同品种计费要素不同：调峰服务可按出清价格、中标调峰出力、实际调峰出力或启停次数计算；调频服务按调频里程、性能系数、出清价格等计算；备用和爬坡服务按中标容量、中标时间、出清价格等计算；提供辅助服务过程中产生的电能量费用按电能量市场规则结算。\n- 费用传导遵循“谁受益、谁承担”。现货市场未连续运行地区，原则上不向用户侧疏导辅助服务费用；现货市场连续运行地区，符合规定的调频、备用等费用原则上由用户用电量和未参与电能量市场交易的上网电量共同分担，具体比例由省级价格主管部门确定。\n- 独立储能、虚拟电厂等“发用一体”主体，在结算时段内分别按上网电量和下网电量参与发电侧、用户侧辅助服务费用分摊或分享；跨省跨区交易双方也应根据辅助服务提供和受益情况公平承担或获得费用。\n\n### 与现货、中长期和容量机制的衔接\n- 文件要求统筹电能量市场和辅助服务市场，在注册、交易时序、出清、费用疏导等方面衔接，避免市场割裂。\n- 调频、备用、爬坡等有功辅助服务市场可以与现货市场独立出清，具备条件时推动与现货市场联合出清；经营主体提供辅助服务产生的电能量费用仍按电能量市场规则结算。\n- 对现货连续运行地区，具有类似调峰功能的单独市场要退出或转为电能量市场功能；区域调峰、存在电能量交换的区域备用等交易，也应及时转为电能量交易。\n- 对获得容量电费的主体，规则原则上要求其参与辅助服务市场申报，体现容量补偿、可靠供给和系统调节责任之间的衔接。\n\n### 计量结算、披露和监管\n- 计量和采集周期应满足辅助服务最小交易周期和精度要求，数据缺失时可按拟合规则补充；结算原则上采用“日清月结”，按日清分、按月出具结算依据，辅助服务费用在电费结算单中单独列示，不得与其他费用叠加打捆。\n- 市场运营机构应披露需求计算、调用原则、需求总量、申报出清、结算等信息；经营主体对披露信息有异议的，可在规定期限内提出，交易机构和调度机构应核实处理。\n- 风险防控覆盖供需风险、市场力操纵、价格异常、技术支持系统故障、网络安全等，市场运营机构要监测预警并报告，风险处置方案需明确等级、措施和责任。\n- 国家能源局及其派出机构负责监管，市场运营机构和电网企业要按要求报送价格、费用、收入、分摊和市场运行情况；争议可通过市场运营机构、市场管理委员会调解、监管协调、仲裁或司法途径处理。\n\n### 对各类主体的影响\n- 发电企业尤其是火电、水电等可调节资源，需要把辅助服务作为电能量之外的重要收益与考核来源，关注报价、出清、调用、性能评价和违约责任。\n- 储能、虚拟电厂、智能微电网、车网互动运营企业等新型主体获得了国家规则层面的参与身份，但仍要满足地方细则规定的计量、通信、调控、注册和技术接入要求。\n- 电力用户和售电公司不仅可能通过聚合、虚拟电厂等方式参与提供辅助服务，在现货连续运行地区也可能按受益原则分担部分辅助服务费用，因此需要关注当地费用传导细则。\n- 省级主管部门、派出机构、调度机构和交易机构需要把本规则转化为地方实施方案、实施细则、技术系统、信息披露和年度评估机制。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-411/政策正文.md","sourceFilePath":"source-files/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e331d1e70103806977daa999cd3f39746d0c7226ec6f8ee95e2aa7cb6ce2aa3e"}},{"title":"电力辅助服务市场基本规则.pdf","sourceTitle":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-411/电力辅助服务市场基本规则.pdf.md","sourceFilePath":"source-files/attachments/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号)/电力辅助服务市场基本规则.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e331d1e70103806977daa999cd3f39746d0c7226ec6f8ee95e2aa7cb6ce2aa3e"}}],"values":["国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","该文件统一规范省级及以上电力辅助服务市场，明确调峰、调频、备用、爬坡等品种，规定市场成员、设立流程、交易组织、费用传导、结算披露和监管要求。","发改能源规〔2025〕411号","国家发展改革委、国家能源局","2025-04-29","国家","https://www.ndrc.gov.cn/xxgk/zcfb/ghxwj/202504/t20250429_1397483.html","source-files/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号).pdf","电力辅助服务市场基本规则.pdf|source-files/attachments/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号)/电力辅助服务市场基本规则.pdf","有效","2026-07-15"]},{"title":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","detail":"### 文件定位\n- 华中监能市场规〔2025〕35号适用于湖北、江西、重庆三省（市）调频辅助服务市场，统一修订并替代了包括湖北2022版在内的原有规则。\n- 规则将调频辅助服务定义为经营主体通过调节有功出力，跟踪自动发电控制指令、维持系统频率稳定而提供的服务。\n\n### 交易机制与价格\n- 调频服务以调频里程为核心结算对象，经营主体按时段申报调频容量价格和调频里程价格；容量费用相关主体未申报时按规则自动参与。\n- 交易采用集中交易、日前预出清、日内滚动出清和实时调用的组织方式。日前按24个时段组织，规则设定容量价格上下限为5至15元/兆瓦。\n- 调频性能系数Kp由调节速率、调节精度和响应时间等构成，准入门槛为0.6；未达到门槛或不服从AGC指令的调频里程不予补偿。\n\n### 结算、考核与衔接\n- 市场日清月结，调频补偿以性能系数、实际调频里程和市场出清价格计算，并扣减相应考核费用。\n- 连续现货市场运行前，调频辅助服务费用原则上由发电侧承担；连续现货市场运行后，按规则由工商业用户和未参与电能量市场交易的发电主体共同分摊。\n- 市场设置信息披露、运行监测、市场干预、暂停与恢复以及违规处理机制。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-jx-cq-2025-frequency-regulation/政策正文.md","sourceFilePath":"source-files/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"b6335c75334b08cf3b7eabd1dfcc048d7c3da17a53b4048f0d0ddbe0d98798bf"}},{"title":"湖北、江西、重庆电力调频辅助服务市场运行规则.pdf","sourceTitle":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-jx-cq-2025-frequency-regulation/湖北、江西、重庆电力调频辅助服务市场运行规则.pdf.md","sourceFilePath":"source-files/attachments/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号)/P020250402414856913103.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"cb963993905ba8a0d18e78db4819ae8a6e683bac79ad1c6b449c91ea16d14b3c"}}],"values":["国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","现行三省联合调频规则以调频里程为结算基础，采用容量和里程报价、日前预出清与日内滚动出清，明确Kp准入、性能考核、日清月结和费用分摊。","华中监能市场规〔2025〕35号","国家能源局华中监管局","2025-04-02","湖北","https://hzj.nea.gov.cn/dtyw/tzgg/202504/t20250402_279001.html","source-files/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号).pdf","湖北、江西、重庆电力调频辅助服务市场运行规则.pdf|source-files/attachments/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号)/P020250402414856913103.pdf","有效","2026-07-16"]},{"title":"国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","detail":"### 文件定位与目标\n- 发改能源〔2025〕357号由国家发展改革委、国家能源局联合印发，是国家层面推进虚拟电厂发展的专项指导文件。\n- 文件明确，到2027年全国虚拟电厂调节能力达到2000万千瓦以上，到2030年达到5000万千瓦以上，并要求形成成熟规范的建设运行管理和市场参与机制。\n\n### 定义、定位与发展方式\n- 虚拟电厂是运用信息通信、系统集成控制等技术，聚合分布式电源、可调节负荷、储能等资源，以新型经营主体身份协同参与电力系统优化和市场交易的电力运行组织模式。\n- 它可提供调峰、调频、备用等服务，组织需求响应，并聚合分散资源参与交易。省级主管部门应结合资源条件和调节需要制定发展方案、建设运行管理办法，鼓励各类社会资本特别是民营企业参与。\n\n### 接入、聚合与市场机制\n- 各地应明确项目建设、接入管理、系统调试、能力检测和上线运行流程。参与需求响应的虚拟电厂接入新型电力负荷管理系统；参与现货或辅助服务市场的，应接入调度自动化系统或按规则接入负荷系统。\n- 运营商应具备资源监测、预测、指令分解执行能力；参与现货的聚合资源原则上位于同一出清节点，满足条件时可跨节点聚合。单一资源不得被多个虚拟电厂重复聚合。\n- 满足市场注册和对应市场准入后，虚拟电厂可独立参与中长期、现货和辅助服务市场；聚合期间分散资源不得重复参与交易。中长期和现货购售电业务还应具备售电公司资质。\n\n### 价格、考核与安全\n- 文件要求推进虚拟电厂公平参与电能量市场、辅助服务市场和市场化需求响应；辅助服务应向虚拟电厂开放，按其特点完善品种、技术要求、价格和考核机制。\n- 需求响应补偿和分摊遵循“谁服务、谁获利，谁受益、谁承担”，价格上限由省级价格主管部门研究确定。\n- 涉网虚拟电厂须接受统一调度，落实网络与数据安全、应急演练、资源清单变更和安全责任；同时推进聚合响应、并网调控、计量、数据交互和安全防护等标准体系建设。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-357/政策正文.md","sourceFilePath":"source-files/2025-03-25-关于加快推进虚拟电厂发展的指导意见(发改能源〔2025〕357号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"76ae82f7211a815682e24493bcccae5e81c9123860b2476e5ea51d49775b12f1"}}],"values":["国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","该意见首次在国家层面系统规范虚拟电厂定义、发展目标、接入调用、市场参与、安全与标准，明确其可参与中长期、现货、辅助服务市场和需求响应。","发改能源〔2025〕357号","国家发展改革委、国家能源局","2025-03-25","国家","https://www.gov.cn/zhengce/zhengceku/202504/content_7018244.htm","source-files/2025-03-25-关于加快推进虚拟电厂发展的指导意见(发改能源〔2025〕357号).pdf","","有效","2026-07-16"]},{"title":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","detail":"### 文件定位\n- 该文件是新能源上网电价市场化改革和**机制电价**、**机制电量**、**差价结算**等概念的直接来源。\n- 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成；\n- 跨省跨区交易按跨省跨区市场规则形成价格。\n- 它同时要求完善新能源参与现货和**中长期**市场的价格机制：**现货市场**中，新能源应公平参与实时市场并逐步自愿参与日前市场，报价上下限要与工商业峰谷电价、非市场化收益等因素衔接；\n\n### 新能源参与市场\n- **中长期**市场中，要适应新能源出力波动和预测不确定性，缩短交易周期、提高交易频次，支持周、多日、日等短周期交易，合同可以约定量价曲线、灵活价格形成方式和偏差责任。\n- **绿电**交易方面，文件要求绿色电力交易价格明确区分电能量价格和**绿证**价格，省内**绿电**交易初期不再单独组织集中竞价或滚动撮合，避免与常规电力交易割裂。\n- 为平稳衔接市场化改革，文件建立新能源可持续发展价格结算机制：纳入机制的电量仍参与市场交易形成市场交易价格，但电网企业每月按**机制电价**与市场交易均价进行**差价结算**，差额纳入当地**系统运行费用**。\n\n### 价格结算机制\n- 现货连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；\n- 现货未连续运行地区，按交易活跃周期内发电侧**中长期**交易同类项目加权平均价格确定。\n- 文件区分存量和增量项目：2025年6月1日前投产的存量项目，**机制电量**规模与现行保障性收购或保障利用小时等政策衔接，**机制电价**按现行价格政策确定且不高于当地煤电基准价，执行期限按原政策衔接；\n\n### 存量与增量项目安排\n- 2025年6月1日起投产的增量项目，纳入机制的电量规模、**机制电价**和执行期限原则上通过竞争性方式确定，竞价上限综合新能源成本、绿色价值、供需和用户承受能力等因素设置，执行期限结合同类项目合理回收初始投资期限确定。\n- 结算上，**机制电量**按年度规模分解到月，月度实际上网电量低于当月**机制电量**的，按实际电量结算并在年内滚动清算；\n- 项目可自愿退出机制，期满或退出后不再纳入机制。\n\n### 地方执行和约束\n- 文件还明确**绿证**收益和机制结算不能重复获得，同一新能源项目纳入机制的电量对应**绿证**收益应按政策衔接处理；\n- 电网企业可通过代理购电、单独归集等方式承接机制**差价结算**，相关费用纳入**系统运行费用**。\n- 地方层面，文件要求各省在2025年底前制定实施方案，做好项目测算、用户承受能力评估、政策宣传和市场监管，并强调不得将配置储能作为新能源项目核准、并网、上网等前置条件，不得乱收费，存量补贴项目仍按合理利用小时等政策享受原补贴。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"a178a1df20652ee5459eaff872f4e6095e09790c6166e46b702ff76bb8704c59"}}],"values":["国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","该文件是新能源上网电价市场化改革和机制电价、机制电量、差价结算等概念的直接来源。 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成； 跨省跨区交易按跨省跨区市场规则形成价格。","发改价格〔2025〕136号","国家发展改革委、国家能源局","2025-02-09","国家","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力市场注册基本规则》的通知","detail":"### 文件定位\n- 该文件印发《**电力市场注册**基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。\n- 规则适用于**中长期**、现货、**辅助服务**等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括**新型储能**、**虚拟电厂**、智能微电网等。\n- 文件强调注册管理要坚持规范入市、公开透明、全国统一和信息共享，原则上实行全国统一的注册事项清单，各地不得另行设置不合理的地方负面清单或附加条件；\n- 注册信息应在不同市场、不同交易机构之间共享，推动一地注册、全国共享。\n\n### 主体范围和基本条件\n- 主体基本条件方面，经营主体应具备独立承担民事责任能力、财务和信用条件，不存在严重失信且未完成信用修复等情形。\n- 发电企业需具有核准或备案手续、发电业务许可证或符合豁免条件、并网调度协议、调度自动化和计量条件；\n- 燃煤自备电厂还要符合能效、环保等要求。\n\n### 注册、变更和注销流程\n- 售电公司按售电公司管理规则执行。\n- 电力用户应具备符合交易和结算要求的计量条件，工商业用户可直接参与市场或由电网企业代理购电。\n- **新型储能**需具备并网调度协议、调度自动化、分时计量、最大充放电功率、容量和持续时长等信息；\n- **虚拟电厂**和负荷聚合商需具有负荷确认协议或调度协议，接入负荷管理、自动化或调控系统，具备资源聚合、监测和控制能力；\n\n### 新型经营主体要求\n- 分布式发电、充电设施、智能微电网等也分别提出备案、计量、调度或负荷管理要求。\n- 注册流程包括申请、承诺、审查、公示和生效，交易机构一般在5个工作日内完成审查，部分主体可按规定免于公示；\n- 经营主体同一合同周期内原则上只能与一家售电公司或**虚拟电厂**建立零售或聚合关系，多重身份需分别注册。\n\n### 监管责任\n- 信息变更方面，主体名称、法定代表人、股权或实际控制关系、许可证、机组参数、储能容量、售电公司和**虚拟电厂**资产与人员等重要信息变化后，应在5个工作日内办理变更，变更期间通常可继续参加交易。\n- 注销方面，破产、关停、政策变化、并网关系变化、机组退役、无工商业用电等情形可办理注销，注销前要处理未履约合同和电费清算，相关信息保留5年。\n- 文件还规定异议处理、虚假材料处理、保密义务、信用评价和监管责任，为后续各省规则中的准入、交易资格、履约担保和市场秩序管理提供基础依据。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力市场注册基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2024-76/政策正文.md","sourceFilePath":"source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"cebdea9215ed78b5725200352194b36c952d1a3a6bfbae414bd523e176acd057"}}],"values":["国家能源局关于印发《电力市场注册基本规则》的通知","该文件印发《电力市场注册基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。 规则适用于中长期、现货、辅助服务等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括新型储能、虚拟电厂、智能微电网等。","国能发监管规〔2024〕76号","国家能源局","2024-09-13","国家","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","detail":"### 文件定位\n- 该文件建立煤电**容量电价**机制，是从单一制煤电上网电价转向两部制电价的基础政策。\n- 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本；\n- **容量电价**按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。\n- 适用范围是合规在运的公用煤电机组，不包括燃煤自备电厂、不符合规划要求的煤电机组，以及能耗、环保、灵活调节能力不达标的机组。\n\n### 适用范围和电价机制\n- 文件规定全国煤电机组固定成本实行统一参考标准330元每千瓦年，2024年至2025年多数地方按约30%的固定成本回收比例确定**容量电价**，部分转型较快地区可按约50%执行；\n- 2026年起，各地通过**容量电价**回收煤电固定成本的比例原则上不低于50%。\n- 附件《省级电网煤电**容量电价**表》列明各省级电网2024年至2025年**容量电价**标准，多数省份为100元每千瓦年，部分省份为165元每千瓦年，并注明2026年后云南、四川等转型较快地区回收比例不低于70%、其他地区不低于50%。\n\n### 容量电费分摊\n- **容量电费**的计算方式是按当地**容量电价**乘以机组申报最大出力，由电网企业按月向煤电企业结算；\n- 新投产煤电机组自投运次月起执行。\n- **容量电费**不直接由某个用户单独承担，而是纳入**系统运行费用**，由工商业用户按当月用电量比例分摊并按月滚动清算，居民、农业等目录用户按现行政策衔接。\n\n### 考核扣减\n- 跨省跨区外送煤电机组另有分摊规则：纳入受电省电力电量平衡的配套煤电原则上按受电省**容量电价**执行，费用由受电省承担；\n- 多省共用的，按受电电量或容量分摊；\n- 未纳入受电省平衡的外送机组，**容量电费**原则上由送电省承担。\n\n### 执行衔接\n- 文件不是无条件补贴，还设置最大出力申报和考核：煤电机组未按调度指令达到申报最大出力的，月内出现2次扣减当月**容量电费**10%，3次扣减50%，4次及以上扣减100%；\n- 若一年内连续或累计多次被扣完**容量电费**，可能取消**容量电费**获取资格。\n- 文件要求省级价格主管部门制定本地执行方案，电网企业负责计算、分摊和结算，煤电企业如实申报最大出力并履行可用容量义务，同时与电力市场建设、煤电**中长期**合同、**辅助服务**和调峰补偿政策衔接，避免重复补偿。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/政策正文.md","sourceFilePath":"source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"0f4c734e60f59ecec31c23b776e4fb4aa22020aa6d78f8402a5487b115127722"}},{"title":"省级电网煤电容量电价表.pdf","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/省级电网煤电容量电价表.pdf.md","sourceFilePath":"source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","extraction":{"method":"ocr","ocrStatus":"success","extractedAt":"2026-07-16","sourceHash":"3fa07f2beb80e9b2e1f376be0bb5eac47ef8cc0e54244bed48c3f7d88fa27c06"}}],"values":["国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","该文件建立煤电容量电价机制，是从单一制煤电上网电价转向两部制电价的基础政策。 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本； 容量电价按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。","发改价格〔2023〕1501号","国家发展改革委、国家能源局","2023-11-10","国家","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","有效","2026-07-14"]},{"title":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","detail":"### 文件定位\n- 华中监能市场〔2022〕251号印发《湖北电力调频辅助服务市场运营规则》，于2022年11月发布，是湖北调频辅助服务市场早期运行规则。\n- 本文件已被华中监能市场规〔2025〕35号修订替代，保留在知识库中用于追溯2022年至2025年初的制度设计。\n\n### 市场机制\n- 规则以AGC或APC自动调节为基础，调频服务效果主要采用调频里程和性能指标衡量；市场采用日前预出清、日内滚动出清等组织方式。\n- 参与主体需满足调度运行、AGC或APC及性能测试等要求；性能系数低于规定门槛或不服从AGC指令的，可能失去补偿并受到限制。\n- 补偿以调频里程、性能系数和市场出清价格为核心，另配套容量补偿、偏差及违约考核安排。\n\n### 归档说明\n- 用户提供的PDF与国家能源局华中监管局公开附件内容一致，已以官方页面和附件链接归档。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2022-frequency-regulation/政策正文.md","sourceFilePath":"source-files/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"526f394fd002e3a0792aedb9ae7cf36700eef6f7cc88ecfc7a31e3c8a3636c80"}},{"title":"湖北电力调频辅助服务市场运营规则.pdf","sourceTitle":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2022-frequency-regulation/湖北电力调频辅助服务市场运营规则.pdf.md","sourceFilePath":"source-files/attachments/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号)/湖北电力调频辅助服务市场运营规则.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"fc4c2555333b13b8633d65e4b2926c7e1ff269a759836463a8c6d3904a25b433"}}],"values":["关于印发《湖北电力调频辅助服务市场运营规则》的通知","该历史规则明确湖北调频辅助服务以AGC或APC自动调节为基础，按调频里程、性能及市场价格补偿，并规范主体准入、报价、出清、结算和考核。","华中监能市场〔2022〕251号","国家能源局华中监管局","2022-11-08","湖北","https://hzj.nea.gov.cn/xxgk/zcfg/202310/t20231021_165676.html","source-files/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号).pdf","湖北电力调频辅助服务市场运营规则.pdf|source-files/attachments/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号)/湖北电力调频辅助服务市场运营规则.pdf","被替代","2026-07-16"]},{"title":"国家能源局关于印发《电力辅助服务管理办法》的通知","detail":"### 文件定位\n- 国能发监管规〔2021〕61号修订原《并网发电厂辅助服务管理暂行办法》，将其更名为《电力辅助服务管理办法》，用于规范电力辅助服务管理并深化市场机制建设。\n- 通知要求国家能源局各派出机构组织相关部门和单位制修订各地管理实施细则和市场交易规则，并报国家能源局备案。因此，国家办法提供统一管理框架，具体交易参数和补偿口径仍由区域、省级规则落地。\n\n### 服务分类与品种\n- 办法将电力辅助服务分为三类：**有功平衡服务**、**无功平衡服务**、**事故应急及恢复服务**。\n- 有功平衡服务包括调频、调峰、备用、转动惯量、爬坡等；无功平衡服务包括无功调节和自动电压控制（AVC）；事故应急及恢复服务包括稳定切机、稳定切负荷和黑启动等。\n- 这一区分明确了调频与调压的技术边界：调频围绕有功功率平衡、系统频率和联络线控制偏差，调压围绕无功平衡和电压质量。\n\n### 提供主体、补偿与分摊\n- 办法将辅助服务提供主体由传统发电厂扩展到适应新型电力系统需要的各类并网主体，鼓励新型储能、自备电厂、可调节负荷、电动汽车充电网络、聚合商、虚拟电厂等挖掘调节能力。\n- 补偿遵循“谁提供、谁获利；谁受益、谁承担”原则，可采用固定补偿或市场化补偿。固定补偿需综合考虑服务成本、性能表现和合理收益；市场化补偿应在合理价格区间内通过竞争形成价格。\n- 为系统整体服务的辅助服务，补偿费用由发电企业、市场化电力用户等并网主体共同分摊，并逐步将非市场化用户纳入分摊范围；为特定主体服务的，原则上由相应受益主体分摊。\n\n### 落地管理与主体影响\n- 各地细则和交易规则应明确提供主体范围、性能指标、服务品种、需求确定原则、市场出清机制、补偿分摊标准和信息披露要求，并与现货市场等机制衔接。\n- 电力用户可独立或委托代理参与辅助服务；调节能力不足的用户、聚合商和虚拟电厂，应按规则分摊费用或通过购买服务履行责任。\n- 跨省跨区送电配套电源需纳入辅助服务管理，原则上按调度关系在送端或受端参与，避免重复管理、重复补偿。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力辅助服务管理办法》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2021-61/政策正文.md","sourceFilePath":"source-files/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"c8c89bb6a8526f3ba3bc68af56709ded7d7bcc3644fd607c05163fba27dffead"}},{"title":"电力辅助服务管理办法.doc","sourceTitle":"国家能源局关于印发《电力辅助服务管理办法》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2021-61/电力辅助服务管理办法.doc.md","sourceFilePath":"source-files/attachments/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号)/1310391161_16403386137421n.doc","extraction":{"method":"office","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e1bc6b95d81c54f099f3c6f1d3c22a6dacc3fd74edc8b92626b83451c1da8844"}}],"values":["国家能源局关于印发《电力辅助服务管理办法》的通知","该办法规范电力辅助服务管理，按有功平衡、无功平衡、事故应急及恢复分类，明确调频、调压等服务的管理、补偿分摊、跨省衔接和地方细则制定要求。","国能发监管规〔2021〕61号","国家能源局","2021-12-21","国家","https://zfxxgk.nea.gov.cn/2021-12/21/c_1310391161.htm","source-files/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号).pdf","电力辅助服务管理办法.doc|source-files/attachments/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号)/1310391161_16403386137421n.doc","有效","2026-07-16"]}]},{"name":"国家政策","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"国务院关于印发《“十五五”碳达峰行动方案》的通知","detail":"### 文件定位和目标\n- 该文件由国务院印发，文号为国发〔2026〕22号，生态环境部官网转载来源为中国政府网。\n- 文件定位是“十五五”时期推进碳达峰的总纲性行动方案，目标是在2030年前确保如期实现碳达峰，并为2035年国家自主贡献目标和碳中和奠定基础。\n- 它不是一份单一电力市场交易规则，但对电力市场、价格机制、**绿证绿电**、**需求响应**、容量价值和新能源消纳均提出方向性要求，因此应作为国家层面电力市场相关政策背景入库。\n- 总体目标方面，方案提出到2030年单位国内生产总值二氧化碳排放比2025年降低17%，非化石能源消费占比达到25%。\n- 对电力行业而言，文件把能源绿色低碳转型作为关键，要求更大力度发展新能源，统筹开发布局和消纳利用，扩大非化石能源有效供给；\n\n### 能源结构与电力系统\n- 到2030年，风电和太阳能发电总装机达到28亿千瓦以上，常规水电装机4.1亿千瓦左右，核电运行装机1.1亿千瓦左右。\n- 电力系统建设方面，文件要求提升跨省跨区输电和互补互济能力，加快特高压外送通道建设，新增西电东送能力8000万千瓦以上，推进省间电力互济工程；\n- 同时支持新能源就地消纳，发展**绿电**直连、新能源就近接入增量配电网等**绿电**直供模式，推动源网荷储一体化。\n- **调节资源**方面，文件强调持续扩大电力系统**调节资源**规模，因地制宜建设**抽水蓄能**，推动**新型储能**规模化和长时储能发展，挖掘需求侧调节潜力，加快**虚拟电厂**发展，推动可调节负荷等分散资源参与系统调节；\n- 到2030年，**抽水蓄能**装机约1.6亿千瓦，**新型储能**装机力争3亿千瓦，全国**虚拟电厂**最大调节能力5000万千瓦以上，电力**需求响应**能力达到最大用电负荷5%以上。\n\n### 调节资源和煤电转型\n- 煤电定位方面，方案要求合理控制煤电装机规模和发电量，推动煤电向支撑性、调节性电源转型，支持煤电与新能源融合发展，开展煤电机组低碳化改造，并依法依规淘汰不符合环保、能耗、用煤、安全、年限等要求的煤电机组，推动自备机组参与电网调峰。\n- 产业和负荷侧方面，文件推动零碳园区、零碳工厂、绿色算力设施建设，支持园区、工业企业和算力设施开展**绿电**直连、工业绿色微电网、数字化能碳管理中心以及储能、备用电源等配套，这些内容会影响未来**绿电**交易、可再生能源消费、负荷聚合和源网荷储商业模式。\n- 价格政策是本文件与电力市场最直接相关的部分：方案要求深化各类电源上网电价市场化改革，落实新能源可持续发展价格结算机制和新能源就近消纳价格机制；\n- 对以输送清洁能源电量或联网功能为主的工程探索实行两部制电价或单一**容量电价**；\n\n### 价格政策和市场机制\n- 推动“沙戈荒”新能源基地作为整体参与市场交易；\n- 完善发电侧**容量电价**机制，有序建立发电侧**可靠容量补偿**机制；\n- 完善体现分时价值差异的零售市场价格机制，并探索建立反映调节能力的**需求响应**价格机制。\n- 市场化机制方面，方案要求加强全国碳排放权交易市场建设，积极发展全国温室气体自愿减排交易市场，高质量建设**绿证**市场，拓展**绿证**应用场景，健全**中长期绿证**、**绿电**交易制度，并加强碳市场、**绿证**、**绿电**等市场化机制衔接协同。\n- 对市场主体的影响是：发电企业需要关注新能源参与市场、容量价值、**可靠容量补偿**、煤电调节转型和**绿证**收益衔接；\n\n### 主体影响和执行注意\n- 电力用户、售电公司、**虚拟电厂**和负荷聚合商需要关注分时零售价格、**需求响应**、**绿电**消费、**绿证**核算和可调节负荷价值；\n- 地方政府和监管部门需要制定省级“十五五”碳达峰行动方案，并在综合评价考核、价格政策、市场机制和项目建设中落实。\n- 需要注意，文件多为国家战略和政策方向，具体准入条件、交易流程、结算口径、考核方式仍需结合后续国家部委细则和各省电力市场规则执行；\n- 本次入库未发现该网页另附官方附件。","browserFiles":[{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"418488a9a50a46ad8ec16c0bbf20c7b6fb7cac9432da33e78112e54b539983fa"}}],"values":["国务院关于印发《“十五五”碳达峰行动方案》的通知","该文件由国务院印发，文号为国发〔2026〕22号，生态环境部官网转载来源为中国政府网。 文件定位是“十五五”时期推进碳达峰的总纲性行动方案，目标是在2030年前确保如期实现碳达峰，并为2035年国家自主贡献目标和碳中和奠定基础。","国发〔2026〕22号","国务院","2026-07-05","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","detail":"### 文件定位\n- 该文件是在煤电**容量电价**机制基础上，进一步把容量价值覆盖到煤电、气电、**抽水蓄能**、**新型储能**等发电侧可靠资源的政策。\n- 文件的核心目标是分类完善**容量电价**机制，既保障电力系统长期容量充裕和顶峰安全，又推动新能源高比例接入后的**调节资源**建设，并与现货、**辅助服务**、**中长期**交易等市场衔接。\n- 煤电方面，文件要求各地继续按发改价格〔2023〕1501号执行煤电**容量电价**，并将通过**容量电价**回收煤电固定成本比例提高到不低于50%；\n- 地方可结合电力市场建设、煤电利用小时、保供压力和用户承受能力适当提高。\n\n### 煤电和气电容量价值\n- 气电方面，省级价格主管部门可根据当地天然气发电功能定位和固定成本回收情况建立**容量电价**机制，支持其承担顶峰、调节和保供作用。\n- **抽水蓄能**方面，文件区分不同开工节点：633号文以前核价项目继续执行既有政府定价机制；\n- 以后核价项目由省级价格主管部门按平均成本、合理收益等原则统一核定**容量电价**，原则上每3至5年校核一次，连续满发小时数低于6小时的按能力折算；\n\n### 抽水蓄能和新型储能\n- **抽水蓄能**参与电能量和**辅助服务**市场形成的收益按规则分享，剩余**容量电费**纳入**系统运行费用**。\n- **新型储能**方面，文件提出建立电网侧独立**新型储能容量电价**机制，前提是项目服务电力系统安全稳定运行、未作为新能源配储等方式重复保障，并按清单管理；\n- **容量电价**可参照当地煤电**容量电价**乘以顶峰容量折算系数确定，折算系数与储能持续充放电时长和当地最长净负荷尖峰持续时间相关，最高不超过1。\n\n### 可靠容量补偿\n- **可靠容量补偿**是文件的另一个重点：在电力**现货市场**连续运行后，省级价格主管部门会同有关部门适时建立发电侧**可靠容量补偿**机制，对自主参与当地市场、在系统顶峰时段能够持续稳定供电的煤电、气电、符合条件的电网侧独立**新型储能**等可靠容量按统一原则补偿，并逐步扩展到**抽水蓄能**等其他可靠资源。\n- 补偿标准应基于市场边际机组在电能量和**辅助服务**市场未能回收的固定成本，同时考虑电力供需、用户承受能力和市场建设进展；\n- 已经通过其他方式获得容量保障的部分不得重复补偿，政府定价机组不纳入。\n\n### 市场衔接和费用分摊\n- 政策衔接方面，一旦**可靠容量补偿**机制建立，纳入该机制的煤电、气电和独立储能不再执行原**容量电价**；\n- 新政策后核价的**抽水蓄能**可选择**可靠容量补偿**路径。\n- 文件还要求完善市场交易和结算配套，包括调整煤电**中长期**交易价格下限、不得强制固定价格、鼓励灵活价格机制、容量费用和**可靠容量补偿**纳入**系统运行费用**、区域共用**抽水蓄能**容量费按容量分配或受益分摊，以及在出台前开展用户承受能力和工商业电价影响评估。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2026-114/政策正文.md","sourceFilePath":"source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"95400b54e6b282c5d55d922bf88ed76cb34021396391c61d13dbab97e7e27d74"}}],"values":["国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","该文件是在煤电容量电价机制基础上，进一步把容量价值覆盖到煤电、气电、抽水蓄能、新型储能等发电侧可靠资源的政策。 文件的核心目标是分类完善容量电价机制，既保障电力系统长期容量充裕和顶峰安全，又推动新能源高比例接入后的调节资源建设，并与现货、辅助服务、中长期交易等市场衔接。","发改价格〔2026〕114号","国家发展改革委、国家能源局","2026-01-30","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","detail":"### 文件定位与直接要求\n- 这是国家层面对**电力辅助服务市场**的基础性规则，正文《电力辅助服务市场基本规则》共12章67条，覆盖市场设立、注册、运行、结算、信息披露、风险防控和监管等全过程。\n- 通知正文要求国家能源局派出机构会同省级价格、能源主管部门，依据本规则和发改价格〔2024〕196号等文件，及时组织市场运营机构制修订本地区辅助服务市场实施细则，维护统一、公平的竞争制度。\n- 对已经连续运行电力现货市场的地区，文件特别要求完善现货市场规则、适当放宽市场限价，引导现货市场实现调峰功能；调峰、顶峰、调峰容量等具有类似功能的市场不再运行，避免同一系统调节价值被重复补偿。\n- 派出机构还需会同省级价格主管部门等单位，对辅助服务市场运行、资金使用、执行效果开展年度评估，重大问题及时报告国家发展改革委、国家能源局。\n\n### 市场是什么、为谁服务\n- 规则把电力辅助服务定义为：为维持电力系统安全稳定运行、保证电能质量，除正常电能生产、输送、使用之外，由可调节资源提供的**调峰、调频、备用、爬坡**等服务。\n- 对初学者可以理解为：电能量市场主要解决“发多少电、用多少电、什么价格成交”，辅助服务市场解决“系统怎么稳、频率怎么稳、尖峰低谷怎么调、突发波动谁来兜底”。\n- 文件的总原则是安全经济、统一开放、公平公正、竞争有序，并按照“谁提供、谁获利，谁受益、谁承担”优化价格形成和费用传导，鼓励更多可调节资源主动参与系统调节。\n\n### 市场成员与准入注册\n- 市场成员包括经营主体、电网企业和市场运营机构。经营主体范围不仅包括发电企业、售电企业、电力用户，也明确纳入**新型经营主体**，例如储能企业、**虚拟电厂**、智能微电网、车网互动运营企业等。\n- 能提供辅助服务的主体应满足电力市场要求，具备可观、可测、可调、可控能力，主要包括火电、水电、新型经营主体等可调节资源；获得容量电费的经营主体原则上也应参与辅助服务市场申报。\n- 经营主体原则上应具有法人资格或取得法人授权，依法取得电力业务许可证但符合豁免政策的除外，并具备独立财务核算、良好信用，以及接收和执行市场出清结果或调度指令的技术能力。\n- 经营主体必须先在电力交易机构完成市场注册，才能参与辅助服务交易；注册信息变化要办理变更，因退役、破产、政策调整、系统约束等原因退出时，要结清费用并处理未履约合同。\n\n### 市场如何设立和开新品种\n- 电力调度机构根据系统安全稳定运行需要、电能量市场建设情况等提出辅助服务市场建设需求，形成需求分析报告，说明本地区系统运行特点、建设必要性、影响因素和工作建议。\n- 国家能源局派出机构会同省级价格、能源主管部门组织论证需求合理性，并制定交易品种、交易机制、价格机制、限价标准、费用传导方式等实施方案；方案需报国家能源局，并经国家发展改革委同意后实施。\n- 在实施细则层面，派出机构会同省级主管部门组织市场运营机构起草规则，结合系统安全需要、服务成本、历史数据、模拟测试结果、激励效果和电价影响等确定参数，广泛征求意见并经市场管理委员会审议后发布。\n- 新设辅助服务品种不能直接“上线即结算”，需要依次开展模拟试运行、结算试运行和正式运行；首次结算试运行和正式运行开始时间间隔不少于1年，以便验证技术系统、出清结果、调度执行和费用影响。\n\n### 主要交易品种\n| 品种 | 规则中的核心含义 | 适合小白的理解 |\n| --- | --- | --- |\n| 调峰服务 | 跟踪负荷峰谷变化和新能源出力变化，按调度指令或出清结果调整发用电功率，包括设备启停。 | 系统低谷时少发或多用，高峰时多发或少用，帮助削峰填谷。 |\n| 调频服务 | 通过调速系统、AGC、APC等减少系统频率偏差或联络线控制偏差，主要是二次调频。 | 当系统频率轻微偏离时，快速细调出力或负荷，让电网频率稳住。 |\n| 备用服务 | 为系统安全预留调节能力，并在需要时于规定时间内调整有功出力。 | 平时先留一部分能力不全用，突发缺口时能顶上。 |\n| 爬坡服务 | 应对新能源波动等引起的净负荷短时大幅变化，由具备较强调节速率的主体按指令调整出力。 | 当净负荷突然上升或下降时，资源能快速“爬上去”或“降下来”。 |\n\n### 交易组织、执行和考核\n- 电力调度机构负责提出各类辅助服务需求，经营主体按公告和规则提交容量、价格、成本等交易申报；调度机构根据申报和市场规则出清，并组织调用、计费和执行记录。\n- 辅助服务市场供给不足、暂停或中止交易期间，调度机构可以为保障系统安全对应急调节资源进行调用，但事后应及时披露相关情况。\n- 经营主体如果因自身原因未按交易结果提供有效辅助服务，需要依照市场规则承担违约责任；这意味着辅助服务收益不是无条件获得，必须与实际响应能力、响应质量和履约表现绑定。\n\n### 费用形成与传导\n- 具备市场条件的辅助服务品种，通过市场交易形成价格；尚不具备市场条件的品种，价格机制另行规定。\n- 不同品种计费要素不同：调峰服务可按出清价格、中标调峰出力、实际调峰出力或启停次数计算；调频服务按调频里程、性能系数、出清价格等计算；备用和爬坡服务按中标容量、中标时间、出清价格等计算；提供辅助服务过程中产生的电能量费用按电能量市场规则结算。\n- 费用传导遵循“谁受益、谁承担”。现货市场未连续运行地区，原则上不向用户侧疏导辅助服务费用；现货市场连续运行地区，符合规定的调频、备用等费用原则上由用户用电量和未参与电能量市场交易的上网电量共同分担，具体比例由省级价格主管部门确定。\n- 独立储能、虚拟电厂等“发用一体”主体，在结算时段内分别按上网电量和下网电量参与发电侧、用户侧辅助服务费用分摊或分享；跨省跨区交易双方也应根据辅助服务提供和受益情况公平承担或获得费用。\n\n### 与现货、中长期和容量机制的衔接\n- 文件要求统筹电能量市场和辅助服务市场，在注册、交易时序、出清、费用疏导等方面衔接，避免市场割裂。\n- 调频、备用、爬坡等有功辅助服务市场可以与现货市场独立出清，具备条件时推动与现货市场联合出清；经营主体提供辅助服务产生的电能量费用仍按电能量市场规则结算。\n- 对现货连续运行地区，具有类似调峰功能的单独市场要退出或转为电能量市场功能；区域调峰、存在电能量交换的区域备用等交易，也应及时转为电能量交易。\n- 对获得容量电费的主体，规则原则上要求其参与辅助服务市场申报，体现容量补偿、可靠供给和系统调节责任之间的衔接。\n\n### 计量结算、披露和监管\n- 计量和采集周期应满足辅助服务最小交易周期和精度要求，数据缺失时可按拟合规则补充；结算原则上采用“日清月结”，按日清分、按月出具结算依据，辅助服务费用在电费结算单中单独列示，不得与其他费用叠加打捆。\n- 市场运营机构应披露需求计算、调用原则、需求总量、申报出清、结算等信息；经营主体对披露信息有异议的，可在规定期限内提出，交易机构和调度机构应核实处理。\n- 风险防控覆盖供需风险、市场力操纵、价格异常、技术支持系统故障、网络安全等，市场运营机构要监测预警并报告，风险处置方案需明确等级、措施和责任。\n- 国家能源局及其派出机构负责监管，市场运营机构和电网企业要按要求报送价格、费用、收入、分摊和市场运行情况；争议可通过市场运营机构、市场管理委员会调解、监管协调、仲裁或司法途径处理。\n\n### 对各类主体的影响\n- 发电企业尤其是火电、水电等可调节资源，需要把辅助服务作为电能量之外的重要收益与考核来源，关注报价、出清、调用、性能评价和违约责任。\n- 储能、虚拟电厂、智能微电网、车网互动运营企业等新型主体获得了国家规则层面的参与身份，但仍要满足地方细则规定的计量、通信、调控、注册和技术接入要求。\n- 电力用户和售电公司不仅可能通过聚合、虚拟电厂等方式参与提供辅助服务，在现货连续运行地区也可能按受益原则分担部分辅助服务费用，因此需要关注当地费用传导细则。\n- 省级主管部门、派出机构、调度机构和交易机构需要把本规则转化为地方实施方案、实施细则、技术系统、信息披露和年度评估机制。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-411/政策正文.md","sourceFilePath":"source-files/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e331d1e70103806977daa999cd3f39746d0c7226ec6f8ee95e2aa7cb6ce2aa3e"}},{"title":"电力辅助服务市场基本规则.pdf","sourceTitle":"国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-411/电力辅助服务市场基本规则.pdf.md","sourceFilePath":"source-files/attachments/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号)/电力辅助服务市场基本规则.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e331d1e70103806977daa999cd3f39746d0c7226ec6f8ee95e2aa7cb6ce2aa3e"}}],"values":["国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知","该文件统一规范省级及以上电力辅助服务市场，明确调峰、调频、备用、爬坡等品种，规定市场成员、设立流程、交易组织、费用传导、结算披露和监管要求。","发改能源规〔2025〕411号","国家发展改革委、国家能源局","2025-04-29","https://www.ndrc.gov.cn/xxgk/zcfb/ghxwj/202504/t20250429_1397483.html","source-files/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号).pdf","电力辅助服务市场基本规则.pdf|source-files/attachments/2025-04-03-国家发展改革委 国家能源局关于印发《电力辅助服务市场基本规则》的通知(发改能源规〔2025〕411号)/电力辅助服务市场基本规则.pdf","有效","2026-07-15"]},{"title":"国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","detail":"### 文件定位与目标\n- 发改能源〔2025〕357号由国家发展改革委、国家能源局联合印发，是国家层面推进虚拟电厂发展的专项指导文件。\n- 文件明确，到2027年全国虚拟电厂调节能力达到2000万千瓦以上，到2030年达到5000万千瓦以上，并要求形成成熟规范的建设运行管理和市场参与机制。\n\n### 定义、定位与发展方式\n- 虚拟电厂是运用信息通信、系统集成控制等技术，聚合分布式电源、可调节负荷、储能等资源，以新型经营主体身份协同参与电力系统优化和市场交易的电力运行组织模式。\n- 它可提供调峰、调频、备用等服务，组织需求响应，并聚合分散资源参与交易。省级主管部门应结合资源条件和调节需要制定发展方案、建设运行管理办法，鼓励各类社会资本特别是民营企业参与。\n\n### 接入、聚合与市场机制\n- 各地应明确项目建设、接入管理、系统调试、能力检测和上线运行流程。参与需求响应的虚拟电厂接入新型电力负荷管理系统；参与现货或辅助服务市场的，应接入调度自动化系统或按规则接入负荷系统。\n- 运营商应具备资源监测、预测、指令分解执行能力；参与现货的聚合资源原则上位于同一出清节点，满足条件时可跨节点聚合。单一资源不得被多个虚拟电厂重复聚合。\n- 满足市场注册和对应市场准入后，虚拟电厂可独立参与中长期、现货和辅助服务市场；聚合期间分散资源不得重复参与交易。中长期和现货购售电业务还应具备售电公司资质。\n\n### 价格、考核与安全\n- 文件要求推进虚拟电厂公平参与电能量市场、辅助服务市场和市场化需求响应；辅助服务应向虚拟电厂开放，按其特点完善品种、技术要求、价格和考核机制。\n- 需求响应补偿和分摊遵循“谁服务、谁获利，谁受益、谁承担”，价格上限由省级价格主管部门研究确定。\n- 涉网虚拟电厂须接受统一调度，落实网络与数据安全、应急演练、资源清单变更和安全责任；同时推进聚合响应、并网调控、计量、数据交互和安全防护等标准体系建设。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-357/政策正文.md","sourceFilePath":"source-files/2025-03-25-关于加快推进虚拟电厂发展的指导意见(发改能源〔2025〕357号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"76ae82f7211a815682e24493bcccae5e81c9123860b2476e5ea51d49775b12f1"}}],"values":["国家发展改革委 国家能源局关于加快推进虚拟电厂发展的指导意见","该意见首次在国家层面系统规范虚拟电厂定义、发展目标、接入调用、市场参与、安全与标准，明确其可参与中长期、现货、辅助服务市场和需求响应。","发改能源〔2025〕357号","国家发展改革委、国家能源局","2025-03-25","https://www.gov.cn/zhengce/zhengceku/202504/content_7018244.htm","source-files/2025-03-25-关于加快推进虚拟电厂发展的指导意见(发改能源〔2025〕357号).pdf","","有效","2026-07-16"]},{"title":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","detail":"### 文件定位\n- 该文件是新能源上网电价市场化改革和**机制电价**、**机制电量**、**差价结算**等概念的直接来源。\n- 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成；\n- 跨省跨区交易按跨省跨区市场规则形成价格。\n- 它同时要求完善新能源参与现货和**中长期**市场的价格机制：**现货市场**中，新能源应公平参与实时市场并逐步自愿参与日前市场，报价上下限要与工商业峰谷电价、非市场化收益等因素衔接；\n\n### 新能源参与市场\n- **中长期**市场中，要适应新能源出力波动和预测不确定性，缩短交易周期、提高交易频次，支持周、多日、日等短周期交易，合同可以约定量价曲线、灵活价格形成方式和偏差责任。\n- **绿电**交易方面，文件要求绿色电力交易价格明确区分电能量价格和**绿证**价格，省内**绿电**交易初期不再单独组织集中竞价或滚动撮合，避免与常规电力交易割裂。\n- 为平稳衔接市场化改革，文件建立新能源可持续发展价格结算机制：纳入机制的电量仍参与市场交易形成市场交易价格，但电网企业每月按**机制电价**与市场交易均价进行**差价结算**，差额纳入当地**系统运行费用**。\n\n### 价格结算机制\n- 现货连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；\n- 现货未连续运行地区，按交易活跃周期内发电侧**中长期**交易同类项目加权平均价格确定。\n- 文件区分存量和增量项目：2025年6月1日前投产的存量项目，**机制电量**规模与现行保障性收购或保障利用小时等政策衔接，**机制电价**按现行价格政策确定且不高于当地煤电基准价，执行期限按原政策衔接；\n\n### 存量与增量项目安排\n- 2025年6月1日起投产的增量项目，纳入机制的电量规模、**机制电价**和执行期限原则上通过竞争性方式确定，竞价上限综合新能源成本、绿色价值、供需和用户承受能力等因素设置，执行期限结合同类项目合理回收初始投资期限确定。\n- 结算上，**机制电量**按年度规模分解到月，月度实际上网电量低于当月**机制电量**的，按实际电量结算并在年内滚动清算；\n- 项目可自愿退出机制，期满或退出后不再纳入机制。\n\n### 地方执行和约束\n- 文件还明确**绿证**收益和机制结算不能重复获得，同一新能源项目纳入机制的电量对应**绿证**收益应按政策衔接处理；\n- 电网企业可通过代理购电、单独归集等方式承接机制**差价结算**，相关费用纳入**系统运行费用**。\n- 地方层面，文件要求各省在2025年底前制定实施方案，做好项目测算、用户承受能力评估、政策宣传和市场监管，并强调不得将配置储能作为新能源项目核准、并网、上网等前置条件，不得乱收费，存量补贴项目仍按合理利用小时等政策享受原补贴。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"a178a1df20652ee5459eaff872f4e6095e09790c6166e46b702ff76bb8704c59"}}],"values":["国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","该文件是新能源上网电价市场化改革和机制电价、机制电量、差价结算等概念的直接来源。 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成； 跨省跨区交易按跨省跨区市场规则形成价格。","发改价格〔2025〕136号","国家发展改革委、国家能源局","2025-02-09","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力市场注册基本规则》的通知","detail":"### 文件定位\n- 该文件印发《**电力市场注册**基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。\n- 规则适用于**中长期**、现货、**辅助服务**等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括**新型储能**、**虚拟电厂**、智能微电网等。\n- 文件强调注册管理要坚持规范入市、公开透明、全国统一和信息共享，原则上实行全国统一的注册事项清单，各地不得另行设置不合理的地方负面清单或附加条件；\n- 注册信息应在不同市场、不同交易机构之间共享，推动一地注册、全国共享。\n\n### 主体范围和基本条件\n- 主体基本条件方面，经营主体应具备独立承担民事责任能力、财务和信用条件，不存在严重失信且未完成信用修复等情形。\n- 发电企业需具有核准或备案手续、发电业务许可证或符合豁免条件、并网调度协议、调度自动化和计量条件；\n- 燃煤自备电厂还要符合能效、环保等要求。\n\n### 注册、变更和注销流程\n- 售电公司按售电公司管理规则执行。\n- 电力用户应具备符合交易和结算要求的计量条件，工商业用户可直接参与市场或由电网企业代理购电。\n- **新型储能**需具备并网调度协议、调度自动化、分时计量、最大充放电功率、容量和持续时长等信息；\n- **虚拟电厂**和负荷聚合商需具有负荷确认协议或调度协议，接入负荷管理、自动化或调控系统，具备资源聚合、监测和控制能力；\n\n### 新型经营主体要求\n- 分布式发电、充电设施、智能微电网等也分别提出备案、计量、调度或负荷管理要求。\n- 注册流程包括申请、承诺、审查、公示和生效，交易机构一般在5个工作日内完成审查，部分主体可按规定免于公示；\n- 经营主体同一合同周期内原则上只能与一家售电公司或**虚拟电厂**建立零售或聚合关系，多重身份需分别注册。\n\n### 监管责任\n- 信息变更方面，主体名称、法定代表人、股权或实际控制关系、许可证、机组参数、储能容量、售电公司和**虚拟电厂**资产与人员等重要信息变化后，应在5个工作日内办理变更，变更期间通常可继续参加交易。\n- 注销方面，破产、关停、政策变化、并网关系变化、机组退役、无工商业用电等情形可办理注销，注销前要处理未履约合同和电费清算，相关信息保留5年。\n- 文件还规定异议处理、虚假材料处理、保密义务、信用评价和监管责任，为后续各省规则中的准入、交易资格、履约担保和市场秩序管理提供基础依据。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力市场注册基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2024-76/政策正文.md","sourceFilePath":"source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"cebdea9215ed78b5725200352194b36c952d1a3a6bfbae414bd523e176acd057"}}],"values":["国家能源局关于印发《电力市场注册基本规则》的通知","该文件印发《电力市场注册基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。 规则适用于中长期、现货、辅助服务等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括新型储能、虚拟电厂、智能微电网等。","国能发监管规〔2024〕76号","国家能源局","2024-09-13","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","detail":"### 文件定位\n- 该文件建立煤电**容量电价**机制，是从单一制煤电上网电价转向两部制电价的基础政策。\n- 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本；\n- **容量电价**按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。\n- 适用范围是合规在运的公用煤电机组，不包括燃煤自备电厂、不符合规划要求的煤电机组，以及能耗、环保、灵活调节能力不达标的机组。\n\n### 适用范围和电价机制\n- 文件规定全国煤电机组固定成本实行统一参考标准330元每千瓦年，2024年至2025年多数地方按约30%的固定成本回收比例确定**容量电价**，部分转型较快地区可按约50%执行；\n- 2026年起，各地通过**容量电价**回收煤电固定成本的比例原则上不低于50%。\n- 附件《省级电网煤电**容量电价**表》列明各省级电网2024年至2025年**容量电价**标准，多数省份为100元每千瓦年，部分省份为165元每千瓦年，并注明2026年后云南、四川等转型较快地区回收比例不低于70%、其他地区不低于50%。\n\n### 容量电费分摊\n- **容量电费**的计算方式是按当地**容量电价**乘以机组申报最大出力，由电网企业按月向煤电企业结算；\n- 新投产煤电机组自投运次月起执行。\n- **容量电费**不直接由某个用户单独承担，而是纳入**系统运行费用**，由工商业用户按当月用电量比例分摊并按月滚动清算，居民、农业等目录用户按现行政策衔接。\n\n### 考核扣减\n- 跨省跨区外送煤电机组另有分摊规则：纳入受电省电力电量平衡的配套煤电原则上按受电省**容量电价**执行，费用由受电省承担；\n- 多省共用的，按受电电量或容量分摊；\n- 未纳入受电省平衡的外送机组，**容量电费**原则上由送电省承担。\n\n### 执行衔接\n- 文件不是无条件补贴，还设置最大出力申报和考核：煤电机组未按调度指令达到申报最大出力的，月内出现2次扣减当月**容量电费**10%，3次扣减50%，4次及以上扣减100%；\n- 若一年内连续或累计多次被扣完**容量电费**，可能取消**容量电费**获取资格。\n- 文件要求省级价格主管部门制定本地执行方案，电网企业负责计算、分摊和结算，煤电企业如实申报最大出力并履行可用容量义务，同时与电力市场建设、煤电**中长期**合同、**辅助服务**和调峰补偿政策衔接，避免重复补偿。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/政策正文.md","sourceFilePath":"source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"0f4c734e60f59ecec31c23b776e4fb4aa22020aa6d78f8402a5487b115127722"}},{"title":"省级电网煤电容量电价表.pdf","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/省级电网煤电容量电价表.pdf.md","sourceFilePath":"source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","extraction":{"method":"ocr","ocrStatus":"success","extractedAt":"2026-07-16","sourceHash":"3fa07f2beb80e9b2e1f376be0bb5eac47ef8cc0e54244bed48c3f7d88fa27c06"}}],"values":["国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","该文件建立煤电容量电价机制，是从单一制煤电上网电价转向两部制电价的基础政策。 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本； 容量电价按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。","发改价格〔2023〕1501号","国家发展改革委、国家能源局","2023-11-10","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力辅助服务管理办法》的通知","detail":"### 文件定位\n- 国能发监管规〔2021〕61号修订原《并网发电厂辅助服务管理暂行办法》，将其更名为《电力辅助服务管理办法》，用于规范电力辅助服务管理并深化市场机制建设。\n- 通知要求国家能源局各派出机构组织相关部门和单位制修订各地管理实施细则和市场交易规则，并报国家能源局备案。因此，国家办法提供统一管理框架，具体交易参数和补偿口径仍由区域、省级规则落地。\n\n### 服务分类与品种\n- 办法将电力辅助服务分为三类：**有功平衡服务**、**无功平衡服务**、**事故应急及恢复服务**。\n- 有功平衡服务包括调频、调峰、备用、转动惯量、爬坡等；无功平衡服务包括无功调节和自动电压控制（AVC）；事故应急及恢复服务包括稳定切机、稳定切负荷和黑启动等。\n- 这一区分明确了调频与调压的技术边界：调频围绕有功功率平衡、系统频率和联络线控制偏差，调压围绕无功平衡和电压质量。\n\n### 提供主体、补偿与分摊\n- 办法将辅助服务提供主体由传统发电厂扩展到适应新型电力系统需要的各类并网主体，鼓励新型储能、自备电厂、可调节负荷、电动汽车充电网络、聚合商、虚拟电厂等挖掘调节能力。\n- 补偿遵循“谁提供、谁获利；谁受益、谁承担”原则，可采用固定补偿或市场化补偿。固定补偿需综合考虑服务成本、性能表现和合理收益；市场化补偿应在合理价格区间内通过竞争形成价格。\n- 为系统整体服务的辅助服务，补偿费用由发电企业、市场化电力用户等并网主体共同分摊，并逐步将非市场化用户纳入分摊范围；为特定主体服务的，原则上由相应受益主体分摊。\n\n### 落地管理与主体影响\n- 各地细则和交易规则应明确提供主体范围、性能指标、服务品种、需求确定原则、市场出清机制、补偿分摊标准和信息披露要求，并与现货市场等机制衔接。\n- 电力用户可独立或委托代理参与辅助服务；调节能力不足的用户、聚合商和虚拟电厂，应按规则分摊费用或通过购买服务履行责任。\n- 跨省跨区送电配套电源需纳入辅助服务管理，原则上按调度关系在送端或受端参与，避免重复管理、重复补偿。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力辅助服务管理办法》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2021-61/政策正文.md","sourceFilePath":"source-files/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"c8c89bb6a8526f3ba3bc68af56709ded7d7bcc3644fd607c05163fba27dffead"}},{"title":"电力辅助服务管理办法.doc","sourceTitle":"国家能源局关于印发《电力辅助服务管理办法》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2021-61/电力辅助服务管理办法.doc.md","sourceFilePath":"source-files/attachments/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号)/1310391161_16403386137421n.doc","extraction":{"method":"office","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"e1bc6b95d81c54f099f3c6f1d3c22a6dacc3fd74edc8b92626b83451c1da8844"}}],"values":["国家能源局关于印发《电力辅助服务管理办法》的通知","该办法规范电力辅助服务管理，按有功平衡、无功平衡、事故应急及恢复分类，明确调频、调压等服务的管理、补偿分摊、跨省衔接和地方细则制定要求。","国能发监管规〔2021〕61号","国家能源局","2021-12-21","https://zfxxgk.nea.gov.cn/2021-12/21/c_1310391161.htm","source-files/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号).pdf","电力辅助服务管理办法.doc|source-files/attachments/2021-12-21-关于印发《电力辅助服务管理办法》的通知(国能发监管规〔2021〕61号)/1310391161_16403386137421n.doc","有效","2026-07-16"]}]},{"name":"北京","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"天津","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"河北","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"山西","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"山西电力中长期市场实施细则","detail":"### 文件定位\n- 山西能源监管办公开政策解读显示，《山西电力**中长期**市场实施细则》（晋监能市场规〔2026〕1号）依据国家《电力**中长期**市场基本规则》（发改能源规〔2025〕1656号）和新能源上网电价市场化改革政策修订，结合山西电力**现货市场**运行实际，于2026年6月1日起施行，有效期5年，并废止原《山西电力**中长期**交易实施细则》（晋监能市场规〔2024〕2号）。\n- 公开页面本身为政策解读，未见可读取的正式细则附件，因此本条详细解读以官方页面确认信息为准。\n- 解读说明，新细则共13章，内容覆盖总则、市场成员、交易品种、交易周期和方式、交易组织、价格机制、电量约束、合同管理、计量结算、信息披露、技术支持系统、市场监管和附则，并单独设置绿色电力交易相关内容。\n\n### 月内和日滚动交易\n- 修订重点首先是与全国统一**中长期**规则衔接，统一**中长期**交易基本概念、市场成员权责、合同管理、计量结算和信息披露要求。\n- 其次是优化月内交易组织，完善月内旬双边协商、旬集中竞价、旬挂牌、旬合同转让等流程，使**中长期**交易能够覆盖不同周期、不同主体和不同风险管理需求。\n\n### 小时级绿电交易\n- 第三是强化**中长期**与现货衔接，日滚动交易采用**现货市场**交易限价，引导经营主体在**中长期**合同曲线与现货价格风险之间形成更清晰的衔接关系。\n- 第四是突出绿色电力交易，明确小时级**绿电**交易，以小时为颗粒度开展计量、申报、出清和结算，并通过绿色电力证书、**绿电**环境价值和电能量交易的衔接保障绿色消费可追踪。\n\n### 现货衔接和风险管理\n- 第五是加强风险和合规管理，文件解读提到金融套利约束、市场风险防控、信息披露和技术支持系统要求，意在减少**中长期**合约与现货价格之间的异常套利、串通和操纵行为。\n- 对发电企业、售电公司、电力用户和新能源主体来说，新细则的影响主要在于：参与山西**中长期**市场需要更关注分时曲线、月内和日滚动交易安排、**绿电**小时级结算、合同转让和现货偏差风险；\n\n### 主体关注点\n- 售电公司还要关注履约担保、代理用户电量和风险平抑能力；\n- 新能源主体则要同时关注新能源市场化、**机制电量差价结算**和**绿电**环境价值不能重复收益等衔接要求。","browserFiles":[{"title":"政策正文","sourceTitle":"山西电力中长期市场实施细则","markdownFilePath":"knowledge-markdown/doc-sx-2026-1/政策正文.md","sourceFilePath":"source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"6c2553cab505a0ad7185bab6769c03fce5a4b58cd2ed468a6ab350c94ab9ec85"}}],"values":["山西电力中长期市场实施细则","山西能源监管办公开政策解读显示，《山西电力中长期市场实施细则》（晋监能市场规〔2026〕1号）依据国家《电力中长期市场基本规则》（发改能源规〔2025〕1656号）和新能源上网电价市场化改革政策修订，结合山西电力现货市场运行实际，于2026年6月1日起施行，有效期5年，并废止原《山西电力中长期交易实施细则》（晋监能市场规〔2024〕2号）。","晋监能市场规〔2026〕1号","国家能源局山西监管办公室","2026-05-27","https://sxb.nea.gov.cn/xxgk/zcjd/202605/t20260527_301835.html","source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).pdf","","有效","2026-07-14"]}]},{"name":"内蒙古","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"山东","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《山东省虚拟电厂建设运行管理办法》的通知","detail":"### 文件定位\n- 鲁发改能源〔2026〕407号由山东省发展改革委、省能源局和国家能源局山东监管办联合印发，自2026年8月1日起施行。\n- 办法适用于山东虚拟电厂及其聚合资源的项目管理、能力测试、市场交易、运行管理、安全管理、变更和退出管理。\n\n### 注册、接入与能力测试\n- 运营商须在负荷系统建档备案、在交易平台注册，并完成自有系统与负荷系统联调；参与电能量或辅助服务市场的，还需接入调度系统。\n- 聚合资源完成档案录入并建立聚合关系后，服务中心与属地负荷管理中心原则上在5个工作日内完成资料完整性核验；注册生效前至少应组建一个符合容量和调节能力要求的聚合单元，并与调度机构签订并网调度协议。\n- 能力测试包括入网测试、变更测试和运行能力核定。储能类、调节量负荷类聚合单元采用现场测试；全电量负荷类、分布式发电类一般按历史数据进行能力认定，测试异议可在3个工作日内申请复核或重新测试。\n\n### 市场参与与结算\n- 虚拟电厂可依山东市场规则参与电能量、辅助服务和需求响应；运营商与聚合资源生效后按交易单元签订聚合合同，次月可参与市场交易。\n- 调节量负荷单元可按削峰或填谷参与出清，申报方向及上下限需与测试结果一致并刚性执行出清曲线。虚拟电厂可自愿参与辅助服务市场。\n- 同一聚合单元或用户不得以同一调节行为重复获取电能量、辅助服务、需求响应等不同类型市场收益；收益按市场规则和聚合合同统一结算到户。\n\n### 运行、安全与退出\n- 参与日前市场的信息交互应为分钟级，参与实时市场应不大于60秒，参与辅助服务应配置AGC等装置并实现秒级交互。运行中须服从调度，不得擅自调整运行参数。\n- 涉网虚拟电厂须接受统一调度、实行数据加密和网络安全防护；退出、停牌、复牌按市场规则办理，退出或暂停期间不得参与相关市场交易。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《山东省虚拟电厂建设运行管理办法》的通知","markdownFilePath":"knowledge-markdown/doc-sd-2026-vpp-management/政策正文.md","sourceFilePath":"source-files/2026-06-05-关于印发《山东省虚拟电厂建设运行管理办法》的通知(鲁发改能源〔2026〕407号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-17","sourceHash":"339a54f2e2aac0bc05b9fa4ff918265acd0cca8c118e77ceadc67caa6a14bcf1"}}],"values":["关于印发《山东省虚拟电厂建设运行管理办法》的通知","山东虚拟电厂管理办法自2026年8月1日起施行，明确建档、注册、接入、测试、交易、运行安全和退出全流程；虚拟电厂可参与电能量、辅助服务和需求响应，但不得重复获取同一调节收益。","鲁发改能源〔2026〕407号","山东省发展和改革委员会、山东省能源局、国家能源局山东监管办公室","2026-06-05","https://nyj.shandong.gov.cn/","source-files/2026-06-05-关于印发《山东省虚拟电厂建设运行管理办法》的通知(鲁发改能源〔2026〕407号).pdf","","有效","2026-07-17"]},{"title":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","detail":"### 文件定位\n- 《山东电力市场规则（试行）》（2026年4月修订版）由山东能源监管办、山东省发展改革委、山东省能源局联合印发，文号为鲁监能市场规〔2026〕27号。\n- 通知正文要求市场运营机构严格遵循全国统一电力市场基础规则体系，规范信息披露、交易组织、交易执行、交易结算和调度运行，加快技术支持系统改造；\n- 日内市场按需启动、调频**辅助服务**市场出清主体自主选择参与方式、局部市场力监管等依赖系统改造的条款，原则上不晚于2026年7月1日执行。\n- 附件规则体量较大，共22章并含调频性能、调频容量需求等附件，是山东电力市场的综合性基础规则。\n- 规则总则明确山东电力市场包括电力**中长期**交易、现货交易、**辅助服务**交易、容量交易等，适用于电力批发市场注册、交易、执行、结算、信息披露和监督管理，并衔接零售市场。\n\n### 市场成员和准入\n- 市场成员章节规定发电企业、售电公司、电力用户、新型经营主体、电网企业、调度机构和交易机构的权利义务；\n- 经营主体须完成市场注册、满足计量结算、调度通信、技术系统、信用和履约担保等条件，且不得行使市场力、操纵价格或损害其他主体权益。\n- 规则对**新型储能**、**虚拟电厂**、负荷聚合商、分布式资源等提出持续充放电时间、调节容量、聚合关系、负荷确认协议和系统接入等条件。\n- 市场构成与价格章节把**中长期**、现货、**辅助服务**、容量补偿和零售市场联成一个体系：**中长期**合同稳定预期并管理风险，**现货市场**通过日前、日内、实时出清反映电力时空价值，**辅助服务**市场与现货联合或分步出清，容量补偿用于回收可靠资源固定成本。\n\n### 交易体系和价格结算\n- 规则明确市场化容量补偿费用按省发展改革委核定的市场化容量补偿电价向用户侧收取，按月结算，并按照发电侧主体可用容量等规则分配。\n- **中长期**交易运营章节规定交易品种、交易方式、合同签订、合约要素、交易约束、组织校核和合同管理，合同需明确周期、电量、曲线、价格和结算参考点，交易出清后形成结算依据。\n- 现货交易运营是规则核心，覆盖市场准备、机组与新型主体参数、调试管理、日前、日内、实时市场组织、安全校核、出清和结果发布，并规定省间与省内现货衔接、日前预电力平衡边界条件、日前可靠性机组组合及发电计划、实时出清等复杂流程。\n- **辅助服务**章节现阶段主要开展调频和爬坡**辅助服务**，调频**辅助服务**按日运行、集中竞价，综合价格和性能参数确定中标主体，未来适时开展备用等服务。\n\n### 绿电、容量和辅助服务\n- 零售市场章节规范售电公司与零售用户之间的零售交易和零售套餐，要求零售关系、套餐公示、合同和结算与批发侧衔接。\n- 计量和结算章节系统规定计量装置、计量数据、结算原则、结算电价、结算流程、发电侧、用户侧、新型经营主体、**辅助服务**、**绿电**交易、市场运行费用、结算查询和调整等内容；\n- 结算电价包含上网电价、购电价格、输配电价、市场化容量补偿电价、煤电**容量电费**、**辅助服务**费用、**抽水蓄能容量电费**、新能源可持续发展价格结算机制**差价结算**费用等，电网企业需按时提供计量数据并足额结算。\n- **绿电**结算要求电能量和环境价值分开处理，纳入可持续发展价格结算机制的电量不得重复获得**绿证**收益。\n\n### 市场力监管和风险防控\n- 市场力行为监管章节是山东规则的重要特点，规定市场力识别、处置、监测缓解、事前监管和事后监管，配套市场干预、中止和恢复机制；\n- 风险防控章节要求运营机构开展运行监测、履约风险和履约担保管理，运用大数据、人工智能等手段开发异常交易识别预警功能。\n- 规则还设置技术支持系统、争议处理、法律责任和附则。\n- 对市场主体来说，这份文件不仅告诉你能参加哪些市场，更把注册条件、报价申报、合同曲线、调度执行、计量结算、容量补偿、**辅助服务**、**绿电**、零售、市场力和违规风险放进一个统一框架，是山东市场参与和合规管理的总规则。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","markdownFilePath":"knowledge-markdown/doc-sd-2026-27/政策正文.md","sourceFilePath":"source-files/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"fa8a5d1201091a50550fe4702ea35d459c29e1f3efbf3819c538f28fed8f570e"}},{"title":"《山东电力市场规则（试行）》（2026年4月修订版）.pdf","sourceTitle":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","markdownFilePath":"knowledge-markdown/doc-sd-2026-27/《山东电力市场规则（试行）》（2026年4月修订版）.pdf.md","sourceFilePath":"source-files/attachments/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号)/P020260508675725961073.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"0745e827bcc147780b368a76f593306feeacb04ac066ff3de48f53ecb4c252f2"}}],"values":["关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","《山东电力市场规则（试行）》（2026年4月修订版）由山东能源监管办、山东省发展改革委、山东省能源局联合印发，文号为鲁监能市场规〔2026〕27号。 通知正文要求市场运营机构严格遵循全国统一电力市场基础规则体系，规范信息披露、交易组织、交易执行、交易结算和调度运行，加快技术支持系统改造；","鲁监能市场规〔2026〕27号","国家能源局山东监管办公室、山东省发展和改革委员会、山东省能源局","2026-04-30","https://sdb.nea.gov.cn/dtyw/tzgg/202605/t20260508_300824.html","source-files/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号).pdf","《山东电力市场规则（试行）》（2026年4月修订版）.pdf|source-files/attachments/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号)/P020260508675725961073.pdf","有效","2026-07-14"]},{"title":"山东省虚拟电厂建设运行管理办法（征求意见稿）","detail":"### 文件定位\n- 该稿拟建立山东虚拟电厂建设、运营和管理的全流程规则，覆盖项目管理、能力测试、市场交易、运行管理、安全管理、变更和退出。\n- 征求意见稿将虚拟电厂界定为聚合分布式电源、储能、可调节负荷等分散资源，以新型经营主体身份参与系统优化和市场交易的组织模式。\n\n### 拟定机制\n- 运营商需建立自有系统，完成建档备案、系统接入、市场注册、资源信息录入、能力测试、并网调度协议和聚合合同等环节。\n- 文本拟允许虚拟电厂参与电能量、辅助服务和需求响应，但禁止同一调节行为在同一时段重复取得不同市场收益；运行侧要求接收和分解出清结果、上送数据并服从调度。\n- 草案对数据交互、网络安全、测试复核、停牌退出等作出要求。\n\n### 状态说明\n- 本稿已被鲁发改能源〔2026〕407号正式办法替代，当前不作为有效规则引用。","browserFiles":[{"title":"政策正文","sourceTitle":"山东省虚拟电厂建设运行管理办法（征求意见稿）","markdownFilePath":"knowledge-markdown/doc-sd-2026-vpp-management-draft/政策正文.md","sourceFilePath":"source-files/2026-03-16-山东省虚拟电厂建设运行管理办法（征求意见稿）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-17","sourceHash":"921cb362a88c29558e075555cf67dbdec6eeea7f88370b0c365e3e414839ba20"}}],"values":["山东省虚拟电厂建设运行管理办法（征求意见稿）","该征求意见稿提出山东虚拟电厂的项目管理、能力测试、市场交易、运行安全及退出机制；2026年6月正式办法已印发，现仅保留作制度修订追溯。","未见正式文号","山东省能源局（公开征求意见附件）","2026-03-16","https://nyj.shandong.gov.cn/module/download/downfile.jsp?classid=0\u0026filename=28397e5c97a548b4ade4ac81e7ec6ec1.pdf","source-files/2026-03-16-山东省虚拟电厂建设运行管理办法（征求意见稿）(未见正式文号).pdf","","被替代","2026-07-17"]}]},{"name":"辽宁","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"吉林","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"黑龙江","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"上海","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"江苏","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","detail":"### 文件定位\n- 该通知发布《江苏省电力**中长期**市场实施细则（2026版）》，公开页面未见正式发文字号，故文号记录为“未见正式文号”。\n- 附件细则共15章139条，是江苏省**中长期**市场的主要操作规则，适用于省内经营主体市场注册、交易、执行、结算、信息披露和监管。\n- 细则首先明确经营主体包括发电企业、售电公司、电力用户和新型经营主体，新型经营主体涵盖分布式新能源、储能、可调节负荷、**虚拟电厂**、负荷聚合商、智能微电网、源网荷储一体化项目等；\n- 用户分为批发用户和零售用户，负荷侧**虚拟电厂**参照售电公司管理，发电侧**虚拟电厂**参照发电企业管理。\n- 总体要求上，江苏强调**中长期**市场与**现货市场**在交易时序、出清、结算和偏差处理方面衔接，并推动跨省跨区与省内交易衔接、交易平台和数据标准统一。\n\n### 市场主体和准入\n- 市场成员章节细化发电企业、售电公司、电力用户、新型经营主体、电网企业、交易机构、调度机构的权利义务，要求经营主体履行交易合同、按时结算、如实披露信息、满足技术条件，并建立履约保障和风险约束。\n- 注册、变更和注销方面，经营主体按国家注册规则和江苏要求办理，批发身份和零售身份互斥，注册信息变化需及时办理变更；\n- 售电公司、**虚拟电厂**等若不能持续满足注册条件，可被强制退出，强制退出主体及相关法人代表一定期限内不得重新办理市场注册。\n- 交易品种方面，江苏**中长期**交易包括电能量直接交易、合同转让交易和绿色电力交易，交易方式包括集中交易、双边协商、滚动撮合和挂牌；\n\n### 交易组织和合同管理\n- 未履行合同可通过合同转让交易全部或部分转让，权利义务一并转移。\n- 价格机制方面，除政府定价电量外，市场价格由交易形成；\n- **中长期**合同可签固定价格，数年和年度交易也可签随供需、发电成本变化的灵活价格机制，但灵活价格电量不纳入相应固定价格统计口径；\n- **绿电**价格由电能量价格和**绿电**环境价值组成。\n- 交易组织方面，细则规定交易公告、交易日历、申报限额、年度和月度交易、月内和日滚动交易等安排，现货衔接下每小时**中长期**合同电量和保量保价电量按规则分解，最小结算和交易曲线颗粒度逐步细化到小时。\n\n### 绿电与结算衔接\n- 绿色电力交易是江苏规则的重点之一：**绿电**交易要实现绿色电力和环境价值一一对应、可追踪溯源，支持数年**绿电**交易和小时级**绿电**交易试点；\n- **绿电**环境价值按小时结算，合同需明确电量、电力曲线、环境价值价格和偏差补偿；\n- 售电公司签订小时级**绿电**零售套餐后，要将用户需求关联到批发侧**绿电**合同；\n- **虚拟电厂**聚合分布式新能源参与**绿电**交易时，也要把申报电量关联至具体分布式新能源项目。\n\n### 执行和监管要求\n- 计量结算方面，计量装置应满足最小结算单元要求，电力调度机构保证计量数据准确完整并按时传输；\n- **中长期**结算设置结算参考点并采用差量结算方式，合同电量照付不议，偏差部分在**现货市场**结算；\n- 纳入新能源可持续发展价格结算机制的电量按**机制电价**开展**差价结算**并同步纳入用户侧签约比例口径。\n- 文件还规定交易校核、合同签订和电子合同、合同执行、信息披露、技术支持系统、风险防控、争议处理和法律责任，是江苏发电企业、售电公司、电力用户和**虚拟电厂**等参与**中长期**和**绿电**交易时必须对照的基础规则。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","markdownFilePath":"knowledge-markdown/doc-js-2026-long-term/政策正文.md","sourceFilePath":"source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"9d609cbd4d31a059e58cba865f4536231033d590e51ed9015173206fb6a34e0d"}},{"title":"江苏省电力中长期市场实施细则（2026版）.pdf","sourceTitle":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","markdownFilePath":"knowledge-markdown/doc-js-2026-long-term/江苏省电力中长期市场实施细则（2026版）.pdf.md","sourceFilePath":"source-files/attachments/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号)/P020260306620943462050.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"b6d78a873d5e0d862adb373f3002d16abd3abfd4a27097aaea90c4a1a56e93e6"}}],"values":["关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","该通知发布《江苏省电力中长期市场实施细则（2026版）》，公开页面未见正式发文字号，故文号记录为“未见正式文号”。 附件细则共15章139条，是江苏省中长期市场的主要操作规则，适用于省内经营主体市场注册、交易、执行、结算、信息披露和监管。","未见正式文号","国家能源局江苏监管办公室、江苏省发展改革委（能源局）","2026-03-06","https://jsb.nea.gov.cn/dtyw/tz/202603/t20260306_297521.html","source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).pdf","江苏省电力中长期市场实施细则（2026版）.pdf|source-files/attachments/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号)/P020260306620943462050.pdf","有效","2026-07-14"]}]},{"name":"浙江","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"浙江组织开展电力中长期市场等4项实施细则修订工作","detail":"### 文件定位\n- 浙江能源监管办会同浙江省发展改革委、省能源局组织修订并公开发布《浙江电力**中长期**市场实施细则》《浙江电力零售市场实施细则》《浙江电力市场管理实施细则》《浙江电力市场结算实施细则》等4项细则。\n- 公开页面为监管动态，未附可读取的四项细则全文，因此本条以页面披露的修订过程和重点问题为依据。\n- 页面显示，修订工作以国家《电力**中长期**市场基本规则》为依据，逐条比对国家规则与浙江既有市场规则差异，并结合浙江市场实际重点研究三个问题：居民农业和代理购电偏差电量结算、同一投资主体市场份额不超过20%、**分时电价**机制。\n\n### 四项细则覆盖范围\n- 这说明修订不仅调整批发侧交易流程，还涉及代理购电、零售关系、市场集中度控制和用户侧价格信号。\n- 四项细则的组合含义较强：**中长期**市场实施细则主要规范发电企业、售电公司、电力用户等在年度、月度、月内等周期签订**中长期**合同、形成电量电价和曲线、管理合同风险；\n- 零售市场实施细则主要规范售电公司与零售用户之间的套餐、签约、履约和代理关系；\n\n### 中长期和零售衔接\n- 市场管理实施细则主要约束注册、交易秩序、信息披露、异常行为和监管措施；\n- 结算实施细则则把**中长期**、零售、现货或代理购电相关电量、电价、电费落实到结算口径。\n\n### 结算和市场管理重点\n- 页面还披露修订程序：2026年1月28日向社会公开征求意见，2月24日经浙江电力市场管理委员会审议，之后由浙江能源监管办、省发展改革委、省能源局审定同意后发布。\n- 对市场主体来说，四项细则意味着浙江把**中长期**交易、零售套餐、市场管理和结算口径放在一套规则中联动更新；\n- 售电公司尤其要关注零售套餐设计、同一投资主体市场份额约束、代理购电偏差结算和**分时电价**传导；\n\n### 主体影响\n- 电力用户要关注直接交易或零售代理方式、偏差电量责任和**分时电价**影响；\n- 发电企业要关注**中长期**合同曲线、交易组织和结算参考。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江组织开展电力中长期市场等4项实施细则修订工作","markdownFilePath":"knowledge-markdown/doc-zj-2026-four-rules/政策正文.md","sourceFilePath":"source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"db9b2d09467faba3dcb3069fd2b08fbd8cb32ab6132047594f160f437138f195"}}],"values":["浙江组织开展电力中长期市场等4项实施细则修订工作","浙江能源监管办会同浙江省发展改革委、省能源局组织修订并公开发布《浙江电力中长期市场实施细则》《浙江电力零售市场实施细则》《浙江电力市场管理实施细则》《浙江电力市场结算实施细则》等4项细则。 公开页面为监管动态，未附可读取的四项细则全文，因此本条以页面披露的修订过程和重点问题为依据。","未见正式文号","国家能源局浙江监管办公室、浙江省发展改革委、浙江省能源局","2026-03-04","https://zjb.nea.gov.cn/dtyw/jgdt/202603/t20260304_297397.html","source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江能源监管办完成电力市场三项实施细则修订","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频**辅助服务**市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。\n- 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。\n- 此次修订的背景包括发改价格〔2025〕136号新能源上网电价市场化改革、《电力市场计量结算基本规则》以及浙江2026年电力市场交易方案，说明浙江正在把新能源、储能、计量结算和市场管理纳入现货正式运行后的统一规则框架。\n\n### 三项细则覆盖范围\n- 官方页面列出六方面变化：一是明确储能入市机制，规定储能电站参与现货电能量市场和调频**辅助服务**市场的入市门槛、交易机制和参数，解决储能以何种身份、何种技术参数参与市场的问题。\n- 二是明确新能源入市机制，规定新能源参与现货电能量市场的门槛、交易机制和参数，并增加新能源优先消纳原则，即火电与新能源报价相同时新能源优先出清。\n\n### 零售与结算重点\n- 三是补充风险处置定义和措施，将市场风险细分为不同等级并匹配相应处置手段，为市场异常、系统风险或主体风险提供操作依据。\n- 四是完善市场力监测规则，补充市场力指标、计算公式、参数设置和缓解措施，强化对可能操纵价格或影响出清结果行为的监管。\n- 五是合并历次市场管理委员会公告，提升市场管理规则的一致性和可查询性。\n\n### 市场管理要求\n- 六是按照国家计量结算规则统一电量、电价、电费计量单位，减少结算口径不一致带来的争议。\n- 对经营主体来说，这次修订直接影响新能源和储能能否参与、如何报价、如何出清、如何结算以及发生风险时如何处置；\n\n### 主体影响\n- 对售电公司和用户来说，新能源优先出清、储能参与调频和现货、市场力缓解措施都会影响价格曲线和偏差风险；\n- 对监管机构来说，修订强化了浙江现货正式运行后的市场秩序管理。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办完成电力市场三项实施细则修订","markdownFilePath":"knowledge-markdown/doc-zj-2025-three-rules/政策正文.md","sourceFilePath":"source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"592c7a414e9badddd73b55d0ab46dd12acddab512d650858144f90091c6dcdef"}}],"values":["浙江能源监管办完成电力市场三项实施细则修订","浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频辅助服务市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。","未见正式文号","国家能源局浙江监管办公室","2025-12-02","https://zjb.nea.gov.cn/dtyw/jgdt/202512/t20251202_291553.html","source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江能源监管办推动浙江电力现货市场转入正式运行","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，浙江电力**现货市场**于2025年8月7日转入正式运行，成为长三角地区首个正式运行的**现货市场**。\n- 页面说明浙江已印发《浙江电力**现货市场**规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”**现货市场**规则体系；\n\n### 现货市场运行基础\n- 本条来源为监管动态页面，未见可读取的7个细则附件全文，因此解读限于官方页面明确披露内容。\n- 浙江现货规则体系的重点在于从**中长期**合同为主的交易框架，进一步进入日前、实时等更能反映时段供需和电网约束的价格形成机制。\n\n### 中长期与现货衔接\n- 官方页面特别强调浙江在国内率先推进调频**辅助服务**与电能量市场联合出清，这意味着调频资源不再只是事后补偿，而是在市场出清中同时考虑调频机会成本和调节成本，从而让电能量价格和**辅助服务**价格更协调地反映系统平衡需求。\n- 页面还提到浙江建立市场运营监管规则、市场力监测和缓解机制、风险防控机制以及数字化监管体系，形成100余项监管指标，并开展市场秩序专项监管，查处发电企业串通报价等典型案件。\n\n### 主体影响\n- 对发电企业来说，现货正式运行后报价行为、机组可用容量、调频性能、日前和实时出清结果都会直接影响收入和合规风险；\n- 对售电公司和电力用户来说，**中长期**合约只是风险管理工具，实际用电偏差和现货价格波动会传导到结算，需要关注合同曲线、偏差风险和零售套餐设计；\n\n### 后续规则关注\n- 对监管机构和市场运营机构来说，重点是持续监测市场力、异常报价、串通行为和系统运行风险。\n- 该文件的意义不是单个交易公告，而是确认浙江**现货市场**已经进入正式运行阶段，并形成电能量、调频**辅助服务**、风险防控、市场力监管和数字化监管共同支撑的市场体系。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办推动浙江电力现货市场转入正式运行","markdownFilePath":"knowledge-markdown/doc-zj-2025-spot-formal/政策正文.md","sourceFilePath":"source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"31b14993f6595ea30fb54409a341a891263dbe2561ad542cf388f640c67701d7"}}],"values":["浙江能源监管办推动浙江电力现货市场转入正式运行","浙江能源监管办公开信息显示，浙江电力现货市场于2025年8月7日转入正式运行，成为长三角地区首个正式运行的现货市场。 页面说明浙江已印发《浙江电力现货市场规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”现货市场规则体系； 现货市场运行基础 本条来源为监管动态页面，未见可读取的7个细则附件全文，因此解读限于官方页面明确披露内容。","浙监能市场〔2024〕4号","国家能源局浙江监管办公室、浙江省能源局","2025-09-15","https://zjb.nea.gov.cn/dtyw/jgdt/202509/t20250923_287902.html","source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","","有效","2026-07-14"]}]},{"name":"安徽","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"安徽电力中长期市场实施细则","detail":"### 文件定位\n- 该细则是2026年3月公开的安徽中长期市场正式规则，适用于已完成市场注册的经营主体通过双边协商、集中交易等方式开展的中长期电能量交易。\n- 中长期交易覆盖多年、年度、月度和月内（旬、周、多日）等时间维度；政府定价优先发电电量通过厂网间双边交易及购售电合同纳入合同管理。\n\n### 交易与合同\n- 发电企业、售电公司、电力用户和符合条件的新型经营主体按各自市场身份参与，交易组织、合同签订和执行需要遵守交易公告及市场运营安排。\n- 合同应形成可执行的电量、电价和曲线等要素，并按照规则参与校核、变更、执行和结算；相关安排需与现货市场、省间及长三角交易衔接。\n\n### 管理重点\n- 规则把注册、信用、履约、信息披露、技术支持和争议处理纳入统一管理。对经营主体而言，关注交易资格、合同曲线、偏差风险和结算确认是参与中长期交易的核心环节。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力中长期市场实施细则","markdownFilePath":"knowledge-markdown/doc-ah-2026-long-term/政策正文.md","sourceFilePath":"source-files/2026-03-31-安徽电力中长期市场实施细则(未见正式文号).pdf","extraction":{"method":"ocr","ocrStatus":"success","extractedAt":"2026-07-16","sourceHash":"3f54c78b0f37c3817aa7e45d7e451353578e70dea34bac7c94c7059878058ae8"}}],"values":["安徽电力中长期市场实施细则","现行安徽中长期细则规范多年、年度、月度和月内电能量交易，明确经营主体注册、交易组织、合同执行、结算、信息披露及与现货市场衔接要求。","未见正式文号","国家能源局华东监管局（公开附件）","2026-03-31","https://hdj.nea.gov.cn/xxgk/fdzdgknr/gfxwj/hdnyjgfxwj/202603/P020260331593555268345.pdf","source-files/2026-03-31-安徽电力中长期市场实施细则(未见正式文号).pdf","","有效","2026-07-16"]},{"title":"安徽电力中长期市场实施细则（征求意见稿）","detail":"### 文件定位\n- 用户提供的征求意见稿与国家能源局华东监管局公开附件相符，覆盖安徽中长期市场注册、交易、执行、结算、信息披露和监督管理。\n- 细则所称中长期交易包括多年、年度、月度和月内（旬、周、多日）等周期的电能量交易；执行政府定价的优先发电电量以厂网间双边交易和购售电合同方式纳入管理。\n\n### 主要机制\n- 市场主体包括发电企业、售电公司、电力用户和符合条件的新型经营主体；交易可通过双边协商、集中交易等市场化方式开展。\n- 合同需要明确电量、电价、执行曲线及偏差处理，并与现货市场、跨省跨区和长三角相关交易衔接。\n- 主体需依规则完成注册、信用和履约管理，并承担合同执行、结算确认及信息披露责任。\n\n### 状态说明\n- 该稿已由2026年3月公开的正式《安徽电力中长期市场实施细则》替代，当前不作为有效规则引用。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力中长期市场实施细则（征求意见稿）","markdownFilePath":"knowledge-markdown/doc-ah-2026-long-term-draft/政策正文.md","sourceFilePath":"source-files/2026-02-10-安徽电力中长期市场实施细则（征求意见稿）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"afe1b07087a7fde940e63b5d0394dcb20e3c1870295de4e7c85661fa99c26750"}}],"values":["安徽电力中长期市场实施细则（征求意见稿）","该征求意见稿拟规范安徽多年、年度、月度及月内中长期电能量交易、合同管理、执行结算和信息披露；2026年3月官方正式版已发布，故仅保留作修订追溯。","未见正式文号","国家能源局华东监管局（公开附件）","2026-02-10","https://hdj.nea.gov.cn/hdhy/dczj/202601/P020260130788849464632.pdf","source-files/2026-02-10-安徽电力中长期市场实施细则（征求意见稿）(未见正式文号).pdf","","被替代","2026-07-16"]},{"title":"安徽电力市场信用评价实施细则（征求意见稿）","detail":"### 文件定位\n- 用户提供文本显示，安徽电力交易中心在省政府主管部门授权下开展市场经营主体信用评价评级；适用对象包括发电企业、售电公司和电力用户。\n- 文件明确评价应遵循科学合理、公开透明、守信激励和失信惩戒原则。\n\n### 评价框架\n- 文本采用基础信用分、守信激励和失信惩戒相结合的框架，基础分为1000分，外部信用与市场现场评价分别构成评价依据；守信行为可加分，失信行为可扣分直至零分。\n- 指标覆盖主体资质、履约、信息报送、交易行为、违法违规和监管处理等，并设置信用等级、评价周期和异议处理安排。\n\n### 状态说明\n- 本条依据用户提供PDF录入，尚未定位到对应的官方公告或官方附件直链；发布程序、正式文号、最终指标及当前效力均待安徽电力交易中心或主管部门官网核验。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力市场信用评价实施细则（征求意见稿）","markdownFilePath":"knowledge-markdown/doc-ah-2026-credit-evaluation-draft/政策正文.md","sourceFilePath":"source-files/2026-02-10-安徽电力市场信用评价实施细则（征求意见稿）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"a87b29edabde905c6b291a4971b5d96ab83a881ccd80df7bae1875b806613c65"}}],"values":["安徽电力市场信用评价实施细则（征求意见稿）","该征求意见稿拟对安徽发电企业、售电公司和电力用户实行信用评价；以基础分、激励和惩戒相结合，并将评价结果用于市场管理。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2026-02-10","https://pmos.ah.sgcc.com.cn/","source-files/2026-02-10-安徽电力市场信用评价实施细则（征求意见稿）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力现货市场结算实施细则（结算试运行第6-1版）","detail":"### 文件定位\n- 用户提供的第6-1版结算试运行文本覆盖现货市场结算权责、结算原则、流程、电能量电费、市场运行费用、不平衡资金和违约信用等内容。\n- 市场化机组和市场用户原则上按日进行交易结果清分、按月结算电费；未参与中长期市场且接受市场价格的新能源项目采用月清月结。\n\n### 结算逻辑\n- 中长期合约电量按合同价格结算，并按照机组或用户所在节点与日前、实时市场统一结算点的差额机制衔接；独立储能充放电采用所在节点电价结算。\n- 日清分预结算依据原则上在运行日后第3个工作日前形成，经营主体对日清或月结核对版有异议时，应在1个工作日内反馈；正式日清依据原则上在运行日后第5个工作日前发布。\n- 细则还规定市场价格限值、二级价格限值、调平、偏差收益回收、费用追退补等安排，具体参数以附表和主管部门最终发布为准。\n\n### 状态说明\n- 原文标明“结算试运行第6-1版”。本地原文完整归档，但尚未定位到对应官方发布页，故不作为正式有效规则作确定性引用。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货市场结算实施细则（结算试运行第6-1版）","markdownFilePath":"knowledge-markdown/doc-ah-2026-spot-settlement-6-1/政策正文.md","sourceFilePath":"source-files/2026-01-31-安徽电力现货市场结算实施细则（结算试运行第6-1版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"f4d598d792400bd1ae9c22ff5506799dfda986362c8047fde4547cf29cbc1e2e"}}],"values":["安徽电力现货市场结算实施细则（结算试运行第6-1版）","第6-1版结算试运行细则提出市场化机组和市场用户原则上日清月结，明确中长期与现货衔接、日清分、月结算、偏差处理和不平衡资金结算。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2026-01-31","https://pmos.ah.sgcc.com.cn/","source-files/2026-01-31-安徽电力现货市场结算实施细则（结算试运行第6-1版）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力现货电能量市场交易实施细则（结算试运行第6-1版）","detail":"### 文件定位\n- 用户提供的第6-1版文本为安徽现货电能量市场结算试运行配套交易细则，覆盖市场成员、交易组织、申报、日前与实时出清、价格、信息披露、市场监测和风险处置。\n\n### 交易机制\n- 发电侧、用户侧及符合条件的新型主体按照市场身份参与申报和出清；交易组织以日前市场与实时市场衔接为主，并与中长期合同、调度运行和结算规则配合。\n- 原文明确电能量申报价格限值为上限1100元/兆瓦时、下限0元/兆瓦时；具体出清、约束处理和价格形成按细则与市场参数执行。\n- 主体需按要求报送可用能力、预测、报价或报量等数据，接受市场出清和调度安排；市场运营机构负责信息发布、监测异常报价和实施风险处置。\n\n### 状态说明\n- 文件封面标注“结算试运行第6.1版—20260130”。因未定位到相应官方发布页或官方附件直链，当前按待核验试运行材料入库。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货电能量市场交易实施细则（结算试运行第6-1版）","markdownFilePath":"knowledge-markdown/doc-ah-2026-spot-energy-6-1/政策正文.md","sourceFilePath":"source-files/2026-01-31-安徽电力现货电能量市场交易实施细则（结算试运行第6-1版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"3b30adeb2228f20f93b88315354c7cc9fc1085f2babd0a0a398d61813ccec2e8"}}],"values":["安徽电力现货电能量市场交易实施细则（结算试运行第6-1版）","第6-1版现货电能量交易细则规范市场成员、日前和实时市场申报与出清、价格机制、市场监测及风险处置，是安徽现货结算试运行配套交易文本。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2026-01-31","https://pmos.ah.sgcc.com.cn/","source-files/2026-01-31-安徽电力现货电能量市场交易实施细则（结算试运行第6-1版）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力市场结算参数表（征求意见稿）","detail":"### 文件定位\n- 参数表为用户提供的征求意见材料，共列示22项暂定参数，用于配合现货市场结算细则中的收益回收、偏差、曲线偏差、日前申报偏差和电量调平计算。\n\n### 参数要点\n- 表中列有煤电机组月度超额收益回收系数0.91、月度缺额收益补偿系数0.82、月度超额收益回收系数h10为1.05；供需调节系数在1、7、8、12月暂定1.1，其余月份暂定1。\n- 用户侧中长期交易允许负偏差在1、7、8、12月暂定30%、其他月份暂定40%；煤电和生物质机组中长期欠签允许负偏差暂定20%。新能源和虚拟电厂交易单元的中长期超签允许正偏差暂定30%。\n- 表尾明确“以政府主管部门发布为准”，因此参数不得脱离正式发布状态直接用于结算测算或合规判断。\n\n### 状态说明\n- 尚未定位到该表的官方发布页或附件直链，完整本地原文已归档，当前仅作为待核验的征求意见参数记录。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力市场结算参数表（征求意见稿）","markdownFilePath":"knowledge-markdown/doc-ah-2026-settlement-parameters-draft/政策正文.md","sourceFilePath":"source-files/2026-01-23-安徽电力市场结算参数表（征求意见稿）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"f14dbc8c0d78423ac8f458eece4fa25742cf4012cf59b207499055e98ee7a405"}}],"values":["安徽电力市场结算参数表（征求意见稿）","该征求意见参数表列出煤电、新能源、虚拟电厂及用户侧中长期偏差、曲线偏差和日前申报偏差等22项暂定结算参数，并明确以政府主管部门发布为准。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2026-01-23","https://pmos.ah.sgcc.com.cn/","source-files/2026-01-23-安徽电力市场结算参数表（征求意见稿）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力现货市场准入退出实施细则（结算试运行第6版）","detail":"### 文件定位\n- 文本用于规范参与安徽现货市场的市场主体准入和退出，涉及发电企业、售电公司、电力用户和新型市场主体的定义、注册及资料管理。\n- 参与主体需满足现货市场所需的电力、电量、计量、通信和技术支持等条件，并按要求提交身份、企业和基础参数信息。\n\n### 准入与退出\n- 新型市场主体参与现货交易时，需完成相应注册并满足技术和业务要求；市场运营机构可对影响交易组织的机组商业运行、容量调整等关键信息进行管理。\n- 退出包括申请退出和强制注销。已选择市场化交易的经营主体原则上不得自行退出；符合正当理由退出的，应履行申请、公示、合同处理和结算等程序。\n- 省交易中心受理自愿退出申请后通过交易平台等渠道公示，无异议后方可办理；售电公司退出还需遵循售电公司管理办法。\n\n### 状态说明\n- 本条为用户提供的结算试运行第6版原文，尚未找到对应官方公告或附件直链，准入门槛和退出条件需以主管部门或交易中心最终公开版本为准。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货市场准入退出实施细则（结算试运行第6版）","markdownFilePath":"knowledge-markdown/doc-ah-2025-spot-entry-exit-6/政策正文.md","sourceFilePath":"source-files/2025-12-30-安徽电力现货市场准入退出实施细则（结算试运行第6版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"b9b6d01d401194d258f3bf2ab13bfb563d780d09bb22bd2ba020856c1d6de5e8"}}],"values":["安徽电力现货市场准入退出实施细则（结算试运行第6版）","第6版准入退出细则规定参与安徽现货市场的主体需满足资质、技术和注册信息要求；退出分为申请退出和强制注销，并要求处理未履约合同和结算事项。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2025-12-30","https://pmos.ah.sgcc.com.cn/","source-files/2025-12-30-安徽电力现货市场准入退出实施细则（结算试运行第6版）(未见正式文号).pdf","","待核验","2026-07-16"]},{"title":"安徽电力现货市场信息披露实施细则（结算试运行第6版）","detail":"### 文件定位\n- 文本规范安徽现货市场信息披露，适用于市场经营主体和市场运营机构；主要披露平台为安徽电力市场交易系统。\n- 信息披露应遵循安全、真实、准确、完整、及时、易于使用原则，并按公开范围区分公众信息、公开后信息、特定信息和保密信息。\n\n### 披露内容与时限\n- 发电企业、售电公司、电力用户和新型主体需披露基本信息、关联关系、经营和履约相关信息；市场运营机构需披露交易公告、交易申报与结果、出清算法和运行参数、价格限值、结算总体情况、市场主体注册及信用评价等信息。\n- 基本信息原则上在市场准入完成后10个工作日内披露；现货市场边界、预测等信息及日清分结算依据按细则规定的时间节点发布，其中日清分依据原则上在运行日后6个工作日内披露。\n- 细则另设信息变更、监督管理、保密责任和违规处理要求。\n\n### 状态说明\n- 本地原文已完整归档，但未定位到对应官方发布页或官方附件直链，披露清单与时限应以最终公开有效版本为准。","browserFiles":[{"title":"政策正文","sourceTitle":"安徽电力现货市场信息披露实施细则（结算试运行第6版）","markdownFilePath":"knowledge-markdown/doc-ah-2025-spot-information-disclosure-6/政策正文.md","sourceFilePath":"source-files/2025-12-30-安徽电力现货市场信息披露实施细则（结算试运行第6版）(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"427f78a1d5d680045ab800b931bee38600243e9e35461157b0cf28f772ec8259"}}],"values":["安徽电力现货市场信息披露实施细则（结算试运行第6版）","第6版信息披露细则要求市场主体和运营机构通过安徽电力市场交易系统披露真实、准确、完整、及时的信息，并规定公开、公开后、特定和保密信息的范围及时限。","未见正式文号","安徽电力交易中心（待官方发布页核验）","2025-12-30","https://pmos.ah.sgcc.com.cn/","source-files/2025-12-30-安徽电力现货市场信息披露实施细则（结算试运行第6版）(未见正式文号).pdf","","待核验","2026-07-16"]}]},{"name":"福建","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"河南","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"湖北","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《湖北省电力中长期市场实施细则》的通知","detail":"### 文件定位\n- 该通知由国家能源局华中监管局、湖北省发展改革委、湖北省能源局联合发布，文号为华中监能市场规﹝2026﹞39号，正文说明《湖北省电力**中长期**市场实施细则》已经广泛征求意见并经湖北电力市场管理委员会审议，要求电力交易机构加强经营主体宣贯培训、信息披露和风险防控。\n- 附件细则共14章122条，适用于湖北电力**中长期**市场注册、交易、执行、结算、信息披露和监督管理。\n- 细则开宗明义要求**中长期**市场与**现货市场**在交易时序、出清和结算方面衔接，并统一市场注册、交易组织、交易结算、信息披露等标准。\n- 市场成员方面，经营主体包括发电企业、售电公司、电力用户和资源聚合类新型经营主体，电网企业、交易机构、调度机构分别承担计量结算、合同汇总、交易组织、安全校核、调度执行和风险防控等职责。\n- 注册方面，经营主体按《**电力市场注册**基本规则》和湖北注册实施细则办理注册、变更和注销，并进行实名认证；\n\n### 市场成员和注册要求\n- 交易机构每年核验持续满足注册条件情况，集中式和分布式新能源按最小颗粒度或统一社会信用代码等方式维护注册信息；\n- 注册信息变化后5个工作日内申请变更。\n- 批发用户和零售用户身份互斥，同一合同周期内同一经营主体原则上只能与一家售电公司或**虚拟电厂**建立关系；\n- 电网企业代理购电用户可按周期选择直接参与市场。\n\n### 交易组织和价格机制\n- 交易品种与方式方面，湖北以电能量交易为主，并根据需要开展合同转让、回购交易，推动电能量交易与合同管理衔接；\n- 交易方式包括双边协商、集中交易、挂牌等，交易结果由平台发布并自动生成电子合同。\n- 价格机制方面，除政府定价电量外，**中长期**合同价格由市场形成，可采用固定价格，也可在年度**中长期**合同中约定随供需、成本变化的灵活价格机制；\n- **绿电**价格由电能量价格和绿色电力环境价值组成。\n\n### 结算与绿电规则\n- 交易组织方面，细则要求交易公告明确交易品种、主体、方式、申报时间、执行周期等，交易机构根据合同和可用发用电能力开展申报限额控制，售电公司和资源聚合类主体的申报能力与注册资产、履约担保、代理或聚合用户历史用电水平等风险平抑能力关联。\n- **绿电**交易方面，省内**绿电**基于集中竞价合同开展，新能源发电企业、售电公司、电力用户和**虚拟电厂**等通过合同明确**绿电**环境价值，形成可追踪溯源的**绿电**合同；\n- 合同可在环境价值可溯源前提下按月或更短周期转让。\n- 省内省间衔接、交易校核和合同管理方面，细则规定交易校核包括出清校核和电网安全校核，电子交易确认单视为电子合同，分散资源可与聚合类主体签订聚合服务合同。\n\n### 风险防控和监管\n- 计量结算方面，湖北原则上以自然月连续结算，电能量交易日清月结，先出具日清分结果，次月出具正式结算依据；\n- 当前**中长期**结算暂按差量结算方式执行，即照付不议、偏差结算，未签**中长期**合同的实际用电量或发电量按偏差电量结算。\n- **绿电**交易中电能量与环境价值分开结算，环境价值按合同电量、发电企业上网电量扣除纳入可持续发展价格结算**机制电量**后的余额、电力用户用电量三者取小确定，纳入**机制电量**不得重复获得**绿证**收益。\n- 文件还规定信息披露真实性、准确性和保密义务，技术支持系统功能，风险防控预案、争议处理、法律责任和5年有效期。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《湖北省电力中长期市场实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2026-39/政策正文.md","sourceFilePath":"source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"d05ec66b68658e9354c7c4fc18fa14753592062eecc6e2f7356318b9cfe419cd"}},{"title":"《湖北省电力中长期市场实施细则》.pdf","sourceTitle":"关于印发《湖北省电力中长期市场实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2026-39/《湖北省电力中长期市场实施细则》.pdf.md","sourceFilePath":"source-files/attachments/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号)/P020260414530138531095.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"bf66396868a2a0d3956e879a3711c9fb085311d38a7d3f4c79cc959940a32f2f"}}],"values":["关于印发《湖北省电力中长期市场实施细则》的通知","该通知由国家能源局华中监管局、湖北省发展改革委、湖北省能源局联合发布，文号为华中监能市场规﹝2026﹞39号，正文说明《湖北省电力中长期市场实施细则》已经广泛征求意见并经湖北电力市场管理委员会审议，要求电力交易机构加强经营主体宣贯培训、信息披露和风险防控。 附件细则共14章122条，适用于湖北电力中长期市场注册、交易、执行、结算、信息披露和监督管理。","华中监能市场规﹝2026﹞39号","国家能源局华中监管局、湖北省发展和改革委员会、湖北省能源局","2026-04-03","https://hzj.nea.gov.cn/dtyw/tzgg/202604/t20260414_299623.html","source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).pdf","《湖北省电力中长期市场实施细则》.pdf|source-files/attachments/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号)/P020260414530138531095.pdf","有效","2026-07-14"]},{"title":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","detail":"### 文件定位\n- 华中监能市场规〔2025〕35号适用于湖北、江西、重庆三省（市）调频辅助服务市场，统一修订并替代了包括湖北2022版在内的原有规则。\n- 规则将调频辅助服务定义为经营主体通过调节有功出力，跟踪自动发电控制指令、维持系统频率稳定而提供的服务。\n\n### 交易机制与价格\n- 调频服务以调频里程为核心结算对象，经营主体按时段申报调频容量价格和调频里程价格；容量费用相关主体未申报时按规则自动参与。\n- 交易采用集中交易、日前预出清、日内滚动出清和实时调用的组织方式。日前按24个时段组织，规则设定容量价格上下限为5至15元/兆瓦。\n- 调频性能系数Kp由调节速率、调节精度和响应时间等构成，准入门槛为0.6；未达到门槛或不服从AGC指令的调频里程不予补偿。\n\n### 结算、考核与衔接\n- 市场日清月结，调频补偿以性能系数、实际调频里程和市场出清价格计算，并扣减相应考核费用。\n- 连续现货市场运行前，调频辅助服务费用原则上由发电侧承担；连续现货市场运行后，按规则由工商业用户和未参与电能量市场交易的发电主体共同分摊。\n- 市场设置信息披露、运行监测、市场干预、暂停与恢复以及违规处理机制。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-jx-cq-2025-frequency-regulation/政策正文.md","sourceFilePath":"source-files/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"b6335c75334b08cf3b7eabd1dfcc048d7c3da17a53b4048f0d0ddbe0d98798bf"}},{"title":"湖北、江西、重庆电力调频辅助服务市场运行规则.pdf","sourceTitle":"国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-jx-cq-2025-frequency-regulation/湖北、江西、重庆电力调频辅助服务市场运行规则.pdf.md","sourceFilePath":"source-files/attachments/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号)/P020250402414856913103.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"cb963993905ba8a0d18e78db4819ae8a6e683bac79ad1c6b449c91ea16d14b3c"}}],"values":["国家能源局华中监管局关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知","现行三省联合调频规则以调频里程为结算基础，采用容量和里程报价、日前预出清与日内滚动出清，明确Kp准入、性能考核、日清月结和费用分摊。","华中监能市场规〔2025〕35号","国家能源局华中监管局","2025-04-02","https://hzj.nea.gov.cn/dtyw/tzgg/202504/t20250402_279001.html","source-files/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号).pdf","湖北、江西、重庆电力调频辅助服务市场运行规则.pdf|source-files/attachments/2025-04-02-关于印发《湖北、江西、重庆电力调频辅助服务市场运行规则》的通知(华中监能市场规〔2025〕35号)/P020250402414856913103.pdf","有效","2026-07-16"]},{"title":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","detail":"### 文件定位\n- 华中监能市场〔2022〕251号印发《湖北电力调频辅助服务市场运营规则》，于2022年11月发布，是湖北调频辅助服务市场早期运行规则。\n- 本文件已被华中监能市场规〔2025〕35号修订替代，保留在知识库中用于追溯2022年至2025年初的制度设计。\n\n### 市场机制\n- 规则以AGC或APC自动调节为基础，调频服务效果主要采用调频里程和性能指标衡量；市场采用日前预出清、日内滚动出清等组织方式。\n- 参与主体需满足调度运行、AGC或APC及性能测试等要求；性能系数低于规定门槛或不服从AGC指令的，可能失去补偿并受到限制。\n- 补偿以调频里程、性能系数和市场出清价格为核心，另配套容量补偿、偏差及违约考核安排。\n\n### 归档说明\n- 用户提供的PDF与国家能源局华中监管局公开附件内容一致，已以官方页面和附件链接归档。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2022-frequency-regulation/政策正文.md","sourceFilePath":"source-files/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"526f394fd002e3a0792aedb9ae7cf36700eef6f7cc88ecfc7a31e3c8a3636c80"}},{"title":"湖北电力调频辅助服务市场运营规则.pdf","sourceTitle":"关于印发《湖北电力调频辅助服务市场运营规则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2022-frequency-regulation/湖北电力调频辅助服务市场运营规则.pdf.md","sourceFilePath":"source-files/attachments/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号)/湖北电力调频辅助服务市场运营规则.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"fc4c2555333b13b8633d65e4b2926c7e1ff269a759836463a8c6d3904a25b433"}}],"values":["关于印发《湖北电力调频辅助服务市场运营规则》的通知","该历史规则明确湖北调频辅助服务以AGC或APC自动调节为基础，按调频里程、性能及市场价格补偿，并规范主体准入、报价、出清、结算和考核。","华中监能市场〔2022〕251号","国家能源局华中监管局","2022-11-08","https://hzj.nea.gov.cn/xxgk/zcfg/202310/t20231021_165676.html","source-files/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号).pdf","湖北电力调频辅助服务市场运营规则.pdf|source-files/attachments/2022-11-08-关于印发《湖北电力调频辅助服务市场运营规则》的通知(华中监能市场〔2022〕251号)/湖北电力调频辅助服务市场运营规则.pdf","被替代","2026-07-16"]}]},{"name":"湖南","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"江西","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"重庆","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"四川","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"四川电力中长期市场实施细则","detail":"### 文件定位\n- 四川能源监管办公开解读显示，《四川电力**中长期**市场实施细则》依据国务院办公厅关于完善全国统一电力市场体系的实施意见、《电力市场运行基本规则》《电力**中长期**市场基本规则》等文件制定，目的是深化四川**中长期**市场建设、适应全国统一电力市场和**现货市场**衔接需要。\n- 公开页面为政策解读，未见可读取的正式细则附件，因此本条以官方解读确认内容为准。\n- 解读显示，细则共14章122条，覆盖总则、总体要求、市场成员、交易品种和价格机制、批发交易、零售交易、交易校核、合同管理、计量结算、信息披露、技术支持系统、风险防控、争议处置、法律责任和附则。\n\n### 市场主体和准入注册\n- 与旧规则相比，四川新细则首先把**虚拟电厂**等资源聚合类新型经营主体纳入**中长期**市场，明确发电企业、售电公司、电力用户、**虚拟电厂**、电网企业、交易机构和调度机构的权利义务，强调运营机构加强市场监测分析。\n- 其次，规则优化注册、变更和注销流程，工商业用户直接参与市场选择周期缩短至一个月，新型主体需与分散资源签订聚合服务合同。\n- 第三，交易品种更丰富，在传统电能量交易基础上新增或明确电网企业代理购电市场化交易、保障性用电市场化交易、省间**中长期**外购挂牌交易等，体现四川水电、新能源、燃煤火电等多类型电源同台竞争和省间购电衔接的特点。\n\n### 交易品种和组织\n- 第四，价格机制允许固定价格和灵活价格合同，年度及更长期合同可约定随供需、成本变化的价格形成方式。\n- 第五，交易组织方面提出**中长期**交易逐步按日连续开市，提升交易频次，帮助主体在现货运行背景下动态调整合同曲线和风险敞口。\n- 绿色电力交易方面，官方解读提到要明确**绿电**交易关系建立、环境价值溯源、**绿电**合同转让和**差价结算**参考点，意味着**绿电**不仅是普通电量交易，还涉及**绿证**、环境价值和用户绿色消费证明。\n\n### 价格与结算机制\n- 交易校核方面，细则将交易出清校核和电网安全校核分工处理，现货连续运行后不再单独开展部分电网安全校核，有利于减少重复校核。\n- 计量结算方面，四川**中长期**市场暂采用**差价结算**，并衔接国家计量结算规则和结算参考点安排。\n- 对市场主体而言，该细则的实务意义在于：发电侧要关注水电、新能源和火电同台交易、合同曲线和结算参考点；\n\n### 主体影响和风险管理\n- 售电公司要关注零售套餐、代理用户、履约和风险；\n- 电力用户要关注直接交易、零售代理、**绿电**消费和偏差结算；\n- **虚拟电厂**等新型主体要关注聚合合同、资源边界和市场准入。","browserFiles":[{"title":"政策正文","sourceTitle":"四川电力中长期市场实施细则","markdownFilePath":"knowledge-markdown/doc-sc-2026-long-term/政策正文.md","sourceFilePath":"source-files/2026-04-10-四川电力中长期市场实施细则(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-16","sourceHash":"17c855351d44b8f8b2508a20808aed8218a37519109a133a576242b28382ba2f"}}],"values":["四川电力中长期市场实施细则","四川能源监管办公开解读显示，《四川电力中长期市场实施细则》依据国务院办公厅关于完善全国统一电力市场体系的实施意见、《电力市场运行基本规则》《电力中长期市场基本规则》等文件制定，目的是深化四川中长期市场建设、适应全国统一电力市场和现货市场衔接需要。 公开页面为政策解读，未见可读取的正式细则附件，因此本条以官方解读确认内容为准。","未见正式文号","国家能源局四川监管办公室、四川省发展改革委、四川省能源局","2026-04-10","https://scb.nea.gov.cn/xxgk/zcjd/202606/t20260603_302382.html","source-files/2026-04-10-四川电力中长期市场实施细则(未见正式文号).pdf","","有效","2026-07-14"]}]},{"name":"西藏","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"陕西","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"甘肃","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《甘肃省电力中长期交易实施细则》的通知","detail":"### 文件定位\n- 该通知由国家能源局甘肃监管办公室、甘肃省发展改革委、甘肃省工信厅、甘肃省能源局联合印发，文号为甘监能市场〔2025〕212号，正文要求国网甘肃省电力公司、甘肃电力交易中心、甘肃省电力市场管理委员会以及各发电企业、售电公司、电力用户和新型经营主体遵照执行。\n- 附件《甘肃省电力**中长期**交易实施细则》是本条政策的核心内容，覆盖甘肃**中长期**市场注册、交易、执行、结算、信息披露和监督管理，并把政府定价优先发电电量视同厂网间双边协商交易电量纳入**中长期**市场管理。\n- 细则先明确市场成员范围：经营主体包括发电企业、售电公司、电力用户和储能、**虚拟电厂**、负荷聚合商、分布式发电、智能微电网、源网荷储一体化等新型经营主体；\n- 用户侧分为批发用户、零售用户和电网企业代理购电用户，零售用户可通过售电公司、**虚拟电厂**或聚合商代理购电。\n\n### 市场成员与准入注册\n- 文件强调**中长期**市场要与**现货市场**在交易时序、出清和结算上衔接，也要与跨省跨区交易衔接，电力市场运营机构和电网企业按统一标准开展注册、交易组织、结算和信息披露。\n- 市场准入方面，经营主体须符合《**电力市场注册**基本规则》等要求，工业商业用户未直接交易也未签代理购电合同的，按规则纳入代理购电；\n- 已注册主体若不再持续满足准入条件，可被暂停资格和交易权限。\
