  <style>
    :root {
      color-scheme: light;
      --bg: #f3f7fb;
      --bg-radial: radial-gradient(circle at 16% 0%, rgba(20, 184, 166, .16), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(245, 158, 11, .14), transparent 28%),
        linear-gradient(180deg, #eef6fb 0%, #f8fafc 52%, #eef3f7 100%);
      --card: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #dbe5ee;
      --brand: #07566b;
      --brand-strong: #083344;
      --brand-soft: #e5f5f6;
      --accent: #f6a51a;
      --cyan: #22d3ee;
      --shadow: 0 24px 70px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-radial);
      color: var(--ink);
    }
    header {
      position: relative;
      min-height: 278px;
      overflow: hidden;
      padding: 34px 32px 84px;
      background-image:
        linear-gradient(90deg, rgba(3, 19, 35, .94) 0%, rgba(6, 41, 61, .82) 34%, rgba(6, 58, 76, .38) 72%, rgba(5, 24, 41, .58) 100%),
        url("assets/electricity-market-hero.png");
      background-size: cover;
      background-position: center;
      color: #fff;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 28%, rgba(34, 211, 238, .24), transparent 32%),
        linear-gradient(180deg, transparent 58%, rgba(243, 247, 251, .96) 100%);
      pointer-events: none;
    }
    header::after {
      content: "";
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 34px;
      height: 1px;
      background: linear-gradient(90deg, rgba(34, 211, 238, .65), rgba(246, 165, 26, .38), transparent);
      opacity: .8;
    }
    .hero-card {
      position: relative;
      z-index: 1;
      width: min(920px, 100%);
      padding: 28px 30px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(8, 51, 68, .62), rgba(8, 83, 102, .24));
      box-shadow: 0 28px 90px rgba(0, 15, 31, .32);
      backdrop-filter: blur(14px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      color: #bff7ff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(34, 211, 238, .95);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -.04em;
    }
    .subhead {
      max-width: 760px;
      margin: 0;
      color: rgba(255, 255, 255, .88);
      line-height: 1.75;
      font-size: 15px;
    }
    .hero-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .92);
      font-size: 13px;
      backdrop-filter: blur(10px);
    }
    .metric-chip strong { color: #fff; }
    main {
      position: relative;
      z-index: 2;
      max-width: 1480px;
      margin: -52px auto 0;
      padding: 0 24px 46px;
    }
    .knowledge-shell {
      border: 1px solid rgba(255, 255, 255, .76);
      border-radius: 28px;
      background: rgba(255, 255, 255, .72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid rgba(219, 229, 238, .9);
      background: rgba(248, 250, 252, .86);
      backdrop-filter: blur(16px);
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .88);
      border-radius: 999px;
      padding: 9px 15px;
      cursor: pointer;
      color: var(--ink);
      box-shadow: 0 4px 14px rgba(15, 23, 42, .04);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .tab:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 211, 238, .42);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .08);
    }
    .tab.active {
      background: linear-gradient(135deg, var(--brand-strong), #0e7490);
      border-color: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 28px rgba(7, 86, 107, .26);
    }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    #searchInput {
      width: min(680px, 100%);
      border: 1px solid #cfdbe7;
      border-radius: 16px;
      padding: 13px 16px;
      font-size: 15px;
      background: rgba(255, 255, 255, .94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .9), 0 6px 18px rgba(15, 23, 42, .05);
      outline: none;
    }
    #searchInput:focus {
      border-color: rgba(34, 211, 238, .78);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, .16), 0 8px 22px rgba(15, 23, 42, .08);
    }
    .hint { color: var(--muted); font-size: 13px; }
    .card {
      background: rgba(255, 255, 255, .92);
      border: 0;
      border-radius: 0;
      overflow: hidden;
    }
    .sheet-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      background: linear-gradient(90deg, rgba(229, 245, 246, .8), rgba(255, 255, 255, .72));
    }
    .table-wrap { overflow: auto; max-height: calc(100vh - 260px); }
    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1120px;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid #eef0f3;
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      background: rgba(255, 255, 255, .98);
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eaf3f7;
      color: #274155;
      white-space: nowrap;
      font-size: 13px;
      letter-spacing: .02em;
    }
    tr:hover td { background: #f8fcff; }
    .clamped-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 360px;
      line-height: 1.55;
    }
    .empty {
      padding: 42px;
      text-align: center;
      color: var(--muted);
    }
    a { color: #08738a; text-decoration: none; font-weight: 650; }
    a:hover { text-decoration: underline; }
    .detail-button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: linear-gradient(135deg, #e0fbff, #fff7e6);
      color: #07566b;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(7, 86, 107, .1);
    }
    .detail-button:hover { outline: 2px solid rgba(34, 211, 238, .34); }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(7, 20, 34, .56);
      padding: 28px;
      backdrop-filter: blur(6px);
    }
    .modal-backdrop.open { display: grid; place-items: center; }
    .modal {
      width: min(980px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .28);
      border: 1px solid rgba(255, 255, 255, .8);
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title { margin: 0; font-size: 20px; }
    .close-button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .details {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0;
      padding: 6px 20px 22px;
    }
    .details dt, .details dd {
      margin: 0;
      padding: 12px 0;
      border-bottom: 1px solid #f0f2f5;
      line-height: 1.75;
    }
    .details dt { color: var(--muted); font-weight: 700; }
    .details dd { white-space: pre-wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      font-weight: 700;
    }
    @media (max-width: 720px) {
      header { padding: 22px 16px 78px; min-height: 300px; }
      header::after { left: 18px; right: 18px; }
      .hero-card { padding: 22px 18px; border-radius: 22px; }
      main { margin-top: -48px; padding: 0 12px 28px; }
      .knowledge-shell { border-radius: 22px; }
      .toolbar { padding: 14px; }
      .details { grid-template-columns: 1fr; }
      .details dt { border-bottom: 0; padding-bottom: 0; }
      .modal-backdrop { padding: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <section class="hero-card" aria-label="电力市场知识库概览">
      <p class="eyebrow">Electricity Market Knowledge Base</p>
      <h1>电力市场知识库</h1>
      <p class="subhead">面向电力市场小白的政策、概念与省级交易规则知识库。长文本默认折叠，来源链接和本地归档文件可直接跳转查看。</p>
      <div class="hero-metrics" aria-label="知识库元信息">
        <span class="metric-chip">数据更新 <strong>2026-07-14</strong></span>
        <span class="metric-chip">网页生成 <strong>2026-07-14</strong></span>
        <span class="metric-chip">覆盖 <strong>国家 + 8 省</strong></span>
      </div>
    </section>
  </header>
  <main>
    <section class="knowledge-shell">
      <section class="toolbar" aria-label="筛选工具">
        <div id="tabs" class="tabs"></div>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索概念、政策、交易品种、文号、适用对象……" />

        </div>

  <div id="detailModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

      <div class="modal-header">

        <button class="close-button" type="button" onclick="closeModal()">关闭</button>
      </div>
      <dl id="modalDetails" class="details"></dl>
    </article>
  </div>
  <script>
    const appData = {"generatedAt":"2026-07-14","lastUpdatedAt":"2026-07-14","sheets":[{"name":"基础概念","columns":["概念","通俗解释","详细解读","关联机制","适用范围","来源文件","发文编号","链接","查看文件","附件归档","核验日期"],"rows":[{"title":"新能源上网电价市场化","values":["新能源上网电价市场化","新能源上网电量逐步通过电力市场交易形成价格。","新能源上网电价市场化的核心是让风电、光伏等新能源电量原则上进入电力市场，通过中长期、现货等交易形成上网价格。对初学者来说，最重要的是把“市场交易价格”和“配套结算机制”分开看：市场交易价格来自买卖双方或现货市场出清，反映供需、时段、出力和系统运行状况；配套结算机制则用于平稳衔接改革前后项目收益预期，特别是对纳入机制的新能源电量按机制电价和市场交易均价进行差价结算。文件还要求完善现货和中长期市场规则，允许新能源报量报价或接受市场形成价格，并要求各地在2025年底前出台实施方案。项目业主需要关注本省具体方案、市场注册、交易申报、合同签订、结算口径、绿证收益衔接以及退出规则。","机制电价；电力现货市场；中长期交易","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"电力市场注册","values":["电力市场注册","市场经营主体参与交易前按规则完成注册的基础手续。","电力市场注册是发电企业、售电公司、电力用户、新型经营主体等进入电力市场前的基础管理环节。它不是一张简单的“报名表”，而是把主体身份、经营资质、基本信息、信用和变更注销等事项纳入统一管理。注册完成后，主体才具备按规则参与市场的基础身份，但不等于自动获得所有交易品种资格；各省仍会根据中长期、现货、绿电、辅助服务、需求响应等不同品种设置准入条件、履约要求、申报流程和考核方式。主体应保证注册信息真实、完整、及时更新，名称、法定代表人、用电户号、资产关系、代理关系等重要信息变化时按规则办理变更。对小白来说，可以把注册理解为进入市场的“账户体系”和“身份核验”，后续交易、结算、信息披露和监管都会以注册信息为基础。","市场准入；交易主体管理","国家","国家能源局关于印发《电力市场注册基本规则》的通知","国能发监管规〔2024〕76号","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","2026-07-14"]},{"title":"容量电价（容量电费）","values":["容量电价（容量电费）","不是按发了多少电付钱，而是为电源可在关键时段顶得上、支撑系统安全供应而付的钱。","容量电价关注的是“有没有可靠能力”，电量电价关注的是“实际发了多少电”。传统单一制电价主要按上网电量结算，容易让煤电、气电、抽水蓄能、储能等承担保供和调节任务的电源只在发电时获得收入，难以体现其可用容量、顶峰能力和系统支撑价值。2023年煤电容量电价机制先把合规在运公用煤电机组从单一制电价调整为两部制：电量电价由市场化方式形成，容量电价按回收一定比例固定成本确定。煤电机组可获得的容量电费，通常根据当地容量电价和机组申报最大出力确定，由电网企业按月结算；相关费用纳入系统运行费用，原则上由工商业用户按用电量比例分摊并滚动清算。2026年文件进一步把视角从“煤电容量电价”扩展到“发电侧容量电价机制”，分类完善煤电、天然气发电、抽水蓄能、新型储能容量电价，并提出现货市场连续运行后有序建立可靠容量补偿机制。需要注意，容量电价不是无条件补贴，机组若不能按调度指令或规则要求提供申报能力，会被扣减容量电费，严重时可能取消获取资格。理解它的关键，是把它看成电力系统为可靠容量、顶峰能力和调节价值付出的成本安排。","两部制电价；系统运行费用；可靠容量补偿","国家","国家发展改革委 国家能源局关于建立煤电容量电价机制的通知；国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2023〕1501号；发改价格〔2026〕114号；国发〔2026〕22号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html；https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf；source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","2026-07-14"]},{"title":"可靠容量补偿机制","values":["可靠容量补偿机制","在现货市场连续运行后，对机组在系统高峰时真正能稳定供电的能力给予补偿。","可靠容量补偿机制比传统容量电价更强调“顶峰时能不能可靠顶上”。2026年发电侧容量电价文件提出，电力现货市场连续运行后，省级价格主管部门会同相关部门适时建立可靠容量补偿机制，对机组可靠容量按统一原则补偿。这里的可靠容量，是机组在全年系统顶峰时段能够持续稳定供电的容量，而不是装机容量的简单数字。补偿标准以弥补市场边际机组在电能量和辅助服务市场不能回收的固定成本为基础，同时考虑电力供需、用户承受能力和市场建设进展。补偿范围可包括自主参与当地市场的煤电、气电、符合条件的电网侧独立新型储能等，并可随着市场和电价改革逐步扩展到抽水蓄能等其他具备可靠容量的机组，但已经获得其他保障的容量不重复补偿，政府定价机组也不予补偿。它与容量电价的关系是衔接替代：可靠容量补偿机制建立后，相关煤电、气电、独立储能等机组不再执行原有容量电价。对市场参与者来说，这意味着未来容量收益更可能与顶峰贡献、考核表现和市场化运行条件绑定。","容量电价；现货市场；顶峰能力","国家","国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2026〕114号；国发〔2026〕22号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"机制电价","values":["机制电价","新能源价格结算机制里用于差价结算的基准价，不是新能源所有电量的固定上网电价。","机制电价来自新能源可持续发展价格结算机制，是改革后平衡市场化交易和项目收益稳定的一项结算参数。发改价格〔2025〕136号要求新能源上网电量原则上全部进入电力市场，价格通过市场交易形成；同时对纳入机制的电量，电网企业每月按照机制电价开展差价结算。也就是说，新能源企业平时仍参与市场，市场交易均价由中长期或现货等市场形成；机制电价只对“纳入机制的电量”起作用，用来与市场交易均价比较并结算差额。机制电价并不等同于过去意义上的固定上网标杆电价，也不意味着所有新能源电量都按这个价格卖出。存量项目和增量项目的机制安排不同：存量项目重在政策衔接，增量项目一般通过竞争性方式确定纳入机制的电量规模、机制电价和执行期限。各地还要结合电力市场建设、新能源成本变化、绿色电力消费和用户承受能力制定具体方案。小白理解时可记住一句话：市场决定成交价，机制电价用于特定电量的差价结算和收益预期衔接。","机制电量；差价结算；新能源上网电价市场化","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"机制电量","values":["机制电量","被纳入新能源可持续发展价格结算机制、可以按机制电价做差价结算的电量范围。","机制电量解决的是“哪些电量可以享受机制电价差价结算”的问题。新能源项目上网电量原则上进入市场后，并不是全部电量都自动按机制电价结算；只有纳入新能源可持续发展价格结算机制的电量，才会按机制电价与市场交易均价进行差价结算。文件要求各地每年将纳入机制的电量分解到月度，如果某月实际上网电量低于当月分解电量，就按实际上网电量结算，并在年内按月滚动清算。增量项目的机制电量通常要通过竞争性方式确定，机制电量规模、机制电价、执行期限等共同影响项目收益预期。机制电量到期或项目自愿退出机制后，不再纳入机制执行范围。这个概念容易和“实际发电量”“市场成交电量”混淆：实际发电量是物理产出，市场成交电量是市场合同或现货出清结果，机制电量则是政策结算机制认可的电量额度。做项目测算时，应分别看市场收入、机制差价结算、绿证及其他收益，并关注本省具体分月分解和清算口径。","机制电价；差价结算；新能源可持续发展价格结算机制","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"差价结算","values":["差价结算","把市场交易均价和政策机制价之间的差额算出来，多退少补式地进入结算。","差价结算是理解机制电价时最关键的结算动作。按照新能源上网电价市场化改革文件，对纳入机制的电量，电网企业每月按机制电价开展差价结算，将市场交易均价与机制电价的差额纳入当地系统运行费用。现货市场连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；现货市场未连续运行地区，原则上按交易活跃周期的发电侧中长期交易同类项目加权平均价格确定。它的含义不是“项目不参加市场”，而是项目先在市场中形成价格，再对纳入机制的电量按规则计算差额。若市场交易均价低于机制电价，机制可以起到一定收益托底作用；若市场交易均价高于机制电价，也可能形成反向结算或冲抵安排，具体取决于地方实施方案和结算细则。文件还提出初期不再开展其他形式的差价结算，并要求电网企业对机制执行结果单独归集。实际看项目收益时，需要同时掌握机制电量、机制电价、市场均价、结算周期、月度滚动清算和是否退出机制等条件。","机制电价；机制电量；系统运行费用","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","2026-07-14"]},{"title":"绿证市场与绿电交易衔接","values":["绿证市场与绿电交易衔接","绿证证明可再生能源电量的绿色属性，绿电交易则把电能量和绿色环境价值一起交易，两者需要规则衔接避免重复计算。","绿证市场与绿电交易衔接，是“十五五”阶段电力市场绿色价值体系的重要方向。对初学者来说，可以把普通电力交易理解为买卖“电能量”，而绿电交易还要体现电来自可再生能源的环境价值；绿证则是可再生能源绿色属性的凭证。政策提出要高质量建设绿证市场，拓展绿证应用场景，健全中长期绿证、绿电交易制度，并加强碳市场、绿证、绿电等市场化机制的衔接协同。这意味着未来绿色电力消费不只是买到电，还要把绿证、绿电合同、碳排放核算、企业可持续披露、重点行业可再生能源消费目标等制度打通。对发电企业而言，需要关注绿证核发、交易、收益归属，以及纳入新能源可持续发展价格结算机制的电量是否能重复获得绿证收益；对电力用户和售电公司而言，需要关注绿电合同如何对应绿证、环境价值如何定价、绿色消费声明如何留痕，以及是否满足所在行业、园区或企业的低碳评价要求。容易误解的地方是：绿证和绿电不是简单叠加的两笔收益，政策更强调同一绿色属性不能重复出售、重复声明或重复核算，具体结算口径仍需看国家和地方交易规则。","绿色电力交易；可再生能源消费；碳市场；新能源上网电价市场化","国家","国务院关于印发《“十五五”碳达峰行动方案》的通知；国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","国发〔2026〕22号；发改价格〔2025〕136号","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml；https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf；source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","2026-07-14"]},{"title":"需求响应价格机制","values":["需求响应价格机制","通过价格信号鼓励用户在电力紧张或新能源消纳需要时调整用电，用户侧调节能力也能获得价值体现。","需求响应价格机制关注的是用户侧调节能力。传统电力系统更多依赖发电侧调节，新能源占比提高后，系统会更需要用户根据价格信号改变用电时间、降低尖峰负荷或配合新能源消纳。“十五五”碳达峰行动方案提出，持续扩大电力系统调节资源规模，挖掘需求侧调节潜力，加快虚拟电厂发展，推动可调节负荷等各类分散资源参与系统调节，并在价格政策中提出探索建立反映调节能力的需求响应价格机制，充分激发用户侧调节潜力。对小白来说，这不是简单的“少用电给补贴”，而是把可中断负荷、可转移负荷、储能、充电设施、空调负荷、工业柔性负荷等资源聚合起来，在电价高、系统紧张或需要调峰时响应调度或价格信号，并通过价格、补偿或市场收益体现其价值。适用主体可能包括电力用户、售电公司、虚拟电厂、负荷聚合商、储能和充电运营商等。它与峰谷分时电价、零售市场价格机制、辅助服务、虚拟电厂、现货市场价格信号密切相关。需要注意，国家方案提出的是方向性要求，具体准入、响应申报、基线计算、效果核验、补偿标准和考核规则，需要由各省电力市场规则、需求响应实施方案或虚拟电厂规则进一步明确。","虚拟电厂；可调节负荷；分时电价；电力现货市场；辅助服务","国家","国务院关于印发《“十五五”碳达峰行动方案》的通知","国发〔2026〕22号","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]}]},{"name":"国家政策","columns":["文件标题","详细解读","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","values":["国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","该文件建立煤电容量电价机制，是从单一制煤电上网电价转向两部制电价的基础政策。核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本；容量电价按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。适用范围是合规在运的公用煤电机组，不包括燃煤自备电厂、不符合规划要求的煤电机组，以及能耗、环保、灵活调节能力不达标的机组。文件规定全国煤电机组固定成本实行统一参考标准330元每千瓦年，2024年至2025年多数地方按约30%的固定成本回收比例确定容量电价，部分转型较快地区可按约50%执行；2026年起，各地通过容量电价回收煤电固定成本的比例原则上不低于50%。附件《省级电网煤电容量电价表》列明各省级电网2024年至2025年容量电价标准，多数省份为100元每千瓦年，部分省份为165元每千瓦年，并注明2026年后云南、四川等转型较快地区回收比例不低于70%、其他地区不低于50%。容量电费的计算方式是按当地容量电价乘以机组申报最大出力，由电网企业按月向煤电企业结算；新投产煤电机组自投运次月起执行。容量电费不直接由某个用户单独承担，而是纳入系统运行费用，由工商业用户按当月用电量比例分摊并按月滚动清算，居民、农业等目录用户按现行政策衔接。跨省跨区外送煤电机组另有分摊规则：纳入受电省电力电量平衡的配套煤电原则上按受电省容量电价执行，费用由受电省承担；多省共用的，按受电电量或容量分摊；未纳入受电省平衡的外送机组，容量电费原则上由送电省承担。文件不是无条件补贴，还设置最大出力申报和考核：煤电机组未按调度指令达到申报最大出力的，月内出现2次扣减当月容量电费10%，3次扣减50%，4次及以上扣减100%；若一年内连续或累计多次被扣完容量电费，可能取消容量电费获取资格。文件要求省级价格主管部门制定本地执行方案，电网企业负责计算、分摊和结算，煤电企业如实申报最大出力并履行可用容量义务，同时与电力市场建设、煤电中长期合同、辅助服务和调峰补偿政策衔接，避免重复补偿。","发改价格〔2023〕1501号","国家发展改革委、国家能源局","2023-11-10","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","values":["国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","该文件是新能源上网电价市场化改革和机制电价、机制电量、差价结算等概念的直接来源。文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成；跨省跨区交易按跨省跨区市场规则形成价格。它同时要求完善新能源参与现货和中长期市场的价格机制：现货市场中，新能源应公平参与实时市场并逐步自愿参与日前市场，报价上下限要与工商业峰谷电价、非市场化收益等因素衔接；中长期市场中，要适应新能源出力波动和预测不确定性，缩短交易周期、提高交易频次，支持周、多日、日等短周期交易，合同可以约定量价曲线、灵活价格形成方式和偏差责任。绿电交易方面，文件要求绿色电力交易价格明确区分电能量价格和绿证价格，省内绿电交易初期不再单独组织集中竞价或滚动撮合，避免与常规电力交易割裂。为平稳衔接市场化改革，文件建立新能源可持续发展价格结算机制：纳入机制的电量仍参与市场交易形成市场交易价格，但电网企业每月按机制电价与市场交易均价进行差价结算，差额纳入当地系统运行费用。现货连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；现货未连续运行地区，按交易活跃周期内发电侧中长期交易同类项目加权平均价格确定。文件区分存量和增量项目：2025年6月1日前投产的存量项目，机制电量规模与现行保障性收购或保障利用小时等政策衔接，机制电价按现行价格政策确定且不高于当地煤电基准价，执行期限按原政策衔接；2025年6月1日起投产的增量项目，纳入机制的电量规模、机制电价和执行期限原则上通过竞争性方式确定，竞价上限综合新能源成本、绿色价值、供需和用户承受能力等因素设置，执行期限结合同类项目合理回收初始投资期限确定。结算上，机制电量按年度规模分解到月，月度实际上网电量低于当月机制电量的，按实际电量结算并在年内滚动清算；项目可自愿退出机制，期满或退出后不再纳入机制。文件还明确绿证收益和机制结算不能重复获得，同一新能源项目纳入机制的电量对应绿证收益应按政策衔接处理；电网企业可通过代理购电、单独归集等方式承接机制差价结算，相关费用纳入系统运行费用。地方层面，文件要求各省在2025年底前制定实施方案，做好项目测算、用户承受能力评估、政策宣传和市场监管，并强调不得将配置储能作为新能源项目核准、并网、上网等前置条件，不得乱收费，存量补贴项目仍按合理利用小时等政策享受原补贴。","发改价格〔2025〕136号","国家发展改革委、国家能源局","2025-02-09","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","values":["国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","该文件是在煤电容量电价机制基础上，进一步把容量价值覆盖到煤电、气电、抽水蓄能、新型储能等发电侧可靠资源的政策。文件的核心目标是分类完善容量电价机制，既保障电力系统长期容量充裕和顶峰安全，又推动新能源高比例接入后的调节资源建设，并与现货、辅助服务、中长期交易等市场衔接。煤电方面，文件要求各地继续按发改价格〔2023〕1501号执行煤电容量电价，并将通过容量电价回收煤电固定成本比例提高到不低于50%；地方可结合电力市场建设、煤电利用小时、保供压力和用户承受能力适当提高。气电方面，省级价格主管部门可根据当地天然气发电功能定位和固定成本回收情况建立容量电价机制，支持其承担顶峰、调节和保供作用。抽水蓄能方面，文件区分不同开工节点：633号文以前核价项目继续执行既有政府定价机制；以后核价项目由省级价格主管部门按平均成本、合理收益等原则统一核定容量电价，原则上每3至5年校核一次，连续满发小时数低于6小时的按能力折算；抽水蓄能参与电能量和辅助服务市场形成的收益按规则分享，剩余容量电费纳入系统运行费用。新型储能方面，文件提出建立电网侧独立新型储能容量电价机制，前提是项目服务电力系统安全稳定运行、未作为新能源配储等方式重复保障，并按清单管理；容量电价可参照当地煤电容量电价乘以顶峰容量折算系数确定，折算系数与储能持续充放电时长和当地最长净负荷尖峰持续时间相关，最高不超过1。可靠容量补偿是文件的另一个重点：在电力现货市场连续运行后，省级价格主管部门会同有关部门适时建立发电侧可靠容量补偿机制，对自主参与当地市场、在系统顶峰时段能够持续稳定供电的煤电、气电、符合条件的电网侧独立新型储能等可靠容量按统一原则补偿，并逐步扩展到抽水蓄能等其他可靠资源。补偿标准应基于市场边际机组在电能量和辅助服务市场未能回收的固定成本，同时考虑电力供需、用户承受能力和市场建设进展；已经通过其他方式获得容量保障的部分不得重复补偿，政府定价机组不纳入。政策衔接方面，一旦可靠容量补偿机制建立，纳入该机制的煤电、气电和独立储能不再执行原容量电价；新政策后核价的抽水蓄能可选择可靠容量补偿路径。文件还要求完善市场交易和结算配套，包括调整煤电中长期交易价格下限、不得强制固定价格、鼓励灵活价格机制、容量费用和可靠容量补偿纳入系统运行费用、区域共用抽水蓄能容量费按容量分配或受益分摊，以及在出台前开展用户承受能力和工商业电价影响评估。","发改价格〔2026〕114号","国家发展改革委、国家能源局","2026-01-30","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","","有效","2026-07-14"]},{"title":"国务院关于印发《“十五五”碳达峰行动方案》的通知","values":["国务院关于印发《“十五五”碳达峰行动方案》的通知","该文件由国务院印发，文号为国发〔2026〕22号，生态环境部官网转载来源为中国政府网。文件定位是“十五五”时期推进碳达峰的总纲性行动方案，目标是在2030年前确保如期实现碳达峰，并为2035年国家自主贡献目标和碳中和奠定基础。它不是一份单一电力市场交易规则，但对电力市场、价格机制、绿证绿电、需求响应、容量价值和新能源消纳均提出方向性要求，因此应作为国家层面电力市场相关政策背景入库。总体目标方面，方案提出到2030年单位国内生产总值二氧化碳排放比2025年降低17%，非化石能源消费占比达到25%。对电力行业而言，文件把能源绿色低碳转型作为关键，要求更大力度发展新能源，统筹开发布局和消纳利用，扩大非化石能源有效供给；到2030年，风电和太阳能发电总装机达到28亿千瓦以上，常规水电装机4.1亿千瓦左右，核电运行装机1.1亿千瓦左右。电力系统建设方面，文件要求提升跨省跨区输电和互补互济能力，加快特高压外送通道建设，新增西电东送能力8000万千瓦以上，推进省间电力互济工程；同时支持新能源就地消纳，发展绿电直连、新能源就近接入增量配电网等绿电直供模式，推动源网荷储一体化。调节资源方面，文件强调持续扩大电力系统调节资源规模，因地制宜建设抽水蓄能，推动新型储能规模化和长时储能发展，挖掘需求侧调节潜力，加快虚拟电厂发展，推动可调节负荷等分散资源参与系统调节；到2030年，抽水蓄能装机约1.6亿千瓦，新型储能装机力争3亿千瓦，全国虚拟电厂最大调节能力5000万千瓦以上，电力需求响应能力达到最大用电负荷5%以上。煤电定位方面，方案要求合理控制煤电装机规模和发电量，推动煤电向支撑性、调节性电源转型，支持煤电与新能源融合发展，开展煤电机组低碳化改造，并依法依规淘汰不符合环保、能耗、用煤、安全、年限等要求的煤电机组，推动自备机组参与电网调峰。产业和负荷侧方面，文件推动零碳园区、零碳工厂、绿色算力设施建设，支持园区、工业企业和算力设施开展绿电直连、工业绿色微电网、数字化能碳管理中心以及储能、备用电源等配套，这些内容会影响未来绿电交易、可再生能源消费、负荷聚合和源网荷储商业模式。价格政策是本文件与电力市场最直接相关的部分：方案要求深化各类电源上网电价市场化改革，落实新能源可持续发展价格结算机制和新能源就近消纳价格机制；对以输送清洁能源电量或联网功能为主的工程探索实行两部制电价或单一容量电价；推动“沙戈荒”新能源基地作为整体参与市场交易；完善发电侧容量电价机制，有序建立发电侧可靠容量补偿机制；完善体现分时价值差异的零售市场价格机制，并探索建立反映调节能力的需求响应价格机制。市场化机制方面，方案要求加强全国碳排放权交易市场建设，积极发展全国温室气体自愿减排交易市场，高质量建设绿证市场，拓展绿证应用场景，健全中长期绿证、绿电交易制度，并加强碳市场、绿证、绿电等市场化机制衔接协同。对市场主体的影响是：发电企业需要关注新能源参与市场、容量价值、可靠容量补偿、煤电调节转型和绿证收益衔接；电力用户、售电公司、虚拟电厂和负荷聚合商需要关注分时零售价格、需求响应、绿电消费、绿证核算和可调节负荷价值；地方政府和监管部门需要制定省级“十五五”碳达峰行动方案，并在综合评价考核、价格政策、市场机制和项目建设中落实。需要注意，文件多为国家战略和政策方向，具体准入条件、交易流程、结算口径、考核方式仍需结合后续国家部委细则和各省电力市场规则执行；本次入库未发现该网页另附官方附件。","国发〔2026〕22号","国务院","2026-07-05","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力市场注册基本规则》的通知","values":["国家能源局关于印发《电力市场注册基本规则》的通知","该文件印发《电力市场注册基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。规则适用于中长期、现货、辅助服务等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括新型储能、虚拟电厂、智能微电网等。文件强调注册管理要坚持规范入市、公开透明、全国统一和信息共享，原则上实行全国统一的注册事项清单，各地不得另行设置不合理的地方负面清单或附加条件；注册信息应在不同市场、不同交易机构之间共享，推动一地注册、全国共享。主体基本条件方面，经营主体应具备独立承担民事责任能力、财务和信用条件，不存在严重失信且未完成信用修复等情形。发电企业需具有核准或备案手续、发电业务许可证或符合豁免条件、并网调度协议、调度自动化和计量条件；燃煤自备电厂还要符合能效、环保等要求。售电公司按售电公司管理规则执行。电力用户应具备符合交易和结算要求的计量条件，工商业用户可直接参与市场或由电网企业代理购电。新型储能需具备并网调度协议、调度自动化、分时计量、最大充放电功率、容量和持续时长等信息；虚拟电厂和负荷聚合商需具有负荷确认协议或调度协议，接入负荷管理、自动化或调控系统，具备资源聚合、监测和控制能力；分布式发电、充电设施、智能微电网等也分别提出备案、计量、调度或负荷管理要求。注册流程包括申请、承诺、审查、公示和生效，交易机构一般在5个工作日内完成审查，部分主体可按规定免于公示；经营主体同一合同周期内原则上只能与一家售电公司或虚拟电厂建立零售或聚合关系，多重身份需分别注册。信息变更方面，主体名称、法定代表人、股权或实际控制关系、许可证、机组参数、储能容量、售电公司和虚拟电厂资产与人员等重要信息变化后，应在5个工作日内办理变更，变更期间通常可继续参加交易。注销方面，破产、关停、政策变化、并网关系变化、机组退役、无工商业用电等情形可办理注销，注销前要处理未履约合同和电费清算，相关信息保留5年。文件还规定异议处理、虚假材料处理、保密义务、信用评价和监管责任，为后续各省规则中的准入、交易资格、履约担保和市场秩序管理提供基础依据。","国能发监管规〔2024〕76号","国家能源局","2024-09-13","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","有效","2026-07-14"]}]},{"name":"江苏","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"江苏｜中长期交易","values":["中长期交易","江苏2026版中长期实施细则是江苏年度、月度、月内、日滚动及绿色电力交易的核心规则，适用于经营主体注册、交易、合同执行、计量结算、信息披露和监管。规则把发电企业、售电公司、电力用户以及分布式新能源、储能、可调节负荷、虚拟电厂、负荷聚合商、智能微电网、源网荷储一体化等新型经营主体纳入市场，其中负荷侧虚拟电厂参照售电公司管理，发电侧虚拟电厂参照发电企业管理。主体完成注册后才能参与交易，批发身份和零售身份互斥；售电公司、虚拟电厂等不能持续满足注册条件的，可被强制退出并承担违约责任。交易品种包括电能量直接交易、合同转让交易和绿色电力交易，方式包括集中交易、双边协商、滚动撮合和挂牌；未履行合同可通过合同转让全部或部分转让，权利义务同步转移。价格方面，除政府定价电量外由市场形成，中长期合同可采用固定价格，数年和年度合同可采用公开、可量化的灵活价格机制；绿电价格由电能量价格和绿电环境价值组成。交易组织方面，规则要求交易公告明确品种、主体、申报时间、执行周期、限价和校核条件，逐步通过小时级合同曲线与现货市场衔接。江苏对绿电规则较细：支持数年绿电和小时级绿电试点，要求绿色电力和环境价值一一对应、可追踪溯源；售电公司签订小时级绿电零售套餐后，要把用户需求关联至批发侧绿电合同，虚拟电厂聚合分布式新能源参与绿电也要关联具体项目。结算方面，计量装置应满足最小结算单元，中长期采用差量结算，合同电量照付不议，偏差在现货市场结算；纳入新能源可持续发展价格结算机制的电量按机制电价差价结算。风险和考核主要落在履约保障、申报限额、合同执行、偏差结算、信息披露、交易校核和市场监管。","已完成电力市场注册、符合江苏市场准入要求的发电企业、售电公司、电力用户等经营主体；新型经营主体按江苏后续配套要求执行。","经营主体应按交易公告和市场规则申报、成交、签订或确认合同，履行结算、信息披露和合规义务；市场运营机构按规则组织交易并做好信息披露和风险防控。","以完成电力市场注册为基础，并满足江苏细则及交易公告对交易品种、信用、履约、计量和结算账户等要求。","注册入市后，关注交易公告，按年度、月度、月内等周期申报电量、电价或曲线，成交后形成合同或交易确认，进入执行、结算和偏差处理。","按合同执行、偏差处理、信息披露、履约保障和市场监管要求考核；违规或不履约按细则、市场监管办法和交易公告处理。","关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","未见正式文号","https://jsb.nea.gov.cn/dtyw/tz/202603/t20260306_297521.html","source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).pdf","江苏省电力中长期市场实施细则（2026版）.pdf|source-files/attachments/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号)/P020260306620943462050.pdf","有效","2026-07-14"]}]},{"name":"浙江","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"浙江｜现货电能量、调频辅助服务","values":["现货电能量、调频辅助服务","浙江现货市场已于2025年8月7日转入正式运行，形成以《浙江电力现货市场规则》（浙监能市场〔2024〕4号）为核心、7个配套实施细则为支撑的1+7现货规则体系。浙江现货规则的重点，是在中长期合同之外，通过日前、实时等市场机制形成更能反映时段供需、电网约束和调节需求的价格。官方页面显示，浙江在国内率先推进调频辅助服务和电能量市场联合出清，使调频资源机会成本、调节成本和电能量价格在同一市场框架下协调反映。2025年底浙江又完成现货电能量、调频辅助服务和市场管理三项细则修订，重点补充储能和新能源入市机制，明确其参与现货电能量和调频辅助服务的门槛、交易机制和参数；同时增加新能源优先消纳原则，即火电与新能源同价时新能源优先出清。市场管理上，浙江补充风险处置定义和措施，完善市场力监测公式、参数和缓解措施，合并历次市场管理委员会公告，并统一电量、电价、电费计量单位。对发电企业来说，浙江现货正式运行后报价、可用容量、调频性能、日前和实时出清结果都会影响收入；对新能源和储能来说，入市门槛、交易参数和优先出清规则决定其参与方式；对售电公司和用户来说，中长期合同需要与现货价格波动和偏差责任配合管理；对监管机构来说，重点是市场力监测、异常报价、串通报价、风险预警和数字化监管。","符合浙江现货市场规则的发电企业、新能源项目、储能电站、售电公司、电力用户及其他可参与主体；调频辅助服务参与者需满足调节性能和技术参数要求。","主体需按现货规则报量报价或接受市场形成价格，遵守市场力监测、风险处置、信息保密、从业回避和数字化监管要求；新能源、储能入市门槛和交易参数按细则执行。","完成注册并满足现货或辅助服务市场准入、计量、通信、技术支持系统和调度运行要求；储能和新能源按修订细则的入市门槛执行。","按日前、实时及辅助服务交易组织要求申报，市场出清后执行调度与结算；调频和电能量可联合出清。","通过市场运营监管、市场力监测、风险处置和专项监管约束；违规报价、串通报价、操纵市场等行为依法处理。","浙江能源监管办推动浙江电力现货市场转入正式运行；浙江能源监管办完成电力市场三项实施细则修订","浙监能市场〔2024〕4号；未见正式文号","https://zjb.nea.gov.cn/dtyw/jgdt/202509/t20250923_287902.html；https://zjb.nea.gov.cn/dtyw/jgdt/202512/t20251202_291553.html","source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf；source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江｜中长期、零售、市场管理、结算","values":["中长期、零售、市场管理、结算","浙江2026年修订并发布《浙江电力中长期市场实施细则》《浙江电力零售市场实施细则》《浙江电力市场管理实施细则》《浙江电力市场结算实施细则》等四项细则，形成中长期交易、零售交易、市场管理和结算口径联动更新的规则组合。公开页面显示，修订工作以国家《电力中长期市场基本规则》为依据，逐条比对国家规则与浙江既有规则差异，并重点研究居民农业和代理购电偏差电量结算、同一投资主体市场份额不超过20%、分时电价机制等问题。中长期细则主要规范发电企业、售电公司、电力用户等在年度、月度、月内等周期签订合同、形成电量电价和曲线、管理合同风险；零售细则重点规范售电公司与零售用户之间的套餐、签约、履约和代理关系；市场管理细则约束注册、交易秩序、信息披露、异常行为和监管措施；结算细则则把中长期、零售、现货或代理购电相关电量、电价、电费落实到可执行的结算口径。修订程序上，四项细则曾于2026年1月28日向社会公开征求意见，2月24日经浙江电力市场管理委员会审议，并由浙江能源监管办、省发展改革委、省能源局审定发布。对售电公司来说，重点是零售套餐设计、代理用户偏差责任、履约和同一投资主体市场份额约束；对电力用户来说，重点是直接交易或零售代理选择、分时电价传导和偏差电量结算；对发电企业来说，重点是中长期合同曲线、交易组织、市场管理和结算参考；对监管机构来说，重点是维护浙江现货正式运行后的批发、零售和结算规则一致性。","浙江已注册经营主体，包括发电企业、售电公司、电力用户，以及符合条件的新型主体；零售市场重点涉及售电公司和零售用户。","同一投资主体市场份额、代理购电偏差电量结算、分时电价机制等被纳入规则衔接重点；经营主体需遵守市场管理、交易组织和结算实施细则。","完成注册并满足中长期或零售交易资格；售电公司需符合履约、信用和零售套餐公示等管理要求；用户侧按直接交易或零售代理关系参与。","主体按细则和交易公告参与中长期交易或签订零售套餐；成交或签约后按结算细则进行电量、电价、电费确认。","市场运营机构依据市场管理实施细则监管异常交易、市场秩序和结算执行；违规行为按浙江市场管理规则和监管要求纠偏。","浙江组织开展电力中长期市场等4项实施细则修订工作","未见正式文号","https://zjb.nea.gov.cn/dtyw/jgdt/202603/t20260304_297397.html","source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).pdf","","有效","2026-07-14"]}]},{"name":"山西","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"山西｜中长期交易、绿色电力交易","values":["中长期交易、绿色电力交易","山西2026年中长期规则依据国家《电力中长期市场基本规则》和新能源上网电价市场化改革政策修订，并结合山西现货市场运行实际，于2026年6月1日起施行，有效期5年，同时废止2024版中长期交易细则。公开政策解读显示，新细则共13章，覆盖市场成员、交易品种、交易周期和方式、交易组织、价格机制、电量约束、合同管理、计量结算、信息披露、技术支持系统、市场监管和附则，并设置绿色电力交易相关内容。规则的核心不是单纯增加交易品种，而是让中长期合同更好服务现货市场运行下的风险管理。月内交易方面，山西完善旬双边协商、旬集中竞价、旬挂牌、旬合同转让等流程，使经营主体能在年度、月度之外通过更短周期调整合同头寸。现货衔接方面，日滚动交易采用现货交易限价，引导主体关注中长期合同曲线与现货价格边界。绿电方面，山西明确小时级绿电交易，以小时为颗粒度计量、申报、出清和结算，便于绿色消费与实际用电时段匹配，并衔接绿证和环境价值。风险管理方面，规则加强金融套利约束、市场风险防控、信息披露和技术支持系统要求，防范主体利用中长期合同与现货价格差异进行异常套利或操纵。对发电企业、新能源企业、售电公司和电力用户来说，山西规则的重点是理解分时合同、月内旬交易、日滚动交易、小时级绿电、合同转让和偏差结算之间的关系；售电公司还需关注履约担保、代理用户电量和风险敞口；新能源主体需关注机制电量、绿电环境价值和市场化交易收益之间不得重复计算的衔接。","已注册经营主体，包括发电企业、售电公司、电力用户、新能源主体及符合条件的新型经营主体；绿电交易主体按绿电专章要求参与。","交易品种覆盖数年、年、多月、季、月、月内等周期；售电公司可申报电量与履约保函挂钩，设置新能源交易电量约束、用户侧缺额与超额回收、发用两侧金融套利约束。","完成市场注册，满足交易品种、信用履约、技术支持系统和绿电交易专章要求；小时级绿电交易需按小时计量、申报、出清和结算。","通过双边协商、集中竞价、挂牌、合同转让、日滚动交易等方式申报成交；年度合同需明确年分月、月分日、日分时曲线。","市场信息按年、季、月、周、日等周期披露，信息保存和封存有明确要求；监管机构可对串谋、操纵市场、异常行为采取整改、处罚、账号冻结和中止交易等措施。","山西电力中长期市场实施细则","晋监能市场规〔2026〕1号","https://sxb.nea.gov.cn/xxgk/zcjd/202605/t20260527_301835.html","source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).pdf","","有效","2026-07-14"]}]},{"name":"湖北","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"湖北｜中长期交易","values":["中长期交易","湖北中长期交易规则以2026年《湖北省电力中长期市场实施细则》为依据，覆盖注册、交易、执行、结算、信息披露和监督管理。规则强调中长期市场与现货市场在交易时序、出清和结算方面衔接，并要求湖北电力市场按统一标准开展注册、交易组织、结算和信息披露。经营主体包括发电企业、售电公司、电力用户和资源聚合类新型经营主体；电网企业、交易机构和调度机构分别负责计量结算、交易组织、合同汇总、安全校核、调度执行和风险防控。准入和注册方面，主体按国家注册基本规则和湖北注册实施细则办理注册、变更和注销，注册信息变化后5个工作日内申请变更；集中式、分布式新能源按规则维护最小颗粒度或统一信用代码相关信息。批发用户和零售用户身份互斥，同一合同周期内同一主体原则上只能与一家售电公司或虚拟电厂建立服务关系。交易方面，湖北以电能量交易为主，并根据需要开展合同转让、回购等交易，交易方式包括双边协商、集中交易和挂牌，平台发布交易结果并自动生成电子合同。价格方面，市场合同可采用固定价格，也可在年度合同中约定随供需和成本变化的灵活价格机制；绿电价格由电能量价格和绿色电力环境价值组成。绿电交易依托集中竞价合同开展，要求环境价值可追踪溯源，合同可在满足溯源前提下按月或更短周期转让。结算方面，湖北原则上自然月连续结算，电能量交易日清月结；当前中长期结算暂按差量结算，即照付不议、偏差结算，未签中长期合同的实际电量按偏差电量结算。绿电环境价值按合同电量、发电企业上网电量扣除机制电量后的余额、电力用户用电量三者取小确定，纳入机制电量不得重复获得绿证收益。风险与考核主要体现在注册持续核验、申报限额、履约担保、交易校核、信息披露、风险预案、争议处理和法律责任。","国网华中分部、国网湖北省电力有限公司、湖北电力交易中心以及各发电企业、售电公司、电力用户和相关经营主体。","电力交易机构需做好宣贯培训、信息披露、风险防控；经营主体应按细则和交易公告参与交易并履行合同与结算义务。","完成市场注册并符合湖北交易规则、交易品种和信用履约要求。","按中长期交易公告开展申报、成交、合同确认、执行和结算；执行中重大问题应及时报告。","通过信息披露、风险防控和监管要求约束；违规行为按电力市场监管规则处理。","关于印发《湖北省电力中长期市场实施细则》的通知","华中监能市场规﹝2026﹞39号","https://hzj.nea.gov.cn/dtyw/tzgg/202604/t20260414_299623.html","source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).pdf","《湖北省电力中长期市场实施细则》.pdf|source-files/attachments/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号)/P020260414530138531095.pdf","有效","2026-07-14"]}]},{"name":"四川","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"四川｜中长期、零售、绿电、代理购电相关交易","values":["中长期、零售、绿电、代理购电相关交易","四川中长期规则依据全国统一电力市场体系、电力市场运行基本规则和电力中长期市场基本规则制定，公开解读显示细则共14章122条，覆盖市场成员、交易品种和价格机制、批发交易、零售交易、交易校核、合同管理、计量结算、信息披露、技术系统、风险防控、争议处置和法律责任。规则的一个重要变化是把虚拟电厂等资源聚合类新型经营主体纳入中长期市场，并明确发电企业、售电公司、电力用户、虚拟电厂、电网企业、交易机构和调度机构权责。准入和注册方面，四川优化注册、变更和注销流程，工商业用户直接参与市场选择周期缩短至一个月，新型主体需与分散资源签订聚合服务合同。交易品种方面，规则在传统中长期电能量交易基础上，新增或明确电网企业代理购电市场化交易、保障性用电市场化交易、省间中长期外购挂牌交易等，体现四川水电、新能源、燃煤火电等多类型电源同台竞争和省间外购电衔接。价格方面，合同可采用固定价格，也可采用随供需和发电成本变化的灵活价格机制。交易组织方面，中长期交易逐步按日连续开市，帮助主体在现货运行背景下动态管理合同曲线和偏差风险。绿电方面，规则关注绿电交易关系建立、环境价值溯源、绿电合同转让和差价结算参考点。交易校核方面，出清校核和电网安全校核分工处理，现货连续运行后部分安全校核不再重复开展。结算方面，四川中长期暂采用差价结算，并衔接国家计量结算规则和结算参考点。对市场主体来说，发电侧要关注水电、新能源、火电同台交易和结算参考点；售电公司要关注零售套餐、代理用户和履约风险；电力用户要关注直接交易、零售代理、绿电消费和偏差责任；虚拟电厂等新型主体要关注聚合合同、资源边界和市场准入。","发电企业、售电公司、电力用户、虚拟电厂等资源聚合类新型经营主体，电网企业代理购电和保障性用电相关主体按细则参与。","主体需履行权责：售电公司公示零售套餐并管理签约用户，发电企业提供有效容量和运行信息，用户履行可再生能源消纳责任，运营机构加强市场监测分析。","按国家注册基本规则完成注册、变更或注销；工商业用户直接参与市场选择周期缩短至一个月；新型主体需与分散资源签订聚合服务合同。","可参与水电、新能源、燃煤火电等多类型电源同台竞争的中长期交易；代理购电、保障性用电、省间中长期外购挂牌交易可采用挂牌方式；中长期交易逐步按日连续开市。","交易校核由交易出清校核和电网安全校核分工承担；结算统一衔接国家计量结算规则，四川中长期暂采用差价结算；风险防控、争议处置和法律责任按细则执行。","四川电力中长期市场实施细则","未见正式文号","https://scb.nea.gov.cn/xxgk/zcjd/202606/t20260603_302382.html","source-files/2026-04-10-四川电力中长期市场实施细则(未见正式文号).pdf","","有效","2026-07-14"]}]},{"name":"山东","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"山东｜综合市场规则（中长期、现货、结算、调度运行等）","values":["综合市场规则（中长期、现货、结算、调度运行等）","山东2026年4月修订版《山东电力市场规则（试行）》是综合性市场总规则，不只管中长期交易，还覆盖现货、辅助服务、容量补偿、零售、计量结算、市场力监管、风险防控和技术系统。规则要求市场运营机构按全国统一基础规则开展信息披露、交易组织、交易执行、交易结算和调度运行，并加快技术支持系统改造；日内市场、调频辅助服务主体选择、局部市场力监管等依赖系统功能的条款原则上不晚于2026年7月1日执行。市场成员包括发电企业、售电公司、电力用户、新型经营主体、电网企业、调度机构和交易机构，主体需完成注册并满足计量、通信、调度、技术、信用和履约担保条件；新型储能、虚拟电厂、负荷聚合商等还要满足持续充放电时间、聚合关系、负荷确认协议和系统接入等要求。交易体系上，中长期合约用于锁定风险和形成合同曲线，现货市场通过日前、日内、实时出清反映时空价值，辅助服务市场主要开展调频、爬坡等服务并逐步与现货联合出清，容量补偿用于回收可靠资源固定成本，零售市场规范售电公司和零售用户的套餐及代理关系。价格和结算方面，规则明确上网电价、购电价格、输配电价、市场化容量补偿电价、煤电容量电费、辅助服务费用、抽水蓄能容量电费、新能源机制差价结算费用等进入结算体系；电网企业需按时提供计量数据并足额结算。绿电交易电能量和环境价值分开结算，纳入新能源可持续发展价格结算机制的电量不得重复获得绿证收益。山东规则特别重视市场力和风险防控，设置市场力识别、监测、缓解、事前和事后监管，以及市场干预、中止和恢复机制；要求运用大数据、人工智能等技术开发异常交易识别预警。对市场主体来说，参与山东市场必须同时管理报价、合同曲线、偏差、调频性能、容量补偿、零售代理、履约担保和市场力合规风险。","山东电力市场各发电企业、售电公司、电力用户、新型经营主体、电网企业、交易机构、调度机构等。","经营主体应遵守交易申报、合同执行、结算、调度和信息披露要求；运营机构需推进技术系统改造并开展异常交易监测和风险防控。","完成注册并满足山东市场规则对具体交易品种、履约、计量、技术系统和信用管理要求。","按山东市场规则和交易公告参与对应交易品种，完成申报、出清、执行、结算和偏差处理；部分依赖系统改造的条款原则上不晚于2026年7月1日执行。","通过异常交易监测、风险防控、调度运行约束、计量结算校核和监管执法进行约束；违规按规则和监管要求处理。","关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","鲁监能市场规〔2026〕27号","https://sdb.nea.gov.cn/dtyw/tzgg/202605/t20260508_300824.html","source-files/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号).pdf","《山东电力市场规则（试行）》（2026年4月修订版）.pdf|source-files/attachments/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号)/P020260508675725961073.pdf","有效","2026-07-14"]}]},{"name":"甘肃","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"甘肃｜中长期交易","values":["中长期交易","甘肃中长期交易规则以2025年修订的《甘肃省电力中长期交易实施细则》为基础，适用于省内中长期市场注册、交易、执行、结算、信息披露和监督管理。规则把发电企业、售电公司、电力用户以及储能、虚拟电厂、负荷聚合商、分布式发电、智能微电网、源网荷储一体化等新型经营主体纳入经营主体范围，并区分批发用户、零售用户和电网企业代理购电用户。参与前，主体需满足国家注册基本规则和甘肃市场准入要求，在电力交易平台办理注册、信息变更和注销；批发身份与零售身份不能同时使用，退出或切换身份前必须处理未履约合同和电费清算。交易品种包括直接交易、电网企业代理购电交易、绿色电力交易、省内融合交易、合同转让等，交易周期覆盖数年、年度、多月、月度、月内周交易和D+2日滚动交易，交易方式包括双边协商、集中竞价、滚动撮合和挂牌。规则强调中长期与现货衔接，省内中长期按24个时段形成合同曲线，并进一步分解为96点曲线作为结算依据。价格方面，除政府定价电量外由市场形成；绿电价格拆分为电能量价格和绿电环境价值，绿电环境价值不纳入峰谷分时电价机制。结算方面，原则上按日清分、按月结算，不设不平衡资金池；未参与现货市场的主体按照照付不议、偏差结算执行，偏差价格与现货统一结算点或代理购电分时价格衔接。绿电电能量和环境价值分开结算，纳入新能源可持续发展价格结算机制的电量不得重复获得绿证收益。规则还设置交易校核、合同管理、信息披露、技术支持系统、风险防控、争议处理和法律责任，重点防控供需失衡、价格异常、不正当竞争、技术系统异常和合同违约等风险。","国网甘肃省电力公司、甘肃电力交易中心、甘肃省电力市场管理委员会、各有关发电企业、售电公司、电力用户、新型经营主体。","经营主体应按细则遵照执行；市场运营和管理需符合能源法、电力法、电力监管条例、电力市场运行基本规则、电力中长期市场基本规则等要求。","完成市场注册并满足甘肃中长期交易规则、信用履约、交易公告和结算要求。","按甘肃中长期交易实施细则参加年度、月度、月内等交易，完成申报、成交、合同执行和结算；执行中重大问题向监管办和省级主管部门报告。","按细则、交易公告和监管要求处理履约、结算、信息披露和违规行为；重大问题需及时报告四部门。","关于印发《甘肃省电力中长期交易实施细则》的通知","甘监能市场〔2025〕212号","https://gsb.nea.gov.cn/dtyw/tzgg/202512/t20251230_293356.html","source-files/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号).pdf","甘肃省电力中长期交易实施细则.pdf|source-files/attachments/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号)/P020251230717529858215.pdf","有效","2026-07-14"]}]},{"name":"安徽","columns":["交易品种","政策/规则总结","适用对象","管理要求","准入条件","参与流程","考核方式","来源文件","发文编号","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"更新记录","columns":["日期","类型","对象 ID","说明"],"rows":[{"title":"待核验｜安徽","values":["2026-07-14","待核验","安徽","未能核得安徽省电力中长期或现货市场正式有效实施细则的可访问官方链接；旧征求意见稿附件链接返回404，未作为有效政策入库。"]},{"title":"新增｜doc-ndrc-2023-1501","values":["2026-07-14","新增","doc-ndrc-2023-1501","补充煤电容量电价机制国家政策来源，用于支撑容量电价、容量电费等基础概念解读。"]},{"title":"新增｜doc-ndrc-2026-114","values":["2026-07-14","新增","doc-ndrc-2026-114","补充发电侧容量电价机制最新国家政策来源，用于支撑容量电价和可靠容量补偿机制解读。"]},{"title":"新增｜concept-capacity-electricity-price","values":["2026-07-14","新增","concept-capacity-electricity-price","新增容量电价、可靠容量补偿机制、机制电价、机制电量、差价结算等基础概念，并补充详细解读。"]},{"title":"更新｜provincialRules","values":["2026-07-14","更新","provincialRules","按官方来源补充江苏、浙江、山西、湖北、四川、山东、甘肃7省政策文件和省份规则摘要；安徽正式有效文件链接本轮未核得，暂不入有效规则。"]},{"title":"更新｜policyDocuments","values":["2026-07-14","更新","policyDocuments","按已归档的政策网页PDF和官方附件内容，对当前已入库政策文件的详细解读逐份扩写，并同步扩写省份页可见的政策/规则总结。"]},{"title":"新增｜doc-state-council-2026-22","values":["2026-07-14","新增","doc-state-council-2026-22","根据生态环境部官网转载的国务院《“十五五”碳达峰行动方案》新增国家政策，并补充绿证市场与绿电交易衔接、需求响应价格机制等基础概念。"]}]}]};

    let visibleRows = [];

    const longLabels = new Set(["详细解读", "政策/规则总结", "通俗解释", "适用对象", "管理要求", "准入条件", "参与流程", "考核方式", "说明"]);
    const tabs = document.getElementById("tabs");
    const tableWrap = document.getElementById("tableWrap");
    const searchInput = document.getElementById("searchInput");
    const sheetMeta = document.getElementById("sheetMeta");
    const modal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalDetails = document.getElementById("modalDetails");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderLinks(value, linkText) {
      return String(value ?? "")
        .split("；")
        .filter(Boolean)
        .map((url, index) => '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">' + linkText + (index + 1) + '</a>')
        .join("<br>");
    }

    function renderAttachmentLinks(value) {
      const entries = String(value ?? "")
        .split("；")
        .filter(Boolean);
      if (entries.length === 0) return '<span class="hint">未发现附件</span>';
      return entries.map((entry, index) => {
        const separatorIndex = entry.lastIndexOf("|");
        const title = separatorIndex === -1 ? "附件" + (index + 1) : entry.slice(0, separatorIndex);
        const url = separatorIndex === -1 ? entry : entry.slice(separatorIndex + 1);
        return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(title || ("附件" + (index + 1))) + '</a>';
      }).join("<br>");
    }

    function renderCell(label, value) {
      if (label === "链接") return renderLinks(value, "官方链接");
      if (label === "查看文件") return renderLinks(value, "查看文件");
      if (label === "附件归档") return renderAttachmentLinks(value);
      const safe = escapeHtml(value);
      if (longLabels.has(label) || safe.length > 90) return '<div class="clamped-text">' + safe + '</div>';
      if (label === "状态" && value === "待核验") return '<span class="badge">待核验</span>';
      return safe || '<span class="hint">未收录</span>';
    }

    function rowSearchText(sheet, row) {
      return sheet.columns.concat(row.values).join(" ").toLowerCase();
    }

    function renderTabs() {
      tabs.innerHTML = appData.sheets.map((sheet, index) => {
        const active = index === activeSheetIndex ? " active" : "";
        return '<button class="tab' + active + '" type="button" onclick="switchSheet(' + index + ')">' + escapeHtml(sheet.name) + '</button>';
      }).join("");
    }

    function renderTable() {
      const sheet = appData.sheets[activeSheetIndex];
      const query = searchInput.value.trim().toLowerCase();
      visibleRows = sheet.rows.filter((row) => !query || rowSearchText(sheet, row).includes(query));
      sheetMeta.innerHTML = '<span>当前页：<strong>' + escapeHtml(sheet.name) + '</strong></span><span>显示 ' + visibleRows.length + ' / ' + sheet.rows.length + ' 条</span>';

      if (visibleRows.length === 0) {
        tableWrap.innerHTML = '<div class="empty">没有匹配记录</div>';
        return;
      }

      const header = sheet.columns.map((column) => '<th>' + escapeHtml(column) + '</th>').join("") + '<th>详情</th>';
      const rows = visibleRows.map((row, rowIndex) => {
        const cells = sheet.columns
          .map((column, columnIndex) => '<td>' + renderCell(column, row.values[columnIndex]) + '</td>')
          .join("");
        return '<tr>' + cells + '<td><button class="detail-button" type="button" data-detail-index="' + rowIndex + '" onclick="openDetail(' + rowIndex + ')">查看详情</button></td></tr>';
      }).join("");
      tableWrap.innerHTML = '<table><thead><tr>' + header + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function switchSheet(index) {
      activeSheetIndex = index;
      searchInput.value = "";
      renderTabs();
      renderTable();
    }

    function openDetail(rowIndex) {
      const sheet = appData.sheets[activeSheetIndex];
      const row = visibleRows[rowIndex];
      modalTitle.textContent = row.title || sheet.name;
      modalDetails.innerHTML = sheet.columns.map((column, columnIndex) => {
        const value = column === "链接" ? renderLinks(row.values[columnIndex], "官方链接") : column === "查看文件" ? renderLinks(row.values[columnIndex], "查看文件") : column === "附件归档" ? renderAttachmentLinks(row.values[columnIndex]) : escapeHtml(row.values[columnIndex] || "未收录");
        return '<dt>' + escapeHtml(column) + '</dt><dd>' + value + '</dd>';
      }).join("");
      modal.classList.add("open");
    }

    function closeModal() {
      modal.classList.remove("open");
    }

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });
    searchInput.addEventListener("input", renderTable);

    renderTabs();
    renderTable();
  </script>
</body>
</html>
