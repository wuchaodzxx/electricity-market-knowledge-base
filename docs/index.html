<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>电力市场知识库网页预览</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f7fb;
      --bg-radial: radial-gradient(circle at 16% 0%, rgba(20, 184, 166, .16), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(245, 158, 11, .14), transparent 28%),
        linear-gradient(180deg, #eef6fb 0%, #f8fafc 52%, #eef3f7 100%);
      --card: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #dbe5ee;
      --brand: #07566b;
      --brand-strong: #083344;
      --brand-soft: #e5f5f6;
      --accent: #f6a51a;
      --cyan: #22d3ee;
      --shadow: 0 24px 70px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-radial);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
    }
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      height: 70px;
      overflow: hidden;
      padding: 0 24px;
      background-image:
        linear-gradient(90deg, rgba(3, 19, 35, .94) 0%, rgba(6, 41, 61, .82) 34%, rgba(6, 58, 76, .38) 72%, rgba(5, 24, 41, .58) 100%),
        url("assets/electricity-market-hero.png");
      background-size: cover;
      background-position: center 42%;
      color: #fff;
      box-shadow: 0 14px 40px rgba(7, 20, 34, .22);
    }
    .app-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 38%, rgba(34, 211, 238, .22), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0, 18, 32, .16));
      pointer-events: none;
    }
    .app-header::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(34, 211, 238, .65), rgba(246, 165, 26, .38), transparent);
      opacity: .8;
    }
    .hero-card {
      position: relative;
      z-index: 1;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 0 4px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-width: 0 1px;
      border-radius: 0;
      background: linear-gradient(135deg, rgba(8, 51, 68, .18), rgba(8, 83, 102, .08));
      box-shadow: none;
      backdrop-filter: blur(14px);
    }
    .header-title-block {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr);
      align-items: baseline;
      gap: 14px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .header-title-block h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1;
      letter-spacing: -.03em;
      white-space: nowrap;
      text-shadow: 0 8px 24px rgba(0, 0, 0, .28);
    }
    .subhead {
      margin: 0;
      color: rgba(255, 255, 255, .88);
      line-height: 1.35;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-left: 14px;
      border-left: 1px solid rgba(191, 247, 255, .34);
    }
    .header-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin: 0;
      flex: 0 0 auto;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 12px;
      padding: 5px 9px;
      background: rgba(4, 28, 44, .24);
      color: rgba(255, 255, 255, .92);
      font-size: 11px;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12);
    }
    .meta-chip strong { color: #fff; font-size: 12px; }
    main {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px 24px 24px;
      display: flex;
      min-height: 0;
    }
    .knowledge-shell {
      width: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid rgba(255, 255, 255, .76);
      border-radius: 22px;
      background: rgba(255, 255, 255, .72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .toolbar {
      flex: 0 0 auto;
      z-index: 10;
      display: block;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(219, 229, 238, .9);
      background: rgba(248, 250, 252, .86);
      backdrop-filter: blur(16px);
    }
    .compact-toolbar,
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .tabs {
      display: flex;
      flex: 1 1 auto;
      gap: 6px;
      overflow-x: auto;
      padding: 2px 0;
      min-width: 0;
    }
    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .88);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      color: var(--ink);
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .04);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .tab:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 211, 238, .42);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .08);
    }
    .tab.active {
      background: linear-gradient(135deg, var(--brand-strong), #0e7490);
      border-color: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 28px rgba(7, 86, 107, .26);
    }
    #searchInput {
      flex: 0 0 clamp(240px, 28vw, 420px);
      border: 1px solid #cfdbe7;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, .94);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .9), 0 6px 18px rgba(15, 23, 42, .05);
      outline: none;
    }
    #searchInput:focus {
      border-color: rgba(34, 211, 238, .78);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, .16), 0 8px 22px rgba(15, 23, 42, .08);
    }
    .hint { color: var(--muted); font-size: 13px; }
    .result-meta {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .export-button {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 9px 13px;
      background: linear-gradient(135deg, var(--brand-strong), #0e7490);
      color: #fff;
      font-size: 13px;
      font-weight: 750;
      box-shadow: 0 8px 20px rgba(7, 86, 107, .18);
    }
    .export-button:hover { text-decoration: none; filter: brightness(1.04); }
    .card {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: rgba(255, 255, 255, .92);
      border: 0;
      border-radius: 0;
      overflow: hidden;
    }
    .table-wrap,
    .table-scroll-region {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      max-height: none;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1120px;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid #eef0f3;
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      background: rgba(255, 255, 255, .98);
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eaf3f7;
      color: #274155;
      white-space: nowrap;
      font-size: 13px;
      letter-spacing: .02em;
    }
    tr:hover td { background: #f8fcff; }
    .clamped-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 360px;
      line-height: 1.55;
    }
    .summary-tooltip {
      cursor: pointer;
      border: 0;
      border-bottom: 1px dotted rgba(7, 86, 107, .38);
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      padding: 0;
      width: 100%;
    }
    .summary-tooltip:hover,
    .summary-tooltip:focus {
      color: #07566b;
      outline: none;
      border-bottom-color: rgba(246, 165, 26, .9);
    }
    .summary-popover {
      display: none;
      position: fixed;
      z-index: 80;
      max-width: min(520px, calc(100vw - 28px));
      max-height: min(320px, calc(100vh - 28px));
      overflow: auto;
      padding: 14px 16px;
      border: 1px solid #d9e7ef;
      border-radius: 16px;
      background: rgba(255, 255, 255, .98);
      color: #223448;
      line-height: 1.75;
      font-size: 14px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, .22);
      backdrop-filter: blur(12px);
    }
    .summary-popover.open { display: block; }
    .summary-popover::before {
      content: "知识摘要";
      display: block;
      margin-bottom: 6px;
      color: #07566b;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: .02em;
    }
    .summary-popover strong {
      color: #083344;
      background: linear-gradient(180deg, transparent 58%, rgba(34, 211, 238, .22) 0);
      padding: 0 2px;
    }
    .summary-popover mark {
      border-radius: 6px;
      padding: 1px 4px;
      background: #fff1c2;
      color: #7c2d12;
    }
    .summary-popover code {
      border-radius: 6px;
      padding: 1px 5px;
      background: #edf5f7;
      color: #07566b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
    }
    .summary-popover ul {
      margin: 6px 0 0;
      padding-left: 20px;
    }
    .summary-popover li { margin: 4px 0; }
    .empty {
      padding: 42px;
      text-align: center;
      color: var(--muted);
    }
    a { color: #08738a; text-decoration: none; font-weight: 650; }
    a:hover { text-decoration: underline; }
    .detail-button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: linear-gradient(135deg, #e0fbff, #fff7e6);
      color: #07566b;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(7, 86, 107, .1);
    }
    .detail-button:hover { outline: 2px solid rgba(34, 211, 238, .34); }
    .browse-button {
      border: 1px solid rgba(7, 86, 107, .18);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: #07566b;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(7, 86, 107, .06);
      margin-left: 6px;
    }
    .browse-button:hover { outline: 2px solid rgba(246, 165, 26, .3); }
    .browse-button[disabled] {
      opacity: .42;
      cursor: not-allowed;
    }
    .action-cell {
      min-width: 182px;
      white-space: nowrap;
    }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(7, 20, 34, .56);
      padding: 28px;
      backdrop-filter: blur(6px);
    }
    .modal-backdrop.open { display: grid; place-items: center; }
    .modal {
      width: min(980px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .28);
      border: 1px solid rgba(255, 255, 255, .8);
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title { margin: 0; font-size: 20px; }
    .close-button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .detail-body {
      padding: 18px 22px 28px;
      color: #263546;
      line-height: 1.82;
      font-size: 15px;
    }
    .detail-section {
      margin: 0 0 18px;
      padding: 16px 18px;
      border: 1px solid #e4edf4;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff, #f8fcff);
    }
    .detail-section h3 {
      margin: 0 0 10px;
      color: #07566b;
      font-size: 17px;
    }
    .detail-section p { margin: 8px 0; }
    .detail-section ul {
      margin: 8px 0 0;
      padding-left: 22px;
    }
    .detail-section li { margin: 6px 0; }
    .detail-section strong {
      color: #083344;
      background: linear-gradient(180deg, transparent 58%, rgba(34, 211, 238, .22) 0);
      padding: 0 2px;
    }
    mark {
      border-radius: 6px;
      padding: 1px 4px;
      background: #fff1c2;
      color: #7c2d12;
    }
    .markdown-browser-body {
      padding: 18px 22px 28px;
      color: #263546;
      line-height: 1.82;
      font-size: 15px;
    }
    .markdown-source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .markdown-source-tab {
      border: 1px solid #dce8ef;
      border-radius: 999px;
      padding: 7px 11px;
      background: #fff;
      color: #07566b;
      font-weight: 700;
      cursor: pointer;
    }
    .markdown-source-tab.active {
      background: linear-gradient(135deg, #e0fbff, #fff7e6);
      border-color: rgba(34, 211, 238, .5);
    }
    .markdown-content {
      border: 1px solid #e4edf4;
      border-radius: 16px;
      padding: 18px;
      background: #fff;
      max-height: 62vh;
      overflow: auto;
    }
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3 {
      color: #07566b;
      line-height: 1.35;
    }
    .markdown-content pre {
      overflow: auto;
      border-radius: 12px;
      padding: 12px;
      background: #f1f7f9;
    }
    .markdown-content code {
      border-radius: 6px;
      padding: 1px 5px;
      background: #edf5f7;
      color: #07566b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
    }
    .markdown-content table {
      min-width: 0;
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .markdown-content th,
    .markdown-content td {
      position: static;
      padding: 8px 10px;
      border: 1px solid #e4edf4;
      background: #fff;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      font-weight: 700;
    }
    @media (max-width: 720px) {
      .app-header { padding: 0 12px; }
      .app-header::after { left: 12px; right: 12px; }
      .hero-card { gap: 10px; }
      .header-title-block { grid-template-columns: 1fr; gap: 4px; }
      .header-title-block h1 { font-size: 20px; }
      .subhead { display: none; }
      .header-meta .meta-chip:nth-child(n+2) { display: none; }
      main { padding: 10px 10px 16px; }
      .knowledge-shell { border-radius: 18px; }
      .toolbar { padding: 8px; }
      .toolbar-row { flex-wrap: wrap; }
      #searchInput { flex: 1 1 100%; }
      .tabs { order: 2; flex-basis: 100%; }
      .modal-backdrop { padding: 10px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <section class="hero-card" aria-label="电力市场知识库概览">
      <div class="header-title-block">
        <h1>电力市场知识库</h1>
        <p class="subhead">政策、概念与省级交易规则一站式查询；长文本折叠展示，来源与本地归档可直接打开。</p>
      </div>
      <div class="header-meta" aria-label="知识库元信息">
        <span class="meta-chip">数据更新 <strong>2026-07-15</strong></span>
        <span class="meta-chip">网页生成 <strong>2026-07-15</strong></span>
        <span class="meta-chip">覆盖 <strong>国家 + 8 省</strong></span>
      </div>
    </section>
  </header>
  <main class="fixed-workbench">
    <section class="knowledge-shell">
      <section class="toolbar" aria-label="筛选工具">
        <div class="compact-toolbar toolbar-row">
          <input id="searchInput" type="search" placeholder="搜索概念、政策、交易品种、文号、适用对象……" />
          <div id="tabs" class="tabs"></div>
          <span id="resultMeta" class="result-meta"></span>
          <a id="exportExcelLink" class="export-button" href="downloads/电力市场知识库-2026-07-15.xlsx" download>导出 Excel</a>
        </div>
      </section>
      <section class="card">
        <div id="tableWrap" class="table-wrap table-scroll-region"></div>
      </section>
    </section>
  </main>
  <div id="summaryPopover" class="summary-popover" role="tooltip"></div>
  <div id="detailModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title">详情</h2>
        <button class="close-button" type="button" onclick="closeModal()">关闭</button>
      </div>
      <div id="modalDetails" class="detail-body"></div>
    </article>
  </div>
  <div id="knowledgeBrowserModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="browserTitle">
    <article class="modal">
      <div class="modal-header">
        <h2 id="browserTitle" class="modal-title">知识浏览</h2>
        <button class="close-button" type="button" onclick="closeKnowledgeBrowser()">关闭</button>
      </div>
      <div id="browserDetails" class="markdown-browser-body"></div>
    </article>
  </div>
  <script>
    const appData = {"generatedAt":"2026-07-15","lastUpdatedAt":"2026-07-15","excelDownloadHref":"downloads/电力市场知识库-2026-07-15.xlsx","sheets":[{"name":"基础概念","columns":["概念","通俗解释","知识摘要","关联机制","适用范围","来源文件","发文编号","链接","查看文件","附件归档","核验日期"],"rows":[{"title":"新能源上网电价市场化","detail":"### 概念定位\n- 新能源上网电价市场化的核心是让风电、光伏等新能源电量原则上进入电力市场，通过**中长期**、现货等交易形成上网价格。\n- 对初学者来说，最重要的是把“市场交易价格”和“配套结算机制”分开看：市场交易价格来自买卖双方或**现货市场**出清，反映供需、时段、出力和系统运行状况；\n\n### 市场价格与配套结算\n- 配套结算机制则用于平稳衔接改革前后项目收益预期，特别是对纳入机制的新能源电量按**机制电价**和市场交易均价进行**差价结算**。\n- 文件还要求完善现货和**中长期**市场规则，允许新能源报量报价或接受市场形成价格，并要求各地在2025年底前出台实施方案。\n\n### 项目和地方需要关注\n- 项目业主需要关注本省具体方案、市场注册、交易申报、合同签订、结算口径、**绿证**收益衔接以及退出规则。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["新能源上网电价市场化","新能源上网电量逐步通过电力市场交易形成价格。","新能源上网电量逐步通过电力市场交易形成价格。 ### 概念定位 新能源上网电价市场化的核心是让风电、光伏等新能源电量原则上进入电力市场，通过中长期、现货等交易形成上网价格。 对初学者来说，最重要的是把“市场交易价格”和“配套结算机制”分开看：市场交易价格来自买卖双方或现货市场出清，反映供需、时段、出力和系统运行状况； 市场价格与配套结算 配套结算机制则用于平稳衔接改革前后项目收益预期，","机制电价；电力现货市场；中长期交易","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"电力市场注册","detail":"### 概念定位\n- **电力市场注册**是发电企业、售电公司、电力用户、新型经营主体等进入电力市场前的基础管理环节。\n- 它不是一张简单的“报名表”，而是把主体身份、经营资质、基本信息、信用和变更注销等事项纳入统一管理。\n\n### 注册管理重点\n- 注册完成后，主体才具备按规则参与市场的基础身份，但不等于自动获得所有交易品种资格；\n- 各省仍会根据**中长期**、现货、**绿电**、**辅助服务**、**需求响应**等不同品种设置准入条件、履约要求、申报流程和考核方式。\n\n### 参与交易注意事项\n- 主体应保证注册信息真实、完整、及时更新，名称、法定代表人、用电户号、资产关系、代理关系等重要信息变化时按规则办理变更。\n- 对小白来说，可以把注册理解为进入市场的“账户体系”和“身份核验”，后续交易、结算、信息披露和监管都会以注册信息为基础。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力市场注册基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2024-76/政策正文.md","sourceFilePath":"source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["电力市场注册","市场经营主体参与交易前按规则完成注册的基础手续。","市场经营主体参与交易前按规则完成注册的基础手续。 ### 概念定位 电力市场注册是发电企业、售电公司、电力用户、新型经营主体等进入电力市场前的基础管理环节。 它不是一张简单的“报名表”，而是把主体身份、经营资质、基本信息、信用和变更注销等事项纳入统一管理。 注册管理重点 注册完成后，主体才具备按规则参与市场的基础身份，但不等于自动获得所有交易品种资格；","市场准入；交易主体管理","国家","国家能源局关于印发《电力市场注册基本规则》的通知","国能发监管规〔2024〕76号","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","2026-07-14"]},{"title":"容量电价（容量电费）","detail":"### 概念定位\n- **容量电价**关注的是“有没有可靠能力”，电量电价关注的是“实际发了多少电”。\n- 传统单一制电价主要按上网电量结算，容易让煤电、气电、**抽水蓄能**、储能等承担保供和调节任务的电源只在发电时获得收入，难以体现其可用容量、顶峰能力和系统支撑价值。\n- 2023年煤电**容量电价**机制先把合规在运公用煤电机组从单一制电价调整为两部制：电量电价由市场化方式形成，**容量电价**按回收一定比例固定成本确定。\n\n### 容量电价如何结算\n- 煤电机组可获得的**容量电费**，通常根据当地**容量电价**和机组申报最大出力确定，由电网企业按月结算；\n- 相关费用纳入**系统运行费用**，原则上由工商业用户按用电量比例分摊并滚动清算。\n- 2026年文件进一步把视角从“煤电**容量电价**”扩展到“发电侧**容量电价**机制”，分类完善煤电、天然气发电、**抽水蓄能**、**新型储能容量电价**，并提出**现货市场**连续运行后有序建立**可靠容量补偿**机制。\n\n### 考核和理解重点\n- 需要注意，**容量电价**不是无条件补贴，机组若不能按调度指令或规则要求提供申报能力，会被扣减**容量电费**，严重时可能取消获取资格。\n- 理解它的关键，是把它看成电力系统为可靠容量、顶峰能力和调节价值付出的成本安排。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/政策正文.md","sourceFilePath":"source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"省级电网煤电容量电价表.pdf","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/省级电网煤电容量电价表.pdf.md","sourceFilePath":"source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","extraction":{"method":"ocr","ocrStatus":"success","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2026-114/政策正文.md","sourceFilePath":"source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["容量电价（容量电费）","不是按发了多少电付钱，而是为电源可在关键时段顶得上、支撑系统安全供应而付的钱。","不是按发了多少电付钱，而是为电源可在关键时段顶得上、支撑系统安全供应而付的钱。 ### 概念定位 容量电价关注的是“有没有可靠能力”，电量电价关注的是“实际发了多少电”。 传统单一制电价主要按上网电量结算，容易让煤电、气电、抽水蓄能、储能等承担保供和调节任务的电源只在发电时获得收入，难以体现其可用容量、顶峰能力和系统支撑价值。","两部制电价；系统运行费用；可靠容量补偿","国家","国家发展改革委 国家能源局关于建立煤电容量电价机制的通知；国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2023〕1501号；发改价格〔2026〕114号；国发〔2026〕22号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html；https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf；source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","2026-07-14"]},{"title":"可靠容量补偿机制","detail":"### 概念定位\n- **可靠容量补偿**机制比传统**容量电价**更强调“顶峰时能不能可靠顶上”。\n- 2026年发电侧**容量电价**文件提出，电力**现货市场**连续运行后，省级价格主管部门会同相关部门适时建立**可靠容量补偿**机制，对机组可靠容量按统一原则补偿。\n- 这里的可靠容量，是机组在全年系统顶峰时段能够持续稳定供电的容量，而不是装机容量的简单数字。\n\n### 补偿范围和标准\n- 补偿标准以弥补市场边际机组在电能量和**辅助服务**市场不能回收的固定成本为基础，同时考虑电力供需、用户承受能力和市场建设进展。\n- 补偿范围可包括自主参与当地市场的煤电、气电、符合条件的电网侧独立**新型储能**等，并可随着市场和电价改革逐步扩展到**抽水蓄能**等其他具备可靠容量的机组，但已经获得其他保障的容量不重复补偿，政府定价机组也不予补偿。\n\n### 与容量电价的衔接\n- 它与**容量电价**的关系是衔接替代：**可靠容量补偿**机制建立后，相关煤电、气电、独立储能等机组不再执行原有**容量电价**。\n- 对市场参与者来说，这意味着未来容量收益更可能与顶峰贡献、考核表现和市场化运行条件绑定。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2026-114/政策正文.md","sourceFilePath":"source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["可靠容量补偿机制","在现货市场连续运行后，对机组在系统高峰时真正能稳定供电的能力给予补偿。","在现货市场连续运行后，对机组在系统高峰时真正能稳定供电的能力给予补偿。 ### 概念定位 可靠容量补偿机制比传统容量电价更强调“顶峰时能不能可靠顶上”。 2026年发电侧容量电价文件提出，电力现货市场连续运行后，省级价格主管部门会同相关部门适时建立可靠容量补偿机制，对机组可靠容量按统一原则补偿。 这里的可靠容量，是机组在全年系统顶峰时段能够持续稳定供电的容量，而不是装机容量的简单数字。","容量电价；现货市场；顶峰能力","国家","国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2026〕114号；国发〔2026〕22号","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"机制电价","detail":"### 概念定位\n- **机制电价**来自新能源可持续发展价格结算机制，是改革后平衡市场化交易和项目收益稳定的一项结算参数。\n- 发改价格〔2025〕136号要求新能源上网电量原则上全部进入电力市场，价格通过市场交易形成；\n- 同时对纳入机制的电量，电网企业每月按照**机制电价**开展**差价结算**。\n\n### 结算逻辑\n- 也就是说，新能源企业平时仍参与市场，市场交易均价由**中长期**或现货等市场形成；\n- **机制电价**只对“纳入机制的电量”起作用，用来与市场交易均价比较并结算差额。\n- **机制电价**并不等同于过去意义上的固定上网标杆电价，也不意味着所有新能源电量都按这个价格卖出。\n\n### 存量增量与地方方案\n- 存量项目和增量项目的机制安排不同：存量项目重在政策衔接，增量项目一般通过竞争性方式确定纳入机制的电量规模、**机制电价**和执行期限。\n- 各地还要结合电力市场建设、新能源成本变化、绿色电力消费和用户承受能力制定具体方案。\n- 小白理解时可记住一句话：市场决定成交价，**机制电价**用于特定电量的**差价结算**和收益预期衔接。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["机制电价","新能源价格结算机制里用于差价结算的基准价，不是新能源所有电量的固定上网电价。","新能源价格结算机制里用于差价结算的基准价，不是新能源所有电量的固定上网电价。 ### 概念定位 机制电价来自新能源可持续发展价格结算机制，是改革后平衡市场化交易和项目收益稳定的一项结算参数。 发改价格〔2025〕136号要求新能源上网电量原则上全部进入电力市场，价格通过市场交易形成； 同时对纳入机制的电量，电网企业每月按照机制电价开展差价结算。 结算逻辑 也就是说，新能源企业平时仍参与市场，","机制电量；差价结算；新能源上网电价市场化","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"机制电量","detail":"### 概念定位\n- **机制电量**解决的是“哪些电量可以享受**机制电价差价结算**”的问题。\n- 新能源项目上网电量原则上进入市场后，并不是全部电量都自动按**机制电价**结算；\n- 只有纳入新能源可持续发展价格结算机制的电量，才会按**机制电价**与市场交易均价进行**差价结算**。\n\n### 结算和清算口径\n- 文件要求各地每年将纳入机制的电量分解到月度，如果某月实际上网电量低于当月分解电量，就按实际上网电量结算，并在年内按月滚动清算。\n- 增量项目的**机制电量**通常要通过竞争性方式确定，**机制电量**规模、**机制电价**、执行期限等共同影响项目收益预期。\n- **机制电量**到期或项目自愿退出机制后，不再纳入机制执行范围。\n\n### 容易混淆点\n- 这个概念容易和“实际发电量”“市场成交电量”混淆：实际发电量是物理产出，市场成交电量是市场合同或现货出清结果，**机制电量**则是政策结算机制认可的电量额度。\n- 做项目测算时，应分别看市场收入、机制**差价结算**、**绿证**及其他收益，并关注本省具体分月分解和清算口径。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["机制电量","被纳入新能源可持续发展价格结算机制、可以按机制电价做差价结算的电量范围。","被纳入新能源可持续发展价格结算机制、可以按机制电价做差价结算的电量范围。 ### 概念定位 机制电量解决的是“哪些电量可以享受机制电价差价结算”的问题。 新能源项目上网电量原则上进入市场后，并不是全部电量都自动按机制电价结算； 只有纳入新能源可持续发展价格结算机制的电量，才会按机制电价与市场交易均价进行差价结算。 结算和清算口径 文件要求各地每年将纳入机制的电量分解到月度，","机制电价；差价结算；新能源可持续发展价格结算机制","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知；国务院关于印发《“十五五”碳达峰行动方案》的通知","发改价格〔2025〕136号；国发〔2026〕22号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm；https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf；source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]},{"title":"差价结算","detail":"### 概念定位\n- **差价结算**是理解**机制电价**时最关键的结算动作。\n- 按照新能源上网电价市场化改革文件，对纳入机制的电量，电网企业每月按**机制电价**开展**差价结算**，将市场交易均价与**机制电价**的差额纳入当地**系统运行费用**。\n- **现货市场**连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；\n\n### 价格口径和差额处理\n- **现货市场**未连续运行地区，原则上按交易活跃周期的发电侧**中长期**交易同类项目加权平均价格确定。\n- 它的含义不是“项目不参加市场”，而是项目先在市场中形成价格，再对纳入机制的电量按规则计算差额。\n- 若市场交易均价低于**机制电价**，机制可以起到一定收益托底作用；\n\n### 项目测算注意事项\n- 若市场交易均价高于**机制电价**，也可能形成反向结算或冲抵安排，具体取决于地方实施方案和结算细则。\n- 文件还提出初期不再开展其他形式的**差价结算**，并要求电网企业对机制执行结果单独归集。\n- 实际看项目收益时，需要同时掌握**机制电量**、**机制电价**、市场均价、结算周期、月度滚动清算和是否退出机制等条件。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["差价结算","把市场交易均价和政策机制价之间的差额算出来，多退少补式地进入结算。","把市场交易均价和政策机制价之间的差额算出来，多退少补式地进入结算。 ### 概念定位 差价结算是理解机制电价时最关键的结算动作。 按照新能源上网电价市场化改革文件，对纳入机制的电量，电网企业每月按机制电价开展差价结算，将市场交易均价与机制电价的差额纳入当地系统运行费用。 现货市场连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；","机制电价；机制电量；系统运行费用","国家","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","发改价格〔2025〕136号","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","2026-07-14"]},{"title":"绿证市场与绿电交易衔接","detail":"### 概念定位\n- **绿证**市场与**绿电**交易衔接，是“十五五”阶段电力市场绿色价值体系的重要方向。\n- 对初学者来说，可以把普通电力交易理解为买卖“电能量”，而**绿电**交易还要体现电来自可再生能源的环境价值；\n- **绿证**则是可再生能源绿色属性的凭证。\n\n### 市场衔接要求\n- 政策提出要高质量建设**绿证**市场，拓展**绿证**应用场景，健全**中长期绿证**、**绿电**交易制度，并加强碳市场、**绿证**、**绿电**等市场化机制的衔接协同。\n- 这意味着未来绿色电力消费不只是买到电，还要把**绿证**、**绿电**合同、碳排放核算、企业可持续披露、重点行业可再生能源消费目标等制度打通。\n- 对发电企业而言，需要关注**绿证**核发、交易、收益归属，以及纳入新能源可持续发展价格结算机制的电量是否能重复获得**绿证**收益；\n\n### 主体关注点\n- 对电力用户和售电公司而言，需要关注**绿电**合同如何对应**绿证**、环境价值如何定价、绿色消费声明如何留痕，以及是否满足所在行业、园区或企业的低碳评价要求。\n- 容易误解的地方是：**绿证**和**绿电**不是简单叠加的两笔收益，政策更强调同一绿色属性不能重复出售、重复声明或重复核算，具体结算口径仍需看国家和地方交易规则。","browserFiles":[{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["绿证市场与绿电交易衔接","绿证证明可再生能源电量的绿色属性，绿电交易则把电能量和绿色环境价值一起交易，两者需要规则衔接避免重复计算。","绿证证明可再生能源电量的绿色属性，绿电交易则把电能量和绿色环境价值一起交易，两者需要规则衔接避免重复计算。 ### 概念定位 绿证市场与绿电交易衔接，是“十五五”阶段电力市场绿色价值体系的重要方向。 对初学者来说，可以把普通电力交易理解为买卖“电能量”，而绿电交易还要体现电来自可再生能源的环境价值； 绿证则是可再生能源绿色属性的凭证。 市场衔接要求 政策提出要高质量建设绿证市场，","绿色电力交易；可再生能源消费；碳市场；新能源上网电价市场化","国家","国务院关于印发《“十五五”碳达峰行动方案》的通知；国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","国发〔2026〕22号；发改价格〔2025〕136号","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml；https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf；source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","2026-07-14"]},{"title":"需求响应价格机制","detail":"### 概念定位\n- **需求响应**价格机制关注的是用户侧调节能力。\n- 传统电力系统更多依赖发电侧调节，新能源占比提高后，系统会更需要用户根据价格信号改变用电时间、降低尖峰负荷或配合新能源消纳。\n- “十五五”碳达峰行动方案提出，持续扩大电力系统**调节资源**规模，挖掘需求侧调节潜力，加快**虚拟电厂**发展，推动可调节负荷等各类分散资源参与系统调节，并在价格政策中提出探索建立反映调节能力的**需求响应**价格机制，充分激发用户侧调节潜力。\n\n### 参与资源和价值体现\n- 对小白来说，这不是简单的“少用电给补贴”，而是把可中断负荷、可转移负荷、储能、充电设施、空调负荷、工业柔性负荷等资源聚合起来，在电价高、系统紧张或需要调峰时响应调度或价格信号，并通过价格、补偿或市场收益体现其价值。\n- 适用主体可能包括电力用户、售电公司、**虚拟电厂**、负荷聚合商、储能和充电运营商等。\n\n### 落地规则关注\n- 它与峰谷**分时电价**、零售市场价格机制、**辅助服务**、**虚拟电厂**、**现货市场**价格信号密切相关。\n- 需要注意，国家方案提出的是方向性要求，具体准入、响应申报、基线计算、效果核验、补偿标准和考核规则，需要由各省电力市场规则、**需求响应**实施方案或**虚拟电厂**规则进一步明确。","browserFiles":[{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["需求响应价格机制","通过价格信号鼓励用户在电力紧张或新能源消纳需要时调整用电，用户侧调节能力也能获得价值体现。","通过价格信号鼓励用户在电力紧张或新能源消纳需要时调整用电，用户侧调节能力也能获得价值体现。 ### 概念定位 需求响应价格机制关注的是用户侧调节能力。 传统电力系统更多依赖发电侧调节，新能源占比提高后，系统会更需要用户根据价格信号改变用电时间、降低尖峰负荷或配合新能源消纳。 “十五五”碳达峰行动方案提出，持续扩大电力系统调节资源规模，挖掘需求侧调节潜力，加快虚拟电厂发展，","虚拟电厂；可调节负荷；分时电价；电力现货市场；辅助服务","国家","国务院关于印发《“十五五”碳达峰行动方案》的通知","国发〔2026〕22号","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","2026-07-14"]}]},{"name":"国家政策","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"国务院关于印发《“十五五”碳达峰行动方案》的通知","detail":"### 文件定位和目标\n- 该文件由国务院印发，文号为国发〔2026〕22号，生态环境部官网转载来源为中国政府网。\n- 文件定位是“十五五”时期推进碳达峰的总纲性行动方案，目标是在2030年前确保如期实现碳达峰，并为2035年国家自主贡献目标和碳中和奠定基础。\n- 它不是一份单一电力市场交易规则，但对电力市场、价格机制、**绿证绿电**、**需求响应**、容量价值和新能源消纳均提出方向性要求，因此应作为国家层面电力市场相关政策背景入库。\n- 总体目标方面，方案提出到2030年单位国内生产总值二氧化碳排放比2025年降低17%，非化石能源消费占比达到25%。\n- 对电力行业而言，文件把能源绿色低碳转型作为关键，要求更大力度发展新能源，统筹开发布局和消纳利用，扩大非化石能源有效供给；\n\n### 能源结构与电力系统\n- 到2030年，风电和太阳能发电总装机达到28亿千瓦以上，常规水电装机4.1亿千瓦左右，核电运行装机1.1亿千瓦左右。\n- 电力系统建设方面，文件要求提升跨省跨区输电和互补互济能力，加快特高压外送通道建设，新增西电东送能力8000万千瓦以上，推进省间电力互济工程；\n- 同时支持新能源就地消纳，发展**绿电**直连、新能源就近接入增量配电网等**绿电**直供模式，推动源网荷储一体化。\n- **调节资源**方面，文件强调持续扩大电力系统**调节资源**规模，因地制宜建设**抽水蓄能**，推动**新型储能**规模化和长时储能发展，挖掘需求侧调节潜力，加快**虚拟电厂**发展，推动可调节负荷等分散资源参与系统调节；\n- 到2030年，**抽水蓄能**装机约1.6亿千瓦，**新型储能**装机力争3亿千瓦，全国**虚拟电厂**最大调节能力5000万千瓦以上，电力**需求响应**能力达到最大用电负荷5%以上。\n\n### 调节资源和煤电转型\n- 煤电定位方面，方案要求合理控制煤电装机规模和发电量，推动煤电向支撑性、调节性电源转型，支持煤电与新能源融合发展，开展煤电机组低碳化改造，并依法依规淘汰不符合环保、能耗、用煤、安全、年限等要求的煤电机组，推动自备机组参与电网调峰。\n- 产业和负荷侧方面，文件推动零碳园区、零碳工厂、绿色算力设施建设，支持园区、工业企业和算力设施开展**绿电**直连、工业绿色微电网、数字化能碳管理中心以及储能、备用电源等配套，这些内容会影响未来**绿电**交易、可再生能源消费、负荷聚合和源网荷储商业模式。\n- 价格政策是本文件与电力市场最直接相关的部分：方案要求深化各类电源上网电价市场化改革，落实新能源可持续发展价格结算机制和新能源就近消纳价格机制；\n- 对以输送清洁能源电量或联网功能为主的工程探索实行两部制电价或单一**容量电价**；\n\n### 价格政策和市场机制\n- 推动“沙戈荒”新能源基地作为整体参与市场交易；\n- 完善发电侧**容量电价**机制，有序建立发电侧**可靠容量补偿**机制；\n- 完善体现分时价值差异的零售市场价格机制，并探索建立反映调节能力的**需求响应**价格机制。\n- 市场化机制方面，方案要求加强全国碳排放权交易市场建设，积极发展全国温室气体自愿减排交易市场，高质量建设**绿证**市场，拓展**绿证**应用场景，健全**中长期绿证**、**绿电**交易制度，并加强碳市场、**绿证**、**绿电**等市场化机制衔接协同。\n- 对市场主体的影响是：发电企业需要关注新能源参与市场、容量价值、**可靠容量补偿**、煤电调节转型和**绿证**收益衔接；\n\n### 主体影响和执行注意\n- 电力用户、售电公司、**虚拟电厂**和负荷聚合商需要关注分时零售价格、**需求响应**、**绿电**消费、**绿证**核算和可调节负荷价值；\n- 地方政府和监管部门需要制定省级“十五五”碳达峰行动方案，并在综合评价考核、价格政策、市场机制和项目建设中落实。\n- 需要注意，文件多为国家战略和政策方向，具体准入条件、交易流程、结算口径、考核方式仍需结合后续国家部委细则和各省电力市场规则执行；\n- 本次入库未发现该网页另附官方附件。","browserFiles":[{"title":"政策正文","sourceTitle":"国务院关于印发《“十五五”碳达峰行动方案》的通知","markdownFilePath":"knowledge-markdown/doc-state-council-2026-22/政策正文.md","sourceFilePath":"source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["国务院关于印发《“十五五”碳达峰行动方案》的通知","国务院关于印发《“十五五”碳达峰行动方案》的通知。### 文件定位和目标 该文件由国务院印发，文号为国发〔2026〕22号，生态环境部官网转载来源为中国政府网。 文件定位是“十五五”时期推进碳达峰的总纲性行动方案，目标是在2030年前确保如期实现碳达峰，并为2035年国家自主贡献目标和碳中和奠定基础。 它不是一份单一电力市场交易规则，","国发〔2026〕22号","国务院","2026-07-05","https://www.mee.gov.cn/zcwj/gwywj/202607/t20260714_1161655.shtml","source-files/2026-07-05-关于印发《“十五五”碳达峰行动方案》的通知(国发〔2026〕22号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","detail":"### 文件定位\n- 该文件是在煤电**容量电价**机制基础上，进一步把容量价值覆盖到煤电、气电、**抽水蓄能**、**新型储能**等发电侧可靠资源的政策。\n- 文件的核心目标是分类完善**容量电价**机制，既保障电力系统长期容量充裕和顶峰安全，又推动新能源高比例接入后的**调节资源**建设，并与现货、**辅助服务**、**中长期**交易等市场衔接。\n- 煤电方面，文件要求各地继续按发改价格〔2023〕1501号执行煤电**容量电价**，并将通过**容量电价**回收煤电固定成本比例提高到不低于50%；\n- 地方可结合电力市场建设、煤电利用小时、保供压力和用户承受能力适当提高。\n\n### 煤电和气电容量价值\n- 气电方面，省级价格主管部门可根据当地天然气发电功能定位和固定成本回收情况建立**容量电价**机制，支持其承担顶峰、调节和保供作用。\n- **抽水蓄能**方面，文件区分不同开工节点：633号文以前核价项目继续执行既有政府定价机制；\n- 以后核价项目由省级价格主管部门按平均成本、合理收益等原则统一核定**容量电价**，原则上每3至5年校核一次，连续满发小时数低于6小时的按能力折算；\n\n### 抽水蓄能和新型储能\n- **抽水蓄能**参与电能量和**辅助服务**市场形成的收益按规则分享，剩余**容量电费**纳入**系统运行费用**。\n- **新型储能**方面，文件提出建立电网侧独立**新型储能容量电价**机制，前提是项目服务电力系统安全稳定运行、未作为新能源配储等方式重复保障，并按清单管理；\n- **容量电价**可参照当地煤电**容量电价**乘以顶峰容量折算系数确定，折算系数与储能持续充放电时长和当地最长净负荷尖峰持续时间相关，最高不超过1。\n\n### 可靠容量补偿\n- **可靠容量补偿**是文件的另一个重点：在电力**现货市场**连续运行后，省级价格主管部门会同有关部门适时建立发电侧**可靠容量补偿**机制，对自主参与当地市场、在系统顶峰时段能够持续稳定供电的煤电、气电、符合条件的电网侧独立**新型储能**等可靠容量按统一原则补偿，并逐步扩展到**抽水蓄能**等其他可靠资源。\n- 补偿标准应基于市场边际机组在电能量和**辅助服务**市场未能回收的固定成本，同时考虑电力供需、用户承受能力和市场建设进展；\n- 已经通过其他方式获得容量保障的部分不得重复补偿，政府定价机组不纳入。\n\n### 市场衔接和费用分摊\n- 政策衔接方面，一旦**可靠容量补偿**机制建立，纳入该机制的煤电、气电和独立储能不再执行原**容量电价**；\n- 新政策后核价的**抽水蓄能**可选择**可靠容量补偿**路径。\n- 文件还要求完善市场交易和结算配套，包括调整煤电**中长期**交易价格下限、不得强制固定价格、鼓励灵活价格机制、容量费用和**可靠容量补偿**纳入**系统运行费用**、区域共用**抽水蓄能**容量费按容量分配或受益分摊，以及在出台前开展用户承受能力和工商业电价影响评估。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2026-114/政策正文.md","sourceFilePath":"source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知","国家发展改革委 国家能源局关于完善发电侧容量电价机制的通知。### 文件定位 该文件是在煤电容量电价机制基础上，进一步把容量价值覆盖到煤电、气电、抽水蓄能、新型储能等发电侧可靠资源的政策。 文件的核心目标是分类完善容量电价机制，既保障电力系统长期容量充裕和顶峰安全，又推动新能源高比例接入后的调节资源建设，并与现货、辅助服务、中长期交易等市场衔接。 煤电方面，","发改价格〔2026〕114号","国家发展改革委、国家能源局","2026-01-30","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202601/t20260130_1403524.html","source-files/2026-01-30-关于完善发电侧容量电价机制的通知(发改价格〔2026〕114号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","detail":"### 文件定位\n- 该文件是新能源上网电价市场化改革和**机制电价**、**机制电量**、**差价结算**等概念的直接来源。\n- 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成；\n- 跨省跨区交易按跨省跨区市场规则形成价格。\n- 它同时要求完善新能源参与现货和**中长期**市场的价格机制：**现货市场**中，新能源应公平参与实时市场并逐步自愿参与日前市场，报价上下限要与工商业峰谷电价、非市场化收益等因素衔接；\n\n### 新能源参与市场\n- **中长期**市场中，要适应新能源出力波动和预测不确定性，缩短交易周期、提高交易频次，支持周、多日、日等短周期交易，合同可以约定量价曲线、灵活价格形成方式和偏差责任。\n- **绿电**交易方面，文件要求绿色电力交易价格明确区分电能量价格和**绿证**价格，省内**绿电**交易初期不再单独组织集中竞价或滚动撮合，避免与常规电力交易割裂。\n- 为平稳衔接市场化改革，文件建立新能源可持续发展价格结算机制：纳入机制的电量仍参与市场交易形成市场交易价格，但电网企业每月按**机制电价**与市场交易均价进行**差价结算**，差额纳入当地**系统运行费用**。\n\n### 价格结算机制\n- 现货连续运行地区，市场交易均价原则上按月度发电侧实时市场同类项目加权平均价格确定；\n- 现货未连续运行地区，按交易活跃周期内发电侧**中长期**交易同类项目加权平均价格确定。\n- 文件区分存量和增量项目：2025年6月1日前投产的存量项目，**机制电量**规模与现行保障性收购或保障利用小时等政策衔接，**机制电价**按现行价格政策确定且不高于当地煤电基准价，执行期限按原政策衔接；\n\n### 存量与增量项目安排\n- 2025年6月1日起投产的增量项目，纳入机制的电量规模、**机制电价**和执行期限原则上通过竞争性方式确定，竞价上限综合新能源成本、绿色价值、供需和用户承受能力等因素设置，执行期限结合同类项目合理回收初始投资期限确定。\n- 结算上，**机制电量**按年度规模分解到月，月度实际上网电量低于当月**机制电量**的，按实际电量结算并在年内滚动清算；\n- 项目可自愿退出机制，期满或退出后不再纳入机制。\n\n### 地方执行和约束\n- 文件还明确**绿证**收益和机制结算不能重复获得，同一新能源项目纳入机制的电量对应**绿证**收益应按政策衔接处理；\n- 电网企业可通过代理购电、单独归集等方式承接机制**差价结算**，相关费用纳入**系统运行费用**。\n- 地方层面，文件要求各省在2025年底前制定实施方案，做好项目测算、用户承受能力评估、政策宣传和市场监管，并强调不得将配置储能作为新能源项目核准、并网、上网等前置条件，不得乱收费，存量补贴项目仍按合理利用小时等政策享受原补贴。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2025-136/政策正文.md","sourceFilePath":"source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知","国家发展改革委 国家能源局关于深化新能源上网电价市场化改革 促进新能源高质量发展的通知。### 文件定位 该文件是新能源上网电价市场化改革和机制电价、机制电量、差价结算等概念的直接来源。 文件要求风电、太阳能发电等新能源项目上网电量原则上全部进入电力市场，上网价格通过市场交易形成； 跨省跨区交易按跨省跨区市场规则形成价格。 它同时要求完善新能源参与现货和中长期市场的价格机制：现货市场中，","发改价格〔2025〕136号","国家发展改革委、国家能源局","2025-02-09","https://www.gov.cn/zhengce/zhengceku/202502/content_7002959.htm","source-files/2025-02-09-关于深化新能源上网电价市场化改革促进新能源高质量发展的通知(发改价格〔2025〕136号).pdf","","有效","2026-07-14"]},{"title":"国家能源局关于印发《电力市场注册基本规则》的通知","detail":"### 文件定位\n- 该文件印发《**电力市场注册**基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。\n- 规则适用于**中长期**、现货、**辅助服务**等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括**新型储能**、**虚拟电厂**、智能微电网等。\n- 文件强调注册管理要坚持规范入市、公开透明、全国统一和信息共享，原则上实行全国统一的注册事项清单，各地不得另行设置不合理的地方负面清单或附加条件；\n- 注册信息应在不同市场、不同交易机构之间共享，推动一地注册、全国共享。\n\n### 主体范围和基本条件\n- 主体基本条件方面，经营主体应具备独立承担民事责任能力、财务和信用条件，不存在严重失信且未完成信用修复等情形。\n- 发电企业需具有核准或备案手续、发电业务许可证或符合豁免条件、并网调度协议、调度自动化和计量条件；\n- 燃煤自备电厂还要符合能效、环保等要求。\n\n### 注册、变更和注销流程\n- 售电公司按售电公司管理规则执行。\n- 电力用户应具备符合交易和结算要求的计量条件，工商业用户可直接参与市场或由电网企业代理购电。\n- **新型储能**需具备并网调度协议、调度自动化、分时计量、最大充放电功率、容量和持续时长等信息；\n- **虚拟电厂**和负荷聚合商需具有负荷确认协议或调度协议，接入负荷管理、自动化或调控系统，具备资源聚合、监测和控制能力；\n\n### 新型经营主体要求\n- 分布式发电、充电设施、智能微电网等也分别提出备案、计量、调度或负荷管理要求。\n- 注册流程包括申请、承诺、审查、公示和生效，交易机构一般在5个工作日内完成审查，部分主体可按规定免于公示；\n- 经营主体同一合同周期内原则上只能与一家售电公司或**虚拟电厂**建立零售或聚合关系，多重身份需分别注册。\n\n### 监管责任\n- 信息变更方面，主体名称、法定代表人、股权或实际控制关系、许可证、机组参数、储能容量、售电公司和**虚拟电厂**资产与人员等重要信息变化后，应在5个工作日内办理变更，变更期间通常可继续参加交易。\n- 注销方面，破产、关停、政策变化、并网关系变化、机组退役、无工商业用电等情形可办理注销，注销前要处理未履约合同和电费清算，相关信息保留5年。\n- 文件还规定异议处理、虚假材料处理、保密义务、信用评价和监管责任，为后续各省规则中的准入、交易资格、履约担保和市场秩序管理提供基础依据。","browserFiles":[{"title":"政策正文","sourceTitle":"国家能源局关于印发《电力市场注册基本规则》的通知","markdownFilePath":"knowledge-markdown/doc-nea-2024-76/政策正文.md","sourceFilePath":"source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["国家能源局关于印发《电力市场注册基本规则》的通知","国家能源局关于印发《电力市场注册基本规则》的通知。### 文件定位 该文件印发《电力市场注册基本规则》，有效期5年，是各地电力市场主体入市、变更、注销和信息维护的全国统一底座。 规则适用于中长期、现货、辅助服务等电力市场，覆盖发电企业、售电公司、电力用户和新型经营主体，其中新型经营主体包括新型储能、虚拟电厂、智能微电网等。 文件强调注册管理要坚持规范入市、公开透明、全国统一和信息共享，","国能发监管规〔2024〕76号","国家能源局","2024-09-13","https://zfxxgk.nea.gov.cn/2024-09/13/c_1212399683.htm","source-files/2024-09-13-关于印发《电力市场注册基本规则》的通知(国能发监管规〔2024〕76号).pdf","","有效","2026-07-14"]},{"title":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","detail":"### 文件定位\n- 该文件建立煤电**容量电价**机制，是从单一制煤电上网电价转向两部制电价的基础政策。\n- 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本；\n- **容量电价**按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。\n- 适用范围是合规在运的公用煤电机组，不包括燃煤自备电厂、不符合规划要求的煤电机组，以及能耗、环保、灵活调节能力不达标的机组。\n\n### 适用范围和电价机制\n- 文件规定全国煤电机组固定成本实行统一参考标准330元每千瓦年，2024年至2025年多数地方按约30%的固定成本回收比例确定**容量电价**，部分转型较快地区可按约50%执行；\n- 2026年起，各地通过**容量电价**回收煤电固定成本的比例原则上不低于50%。\n- 附件《省级电网煤电**容量电价**表》列明各省级电网2024年至2025年**容量电价**标准，多数省份为100元每千瓦年，部分省份为165元每千瓦年，并注明2026年后云南、四川等转型较快地区回收比例不低于70%、其他地区不低于50%。\n\n### 容量电费分摊\n- **容量电费**的计算方式是按当地**容量电价**乘以机组申报最大出力，由电网企业按月向煤电企业结算；\n- 新投产煤电机组自投运次月起执行。\n- **容量电费**不直接由某个用户单独承担，而是纳入**系统运行费用**，由工商业用户按当月用电量比例分摊并按月滚动清算，居民、农业等目录用户按现行政策衔接。\n\n### 考核扣减\n- 跨省跨区外送煤电机组另有分摊规则：纳入受电省电力电量平衡的配套煤电原则上按受电省**容量电价**执行，费用由受电省承担；\n- 多省共用的，按受电电量或容量分摊；\n- 未纳入受电省平衡的外送机组，**容量电费**原则上由送电省承担。\n\n### 执行衔接\n- 文件不是无条件补贴，还设置最大出力申报和考核：煤电机组未按调度指令达到申报最大出力的，月内出现2次扣减当月**容量电费**10%，3次扣减50%，4次及以上扣减100%；\n- 若一年内连续或累计多次被扣完**容量电费**，可能取消**容量电费**获取资格。\n- 文件要求省级价格主管部门制定本地执行方案，电网企业负责计算、分摊和结算，煤电企业如实申报最大出力并履行可用容量义务，同时与电力市场建设、煤电**中长期**合同、**辅助服务**和调峰补偿政策衔接，避免重复补偿。","browserFiles":[{"title":"政策正文","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/政策正文.md","sourceFilePath":"source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"省级电网煤电容量电价表.pdf","sourceTitle":"国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","markdownFilePath":"knowledge-markdown/doc-ndrc-2023-1501/省级电网煤电容量电价表.pdf.md","sourceFilePath":"source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","extraction":{"method":"ocr","ocrStatus":"success","extractedAt":"2026-07-15"}}],"values":["国家发展改革委 国家能源局关于建立煤电容量电价机制的通知","国家发展改革委 国家能源局关于建立煤电容量电价机制的通知。### 文件定位 该文件建立煤电容量电价机制，是从单一制煤电上网电价转向两部制电价的基础政策。 核心逻辑是把煤电收入拆成两部分：电量电价由市场化方式形成，主要反映发电量、市场供需和燃料成本； 容量电价按回收煤电机组一定比例固定成本确定，用来体现煤电在系统保供、顶峰和调节中的可用容量价值。 适用范围是合规在运的公用煤电机组，","发改价格〔2023〕1501号","国家发展改革委、国家能源局","2023-11-10","https://www.ndrc.gov.cn/xxgk/zcfb/tz/202311/t20231110_1361897.html","source-files/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号).pdf","省级电网煤电容量电价表.pdf|source-files/attachments/2023-11-10-关于建立煤电容量电价机制的通知(发改价格〔2023〕1501号)/P020231110516150430728.pdf","有效","2026-07-14"]}]},{"name":"江苏","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","detail":"### 文件定位\n- 该通知发布《江苏省电力**中长期**市场实施细则（2026版）》，公开页面未见正式发文字号，故文号记录为“未见正式文号”。\n- 附件细则共15章139条，是江苏省**中长期**市场的主要操作规则，适用于省内经营主体市场注册、交易、执行、结算、信息披露和监管。\n- 细则首先明确经营主体包括发电企业、售电公司、电力用户和新型经营主体，新型经营主体涵盖分布式新能源、储能、可调节负荷、**虚拟电厂**、负荷聚合商、智能微电网、源网荷储一体化项目等；\n- 用户分为批发用户和零售用户，负荷侧**虚拟电厂**参照售电公司管理，发电侧**虚拟电厂**参照发电企业管理。\n- 总体要求上，江苏强调**中长期**市场与**现货市场**在交易时序、出清、结算和偏差处理方面衔接，并推动跨省跨区与省内交易衔接、交易平台和数据标准统一。\n\n### 市场主体和准入\n- 市场成员章节细化发电企业、售电公司、电力用户、新型经营主体、电网企业、交易机构、调度机构的权利义务，要求经营主体履行交易合同、按时结算、如实披露信息、满足技术条件，并建立履约保障和风险约束。\n- 注册、变更和注销方面，经营主体按国家注册规则和江苏要求办理，批发身份和零售身份互斥，注册信息变化需及时办理变更；\n- 售电公司、**虚拟电厂**等若不能持续满足注册条件，可被强制退出，强制退出主体及相关法人代表一定期限内不得重新办理市场注册。\n- 交易品种方面，江苏**中长期**交易包括电能量直接交易、合同转让交易和绿色电力交易，交易方式包括集中交易、双边协商、滚动撮合和挂牌；\n\n### 交易组织和合同管理\n- 未履行合同可通过合同转让交易全部或部分转让，权利义务一并转移。\n- 价格机制方面，除政府定价电量外，市场价格由交易形成；\n- **中长期**合同可签固定价格，数年和年度交易也可签随供需、发电成本变化的灵活价格机制，但灵活价格电量不纳入相应固定价格统计口径；\n- **绿电**价格由电能量价格和**绿电**环境价值组成。\n- 交易组织方面，细则规定交易公告、交易日历、申报限额、年度和月度交易、月内和日滚动交易等安排，现货衔接下每小时**中长期**合同电量和保量保价电量按规则分解，最小结算和交易曲线颗粒度逐步细化到小时。\n\n### 绿电与结算衔接\n- 绿色电力交易是江苏规则的重点之一：**绿电**交易要实现绿色电力和环境价值一一对应、可追踪溯源，支持数年**绿电**交易和小时级**绿电**交易试点；\n- **绿电**环境价值按小时结算，合同需明确电量、电力曲线、环境价值价格和偏差补偿；\n- 售电公司签订小时级**绿电**零售套餐后，要将用户需求关联到批发侧**绿电**合同；\n- **虚拟电厂**聚合分布式新能源参与**绿电**交易时，也要把申报电量关联至具体分布式新能源项目。\n\n### 执行和监管要求\n- 计量结算方面，计量装置应满足最小结算单元要求，电力调度机构保证计量数据准确完整并按时传输；\n- **中长期**结算设置结算参考点并采用差量结算方式，合同电量照付不议，偏差部分在**现货市场**结算；\n- 纳入新能源可持续发展价格结算机制的电量按**机制电价**开展**差价结算**并同步纳入用户侧签约比例口径。\n- 文件还规定交易校核、合同签订和电子合同、合同执行、信息披露、技术支持系统、风险防控、争议处理和法律责任，是江苏发电企业、售电公司、电力用户和**虚拟电厂**等参与**中长期**和**绿电**交易时必须对照的基础规则。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","markdownFilePath":"knowledge-markdown/doc-js-2026-long-term/政策正文.md","sourceFilePath":"source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"江苏省电力中长期市场实施细则（2026版）.pdf","sourceTitle":"关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","markdownFilePath":"knowledge-markdown/doc-js-2026-long-term/江苏省电力中长期市场实施细则（2026版）.pdf.md","sourceFilePath":"source-files/attachments/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号)/P020260306620943462050.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["关于印发《江苏省电力中长期市场实施细则（2026版）》的通知","关于印发《江苏省电力中长期市场实施细则（2026版）》的通知。### 文件定位 该通知发布《江苏省电力中长期市场实施细则（2026版）》，公开页面未见正式发文字号，故文号记录为“未见正式文号”。 附件细则共15章139条，是江苏省中长期市场的主要操作规则，适用于省内经营主体市场注册、交易、执行、结算、信息披露和监管。 细则首先明确经营主体包括发电企业、售电公司、电力用户和新型经营主体，","未见正式文号","国家能源局江苏监管办公室、江苏省发展改革委（能源局）","2026-03-06","https://jsb.nea.gov.cn/dtyw/tz/202603/t20260306_297521.html","source-files/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号).pdf","江苏省电力中长期市场实施细则（2026版）.pdf|source-files/attachments/2026-03-06-关于印发《江苏省电力中长期市场实施细则（2026版）》的通知(未见正式文号)/P020260306620943462050.pdf","有效","2026-07-14"]}]},{"name":"浙江","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"浙江组织开展电力中长期市场等4项实施细则修订工作","detail":"### 文件定位\n- 浙江能源监管办会同浙江省发展改革委、省能源局组织修订并公开发布《浙江电力**中长期**市场实施细则》《浙江电力零售市场实施细则》《浙江电力市场管理实施细则》《浙江电力市场结算实施细则》等4项细则。\n- 公开页面为监管动态，未附可读取的四项细则全文，因此本条以页面披露的修订过程和重点问题为依据。\n- 页面显示，修订工作以国家《电力**中长期**市场基本规则》为依据，逐条比对国家规则与浙江既有市场规则差异，并结合浙江市场实际重点研究三个问题：居民农业和代理购电偏差电量结算、同一投资主体市场份额不超过20%、**分时电价**机制。\n\n### 四项细则覆盖范围\n- 这说明修订不仅调整批发侧交易流程，还涉及代理购电、零售关系、市场集中度控制和用户侧价格信号。\n- 四项细则的组合含义较强：**中长期**市场实施细则主要规范发电企业、售电公司、电力用户等在年度、月度、月内等周期签订**中长期**合同、形成电量电价和曲线、管理合同风险；\n- 零售市场实施细则主要规范售电公司与零售用户之间的套餐、签约、履约和代理关系；\n\n### 中长期和零售衔接\n- 市场管理实施细则主要约束注册、交易秩序、信息披露、异常行为和监管措施；\n- 结算实施细则则把**中长期**、零售、现货或代理购电相关电量、电价、电费落实到结算口径。\n\n### 结算和市场管理重点\n- 页面还披露修订程序：2026年1月28日向社会公开征求意见，2月24日经浙江电力市场管理委员会审议，之后由浙江能源监管办、省发展改革委、省能源局审定同意后发布。\n- 对市场主体来说，四项细则意味着浙江把**中长期**交易、零售套餐、市场管理和结算口径放在一套规则中联动更新；\n- 售电公司尤其要关注零售套餐设计、同一投资主体市场份额约束、代理购电偏差结算和**分时电价**传导；\n\n### 主体影响\n- 电力用户要关注直接交易或零售代理方式、偏差电量责任和**分时电价**影响；\n- 发电企业要关注**中长期**合同曲线、交易组织和结算参考。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江组织开展电力中长期市场等4项实施细则修订工作","markdownFilePath":"knowledge-markdown/doc-zj-2026-four-rules/政策正文.md","sourceFilePath":"source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["浙江组织开展电力中长期市场等4项实施细则修订工作","浙江组织开展电力中长期市场等4项实施细则修订工作。### 文件定位 浙江能源监管办会同浙江省发展改革委、省能源局组织修订并公开发布《浙江电力中长期市场实施细则》《浙江电力零售市场实施细则》《浙江电力市场管理实施细则》《浙江电力市场结算实施细则》等4项细则。 公开页面为监管动态，未附可读取的四项细则全文，因此本条以页面披露的修订过程和重点问题为依据。 页面显示，","未见正式文号","国家能源局浙江监管办公室、浙江省发展改革委、浙江省能源局","2026-03-04","https://zjb.nea.gov.cn/dtyw/jgdt/202603/t20260304_297397.html","source-files/2026-03-04-浙江组织开展电力中长期市场等4项实施细则修订工作(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江能源监管办完成电力市场三项实施细则修订","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频**辅助服务**市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。\n- 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。\n- 此次修订的背景包括发改价格〔2025〕136号新能源上网电价市场化改革、《电力市场计量结算基本规则》以及浙江2026年电力市场交易方案，说明浙江正在把新能源、储能、计量结算和市场管理纳入现货正式运行后的统一规则框架。\n\n### 三项细则覆盖范围\n- 官方页面列出六方面变化：一是明确储能入市机制，规定储能电站参与现货电能量市场和调频**辅助服务**市场的入市门槛、交易机制和参数，解决储能以何种身份、何种技术参数参与市场的问题。\n- 二是明确新能源入市机制，规定新能源参与现货电能量市场的门槛、交易机制和参数，并增加新能源优先消纳原则，即火电与新能源报价相同时新能源优先出清。\n\n### 零售与结算重点\n- 三是补充风险处置定义和措施，将市场风险细分为不同等级并匹配相应处置手段，为市场异常、系统风险或主体风险提供操作依据。\n- 四是完善市场力监测规则，补充市场力指标、计算公式、参数设置和缓解措施，强化对可能操纵价格或影响出清结果行为的监管。\n- 五是合并历次市场管理委员会公告，提升市场管理规则的一致性和可查询性。\n\n### 市场管理要求\n- 六是按照国家计量结算规则统一电量、电价、电费计量单位，减少结算口径不一致带来的争议。\n- 对经营主体来说，这次修订直接影响新能源和储能能否参与、如何报价、如何出清、如何结算以及发生风险时如何处置；\n\n### 主体影响\n- 对售电公司和用户来说，新能源优先出清、储能参与调频和现货、市场力缓解措施都会影响价格曲线和偏差风险；\n- 对监管机构来说，修订强化了浙江现货正式运行后的市场秩序管理。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办完成电力市场三项实施细则修订","markdownFilePath":"knowledge-markdown/doc-zj-2025-three-rules/政策正文.md","sourceFilePath":"source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["浙江能源监管办完成电力市场三项实施细则修订","浙江能源监管办完成电力市场三项实施细则修订。### 文件定位 浙江能源监管办公开信息显示，其牵头完成《浙江电力现货电能量市场交易实施细则》《浙江电力调频辅助服务市场交易实施细则》和《浙江电力市场管理实施细则》三项细则修订。 公开页面没有附可读取细则全文，因此本条以官方页面列明的修订内容为依据。","未见正式文号","国家能源局浙江监管办公室","2025-12-02","https://zjb.nea.gov.cn/dtyw/jgdt/202512/t20251202_291553.html","source-files/2025-12-02-浙江能源监管办完成电力市场三项实施细则修订(未见正式文号).pdf","","有效","2026-07-14"]},{"title":"浙江能源监管办推动浙江电力现货市场转入正式运行","detail":"### 文件定位\n- 浙江能源监管办公开信息显示，浙江电力**现货市场**于2025年8月7日转入正式运行，成为长三角地区首个正式运行的**现货市场**。\n- 页面说明浙江已印发《浙江电力**现货市场**规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”**现货市场**规则体系；\n\n### 现货市场运行基础\n- 本条来源为监管动态页面，未见可读取的7个细则附件全文，因此解读限于官方页面明确披露内容。\n- 浙江现货规则体系的重点在于从**中长期**合同为主的交易框架，进一步进入日前、实时等更能反映时段供需和电网约束的价格形成机制。\n\n### 中长期与现货衔接\n- 官方页面特别强调浙江在国内率先推进调频**辅助服务**与电能量市场联合出清，这意味着调频资源不再只是事后补偿，而是在市场出清中同时考虑调频机会成本和调节成本，从而让电能量价格和**辅助服务**价格更协调地反映系统平衡需求。\n- 页面还提到浙江建立市场运营监管规则、市场力监测和缓解机制、风险防控机制以及数字化监管体系，形成100余项监管指标，并开展市场秩序专项监管，查处发电企业串通报价等典型案件。\n\n### 主体影响\n- 对发电企业来说，现货正式运行后报价行为、机组可用容量、调频性能、日前和实时出清结果都会直接影响收入和合规风险；\n- 对售电公司和电力用户来说，**中长期**合约只是风险管理工具，实际用电偏差和现货价格波动会传导到结算，需要关注合同曲线、偏差风险和零售套餐设计；\n\n### 后续规则关注\n- 对监管机构和市场运营机构来说，重点是持续监测市场力、异常报价、串通行为和系统运行风险。\n- 该文件的意义不是单个交易公告，而是确认浙江**现货市场**已经进入正式运行阶段，并形成电能量、调频**辅助服务**、风险防控、市场力监管和数字化监管共同支撑的市场体系。","browserFiles":[{"title":"政策正文","sourceTitle":"浙江能源监管办推动浙江电力现货市场转入正式运行","markdownFilePath":"knowledge-markdown/doc-zj-2025-spot-formal/政策正文.md","sourceFilePath":"source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["浙江能源监管办推动浙江电力现货市场转入正式运行","浙江能源监管办推动浙江电力现货市场转入正式运行。### 文件定位 浙江能源监管办公开信息显示，浙江电力现货市场于2025年8月7日转入正式运行，成为长三角地区首个正式运行的现货市场。 页面说明浙江已印发《浙江电力现货市场规则》（浙监能市场〔2024〕4号）及7个配套实施细则，形成“1+7”现货市场规则体系； 现货市场运行基础 本条来源为监管动态页面，未见可读取的7个细则附件全文，","浙监能市场〔2024〕4号","国家能源局浙江监管办公室、浙江省能源局","2025-09-15","https://zjb.nea.gov.cn/dtyw/jgdt/202509/t20250923_287902.html","source-files/2025-09-15-浙江能源监管办推动浙江电力现货市场转入正式运行(浙监能市场〔2024〕4号).pdf","","有效","2026-07-14"]}]},{"name":"山西","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"山西电力中长期市场实施细则","detail":"### 文件定位\n- 山西能源监管办公开政策解读显示，《山西电力**中长期**市场实施细则》（晋监能市场规〔2026〕1号）依据国家《电力**中长期**市场基本规则》（发改能源规〔2025〕1656号）和新能源上网电价市场化改革政策修订，结合山西电力**现货市场**运行实际，于2026年6月1日起施行，有效期5年，并废止原《山西电力**中长期**交易实施细则》（晋监能市场规〔2024〕2号）。\n- 公开页面本身为政策解读，未见可读取的正式细则附件，因此本条详细解读以官方页面确认信息为准。\n- 解读说明，新细则共13章，内容覆盖总则、市场成员、交易品种、交易周期和方式、交易组织、价格机制、电量约束、合同管理、计量结算、信息披露、技术支持系统、市场监管和附则，并单独设置绿色电力交易相关内容。\n\n### 月内和日滚动交易\n- 修订重点首先是与全国统一**中长期**规则衔接，统一**中长期**交易基本概念、市场成员权责、合同管理、计量结算和信息披露要求。\n- 其次是优化月内交易组织，完善月内旬双边协商、旬集中竞价、旬挂牌、旬合同转让等流程，使**中长期**交易能够覆盖不同周期、不同主体和不同风险管理需求。\n\n### 小时级绿电交易\n- 第三是强化**中长期**与现货衔接，日滚动交易采用**现货市场**交易限价，引导经营主体在**中长期**合同曲线与现货价格风险之间形成更清晰的衔接关系。\n- 第四是突出绿色电力交易，明确小时级**绿电**交易，以小时为颗粒度开展计量、申报、出清和结算，并通过绿色电力证书、**绿电**环境价值和电能量交易的衔接保障绿色消费可追踪。\n\n### 现货衔接和风险管理\n- 第五是加强风险和合规管理，文件解读提到金融套利约束、市场风险防控、信息披露和技术支持系统要求，意在减少**中长期**合约与现货价格之间的异常套利、串通和操纵行为。\n- 对发电企业、售电公司、电力用户和新能源主体来说，新细则的影响主要在于：参与山西**中长期**市场需要更关注分时曲线、月内和日滚动交易安排、**绿电**小时级结算、合同转让和现货偏差风险；\n\n### 主体关注点\n- 售电公司还要关注履约担保、代理用户电量和风险平抑能力；\n- 新能源主体则要同时关注新能源市场化、**机制电量差价结算**和**绿电**环境价值不能重复收益等衔接要求。","browserFiles":[{"title":"政策正文","sourceTitle":"山西电力中长期市场实施细则","markdownFilePath":"knowledge-markdown/doc-sx-2026-1/政策正文.md","sourceFilePath":"source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["山西电力中长期市场实施细则","山西电力中长期市场实施细则。### 文件定位 山西能源监管办公开政策解读显示，《山西电力中长期市场实施细则》（晋监能市场规〔2026〕1号）依据国家《电力中长期市场基本规则》（发改能源规〔2025〕1656号）和新能源上网电价市场化改革政策修订，结合山西电力现货市场运行实际，于2026年6月1日起施行，有效期5年，并废止原《山西电力中长期交易实施细则》（晋监能市场规〔2024〕2号）。","晋监能市场规〔2026〕1号","国家能源局山西监管办公室","2026-05-27","https://sxb.nea.gov.cn/xxgk/zcjd/202605/t20260527_301835.html","source-files/2026-05-27-山西电力中长期市场实施细则(晋监能市场规〔2026〕1号).pdf","","有效","2026-07-14"]}]},{"name":"湖北","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《湖北省电力中长期市场实施细则》的通知","detail":"### 文件定位\n- 该通知由国家能源局华中监管局、湖北省发展改革委、湖北省能源局联合发布，文号为华中监能市场规﹝2026﹞39号，正文说明《湖北省电力**中长期**市场实施细则》已经广泛征求意见并经湖北电力市场管理委员会审议，要求电力交易机构加强经营主体宣贯培训、信息披露和风险防控。\n- 附件细则共14章122条，适用于湖北电力**中长期**市场注册、交易、执行、结算、信息披露和监督管理。\n- 细则开宗明义要求**中长期**市场与**现货市场**在交易时序、出清和结算方面衔接，并统一市场注册、交易组织、交易结算、信息披露等标准。\n- 市场成员方面，经营主体包括发电企业、售电公司、电力用户和资源聚合类新型经营主体，电网企业、交易机构、调度机构分别承担计量结算、合同汇总、交易组织、安全校核、调度执行和风险防控等职责。\n- 注册方面，经营主体按《**电力市场注册**基本规则》和湖北注册实施细则办理注册、变更和注销，并进行实名认证；\n\n### 市场成员和注册要求\n- 交易机构每年核验持续满足注册条件情况，集中式和分布式新能源按最小颗粒度或统一社会信用代码等方式维护注册信息；\n- 注册信息变化后5个工作日内申请变更。\n- 批发用户和零售用户身份互斥，同一合同周期内同一经营主体原则上只能与一家售电公司或**虚拟电厂**建立关系；\n- 电网企业代理购电用户可按周期选择直接参与市场。\n\n### 交易组织和价格机制\n- 交易品种与方式方面，湖北以电能量交易为主，并根据需要开展合同转让、回购交易，推动电能量交易与合同管理衔接；\n- 交易方式包括双边协商、集中交易、挂牌等，交易结果由平台发布并自动生成电子合同。\n- 价格机制方面，除政府定价电量外，**中长期**合同价格由市场形成，可采用固定价格，也可在年度**中长期**合同中约定随供需、成本变化的灵活价格机制；\n- **绿电**价格由电能量价格和绿色电力环境价值组成。\n\n### 结算与绿电规则\n- 交易组织方面，细则要求交易公告明确交易品种、主体、方式、申报时间、执行周期等，交易机构根据合同和可用发用电能力开展申报限额控制，售电公司和资源聚合类主体的申报能力与注册资产、履约担保、代理或聚合用户历史用电水平等风险平抑能力关联。\n- **绿电**交易方面，省内**绿电**基于集中竞价合同开展，新能源发电企业、售电公司、电力用户和**虚拟电厂**等通过合同明确**绿电**环境价值，形成可追踪溯源的**绿电**合同；\n- 合同可在环境价值可溯源前提下按月或更短周期转让。\n- 省内省间衔接、交易校核和合同管理方面，细则规定交易校核包括出清校核和电网安全校核，电子交易确认单视为电子合同，分散资源可与聚合类主体签订聚合服务合同。\n\n### 风险防控和监管\n- 计量结算方面，湖北原则上以自然月连续结算，电能量交易日清月结，先出具日清分结果，次月出具正式结算依据；\n- 当前**中长期**结算暂按差量结算方式执行，即照付不议、偏差结算，未签**中长期**合同的实际用电量或发电量按偏差电量结算。\n- **绿电**交易中电能量与环境价值分开结算，环境价值按合同电量、发电企业上网电量扣除纳入可持续发展价格结算**机制电量**后的余额、电力用户用电量三者取小确定，纳入**机制电量**不得重复获得**绿证**收益。\n- 文件还规定信息披露真实性、准确性和保密义务，技术支持系统功能，风险防控预案、争议处理、法律责任和5年有效期。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《湖北省电力中长期市场实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2026-39/政策正文.md","sourceFilePath":"source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"《湖北省电力中长期市场实施细则》.pdf","sourceTitle":"关于印发《湖北省电力中长期市场实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-hb-2026-39/《湖北省电力中长期市场实施细则》.pdf.md","sourceFilePath":"source-files/attachments/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号)/P020260414530138531095.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["关于印发《湖北省电力中长期市场实施细则》的通知","关于印发《湖北省电力中长期市场实施细则》的通知。### 文件定位 该通知由国家能源局华中监管局、湖北省发展改革委、湖北省能源局联合发布，文号为华中监能市场规﹝2026﹞39号，正文说明《湖北省电力中长期市场实施细则》已经广泛征求意见并经湖北电力市场管理委员会审议，要求电力交易机构加强经营主体宣贯培训、信息披露和风险防控。 附件细则共14章122条，","华中监能市场规﹝2026﹞39号","国家能源局华中监管局、湖北省发展和改革委员会、湖北省能源局","2026-04-03","https://hzj.nea.gov.cn/dtyw/tzgg/202604/t20260414_299623.html","source-files/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号).pdf","《湖北省电力中长期市场实施细则》.pdf|source-files/attachments/2026-04-03-关于印发《湖北省电力中长期市场实施细则》的通知(华中监能市场规﹝2026﹞39号)/P020260414530138531095.pdf","有效","2026-07-14"]}]},{"name":"四川","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"四川电力中长期市场实施细则","detail":"### 文件定位\n- 四川能源监管办公开解读显示，《四川电力**中长期**市场实施细则》依据国务院办公厅关于完善全国统一电力市场体系的实施意见、《电力市场运行基本规则》《电力**中长期**市场基本规则》等文件制定，目的是深化四川**中长期**市场建设、适应全国统一电力市场和**现货市场**衔接需要。\n- 公开页面为政策解读，未见可读取的正式细则附件，因此本条以官方解读确认内容为准。\n- 解读显示，细则共14章122条，覆盖总则、总体要求、市场成员、交易品种和价格机制、批发交易、零售交易、交易校核、合同管理、计量结算、信息披露、技术支持系统、风险防控、争议处置、法律责任和附则。\n\n### 市场主体和准入注册\n- 与旧规则相比，四川新细则首先把**虚拟电厂**等资源聚合类新型经营主体纳入**中长期**市场，明确发电企业、售电公司、电力用户、**虚拟电厂**、电网企业、交易机构和调度机构的权利义务，强调运营机构加强市场监测分析。\n- 其次，规则优化注册、变更和注销流程，工商业用户直接参与市场选择周期缩短至一个月，新型主体需与分散资源签订聚合服务合同。\n- 第三，交易品种更丰富，在传统电能量交易基础上新增或明确电网企业代理购电市场化交易、保障性用电市场化交易、省间**中长期**外购挂牌交易等，体现四川水电、新能源、燃煤火电等多类型电源同台竞争和省间购电衔接的特点。\n\n### 交易品种和组织\n- 第四，价格机制允许固定价格和灵活价格合同，年度及更长期合同可约定随供需、成本变化的价格形成方式。\n- 第五，交易组织方面提出**中长期**交易逐步按日连续开市，提升交易频次，帮助主体在现货运行背景下动态调整合同曲线和风险敞口。\n- 绿色电力交易方面，官方解读提到要明确**绿电**交易关系建立、环境价值溯源、**绿电**合同转让和**差价结算**参考点，意味着**绿电**不仅是普通电量交易，还涉及**绿证**、环境价值和用户绿色消费证明。\n\n### 价格与结算机制\n- 交易校核方面，细则将交易出清校核和电网安全校核分工处理，现货连续运行后不再单独开展部分电网安全校核，有利于减少重复校核。\n- 计量结算方面，四川**中长期**市场暂采用**差价结算**，并衔接国家计量结算规则和结算参考点安排。\n- 对市场主体而言，该细则的实务意义在于：发电侧要关注水电、新能源和火电同台交易、合同曲线和结算参考点；\n\n### 主体影响和风险管理\n- 售电公司要关注零售套餐、代理用户、履约和风险；\n- 电力用户要关注直接交易、零售代理、**绿电**消费和偏差结算；\n- **虚拟电厂**等新型主体要关注聚合合同、资源边界和市场准入。","browserFiles":[{"title":"政策正文","sourceTitle":"四川电力中长期市场实施细则","markdownFilePath":"knowledge-markdown/doc-sc-2026-long-term/政策正文.md","sourceFilePath":"source-files/2026-04-10-四川电力中长期市场实施细则(未见正式文号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["四川电力中长期市场实施细则","四川电力中长期市场实施细则。### 文件定位 四川能源监管办公开解读显示，《四川电力中长期市场实施细则》依据国务院办公厅关于完善全国统一电力市场体系的实施意见、《电力市场运行基本规则》《电力中长期市场基本规则》等文件制定，目的是深化四川中长期市场建设、适应全国统一电力市场和现货市场衔接需要。 公开页面为政策解读，未见可读取的正式细则附件，因此本条以官方解读确认内容为准。 解读显示，","未见正式文号","国家能源局四川监管办公室、四川省发展改革委、四川省能源局","2026-04-10","https://scb.nea.gov.cn/xxgk/zcjd/202606/t20260603_302382.html","source-files/2026-04-10-四川电力中长期市场实施细则(未见正式文号).pdf","","有效","2026-07-14"]}]},{"name":"山东","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","detail":"### 文件定位\n- 《山东电力市场规则（试行）》（2026年4月修订版）由山东能源监管办、山东省发展改革委、山东省能源局联合印发，文号为鲁监能市场规〔2026〕27号。\n- 通知正文要求市场运营机构严格遵循全国统一电力市场基础规则体系，规范信息披露、交易组织、交易执行、交易结算和调度运行，加快技术支持系统改造；\n- 日内市场按需启动、调频**辅助服务**市场出清主体自主选择参与方式、局部市场力监管等依赖系统改造的条款，原则上不晚于2026年7月1日执行。\n- 附件规则体量较大，共22章并含调频性能、调频容量需求等附件，是山东电力市场的综合性基础规则。\n- 规则总则明确山东电力市场包括电力**中长期**交易、现货交易、**辅助服务**交易、容量交易等，适用于电力批发市场注册、交易、执行、结算、信息披露和监督管理，并衔接零售市场。\n\n### 市场成员和准入\n- 市场成员章节规定发电企业、售电公司、电力用户、新型经营主体、电网企业、调度机构和交易机构的权利义务；\n- 经营主体须完成市场注册、满足计量结算、调度通信、技术系统、信用和履约担保等条件，且不得行使市场力、操纵价格或损害其他主体权益。\n- 规则对**新型储能**、**虚拟电厂**、负荷聚合商、分布式资源等提出持续充放电时间、调节容量、聚合关系、负荷确认协议和系统接入等条件。\n- 市场构成与价格章节把**中长期**、现货、**辅助服务**、容量补偿和零售市场联成一个体系：**中长期**合同稳定预期并管理风险，**现货市场**通过日前、日内、实时出清反映电力时空价值，**辅助服务**市场与现货联合或分步出清，容量补偿用于回收可靠资源固定成本。\n\n### 交易体系和价格结算\n- 规则明确市场化容量补偿费用按省发展改革委核定的市场化容量补偿电价向用户侧收取，按月结算，并按照发电侧主体可用容量等规则分配。\n- **中长期**交易运营章节规定交易品种、交易方式、合同签订、合约要素、交易约束、组织校核和合同管理，合同需明确周期、电量、曲线、价格和结算参考点，交易出清后形成结算依据。\n- 现货交易运营是规则核心，覆盖市场准备、机组与新型主体参数、调试管理、日前、日内、实时市场组织、安全校核、出清和结果发布，并规定省间与省内现货衔接、日前预电力平衡边界条件、日前可靠性机组组合及发电计划、实时出清等复杂流程。\n- **辅助服务**章节现阶段主要开展调频和爬坡**辅助服务**，调频**辅助服务**按日运行、集中竞价，综合价格和性能参数确定中标主体，未来适时开展备用等服务。\n\n### 绿电、容量和辅助服务\n- 零售市场章节规范售电公司与零售用户之间的零售交易和零售套餐，要求零售关系、套餐公示、合同和结算与批发侧衔接。\n- 计量和结算章节系统规定计量装置、计量数据、结算原则、结算电价、结算流程、发电侧、用户侧、新型经营主体、**辅助服务**、**绿电**交易、市场运行费用、结算查询和调整等内容；\n- 结算电价包含上网电价、购电价格、输配电价、市场化容量补偿电价、煤电**容量电费**、**辅助服务**费用、**抽水蓄能容量电费**、新能源可持续发展价格结算机制**差价结算**费用等，电网企业需按时提供计量数据并足额结算。\n- **绿电**结算要求电能量和环境价值分开处理，纳入可持续发展价格结算机制的电量不得重复获得**绿证**收益。\n\n### 市场力监管和风险防控\n- 市场力行为监管章节是山东规则的重要特点，规定市场力识别、处置、监测缓解、事前监管和事后监管，配套市场干预、中止和恢复机制；\n- 风险防控章节要求运营机构开展运行监测、履约风险和履约担保管理，运用大数据、人工智能等手段开发异常交易识别预警功能。\n- 规则还设置技术支持系统、争议处理、法律责任和附则。\n- 对市场主体来说，这份文件不仅告诉你能参加哪些市场，更把注册条件、报价申报、合同曲线、调度执行、计量结算、容量补偿、**辅助服务**、**绿电**、零售、市场力和违规风险放进一个统一框架，是山东市场参与和合规管理的总规则。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","markdownFilePath":"knowledge-markdown/doc-sd-2026-27/政策正文.md","sourceFilePath":"source-files/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"《山东电力市场规则（试行）》（2026年4月修订版）.pdf","sourceTitle":"关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","markdownFilePath":"knowledge-markdown/doc-sd-2026-27/《山东电力市场规则（试行）》（2026年4月修订版）.pdf.md","sourceFilePath":"source-files/attachments/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号)/P020260508675725961073.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知","关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知。### 文件定位 《山东电力市场规则（试行）》（2026年4月修订版）由山东能源监管办、山东省发展改革委、山东省能源局联合印发，文号为鲁监能市场规〔2026〕27号。 通知正文要求市场运营机构严格遵循全国统一电力市场基础规则体系，规范信息披露、交易组织、交易执行、交易结算和调度运行，加快技术支持系统改造；","鲁监能市场规〔2026〕27号","国家能源局山东监管办公室、山东省发展和改革委员会、山东省能源局","2026-04-30","https://sdb.nea.gov.cn/dtyw/tzgg/202605/t20260508_300824.html","source-files/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号).pdf","《山东电力市场规则（试行）》（2026年4月修订版）.pdf|source-files/attachments/2026-04-30-关于印发《山东电力市场规则(试行)》(2026年4月修订版)的通知(鲁监能市场规〔2026〕27号)/P020260508675725961073.pdf","有效","2026-07-14"]}]},{"name":"甘肃","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[{"title":"关于印发《甘肃省电力中长期交易实施细则》的通知","detail":"### 文件定位\n- 该通知由国家能源局甘肃监管办公室、甘肃省发展改革委、甘肃省工信厅、甘肃省能源局联合印发，文号为甘监能市场〔2025〕212号，正文要求国网甘肃省电力公司、甘肃电力交易中心、甘肃省电力市场管理委员会以及各发电企业、售电公司、电力用户和新型经营主体遵照执行。\n- 附件《甘肃省电力**中长期**交易实施细则》是本条政策的核心内容，覆盖甘肃**中长期**市场注册、交易、执行、结算、信息披露和监督管理，并把政府定价优先发电电量视同厂网间双边协商交易电量纳入**中长期**市场管理。\n- 细则先明确市场成员范围：经营主体包括发电企业、售电公司、电力用户和储能、**虚拟电厂**、负荷聚合商、分布式发电、智能微电网、源网荷储一体化等新型经营主体；\n- 用户侧分为批发用户、零售用户和电网企业代理购电用户，零售用户可通过售电公司、**虚拟电厂**或聚合商代理购电。\n\n### 市场成员与准入注册\n- 文件强调**中长期**市场要与**现货市场**在交易时序、出清和结算上衔接，也要与跨省跨区交易衔接，电力市场运营机构和电网企业按统一标准开展注册、交易组织、结算和信息披露。\n- 市场准入方面，经营主体须符合《**电力市场注册**基本规则》等要求，工业商业用户未直接交易也未签代理购电合同的，按规则纳入代理购电；\n- 已注册主体若不再持续满足准入条件，可被暂停资格和交易权限。\n- 注册方面，经营主体在交易平台办理注册、变更和注销，按主体类别、交易单元和结算单元分别管理，批发身份和零售身份不得同时使用，退出或变更前要处理未履约合同和电费清算。\n\n### 交易品种与组织\n- 交易品种方面，附件明确省内**中长期**交易包括用户侧经营主体与发电侧经营主体直接交易、电网企业代理购电交易、绿色电力交易、省内融合交易、合同转让等，交易周期覆盖数年、年度、多月、月度、月内周交易和日滚动交易，方式包括双边协商、集中竞价、滚动撮合、挂牌等。\n- 价格机制方面，除政府定价电量外，**中长期**价格主要由市场形成；\n- **绿电**价格由电能量价格和**绿电**环境价值组成，**绿电**环境价值不纳入峰谷**分时电价**机制，省内**绿电**不单独组织集中竞价和滚动撮合。\n\n### 价格结算与绿电\n- 交易组织方面，文件要求提前发布交易公告，D+2日滚动交易按日连续开市，省内**中长期**按24个小时段形成合同曲线，并进一步分解为96点曲线作为结算依据。\n- **绿电**交易方面，要求可再生能源项目参与前完成**绿电**相关平台和**绿证**要求，确保发电企业与电力用户一一对应、环境价值可追踪溯源；\n- 售电公司和**虚拟电厂**参与**绿电**时，要把用户需求或分布式新能源项目与申报电量关联。\n- 结算方面，电力市场结算包括电能量、**辅助服务**和容量等分类，原则上按日清分、按月结算，不得设置不平衡资金池；\n\n### 风险防控和监管\n- 未参与**现货市场**的经营主体按照付不议、偏差结算原则执行，偏差价格与现货统一结算点或代理购电分时价格衔接；\n- **绿电**电能量和环境价值分开结算，纳入新能源可持续发展价格结算机制的电量不得重复获得**绿证**收益，环境价值按发电侧上网电量扣除**机制电量**后的余额、合同电量和用电侧电量三者取小确定。\n- 文件还专章规定信息披露、技术支持系统、风险防控、争议处理和法律责任，要求对供需失衡、价格异常、不正当竞争、技术系统异常、合同违约等风险建立预案和监测处置机制。","browserFiles":[{"title":"政策正文","sourceTitle":"关于印发《甘肃省电力中长期交易实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-gs-2025-212/政策正文.md","sourceFilePath":"source-files/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号).pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}},{"title":"甘肃省电力中长期交易实施细则.pdf","sourceTitle":"关于印发《甘肃省电力中长期交易实施细则》的通知","markdownFilePath":"knowledge-markdown/doc-gs-2025-212/甘肃省电力中长期交易实施细则.pdf.md","sourceFilePath":"source-files/attachments/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号)/P020251230717529858215.pdf","extraction":{"method":"pdf-text","ocrStatus":"not-needed","extractedAt":"2026-07-15"}}],"values":["关于印发《甘肃省电力中长期交易实施细则》的通知","关于印发《甘肃省电力中长期交易实施细则》的通知。### 文件定位 该通知由国家能源局甘肃监管办公室、甘肃省发展改革委、甘肃省工信厅、甘肃省能源局联合印发，文号为甘监能市场〔2025〕212号，正文要求国网甘肃省电力公司、甘肃电力交易中心、甘肃省电力市场管理委员会以及各发电企业、售电公司、电力用户和新型经营主体遵照执行。 附件《甘肃省电力中长期交易实施细则》是本条政策的核心内容，","甘监能市场〔2025〕212号","国家能源局甘肃监管办公室、甘肃省发展和改革委员会、甘肃省工业和信息化厅、甘肃省能源局","2025-12-30","https://gsb.nea.gov.cn/dtyw/tzgg/202512/t20251230_293356.html","source-files/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号).pdf","甘肃省电力中长期交易实施细则.pdf|source-files/attachments/2025-12-30-关于印发《甘肃省电力中长期交易实施细则》的通知(甘监能市场〔2025〕212号)/P020251230717529858215.pdf","有效","2026-07-14"]}]},{"name":"安徽","columns":["文件标题","知识摘要","发文编号","发布单位","发布日期","链接","查看文件","附件归档","状态","最后核验日期"],"rows":[]},{"name":"更新记录","columns":["日期","类型","对象 ID","说明"],"rows":[{"title":"更新｜concepts","values":["2026-07-15","更新","concepts","按网页快速阅读要求，为已入库基础概念补充 200 字以内知识摘要，完整详细解读继续保留用于详情弹窗和 Excel 全量导出。"]},{"title":"更新｜policyDocuments","values":["2026-07-15","更新","policyDocuments","按网页快速阅读
